name: CI Container Test Workflow

on:
  workflow_call:
    inputs:
      config:
        required: true
        type: string
      server-count:
        required: false
        type: number
        default: 4
      enable-debug-layers:
        required: false
        type: boolean
        default: true

jobs:
  # Run GPU tests in container with Vulkan and CUDA support.
  # Requires mounting host NVIDIA Vulkan ICD and EGL vendor config for Vulkan to work.
  test-slang:
    runs-on: ["Linux", "self-hosted", "GPU"]
    timeout-minutes: 60

    permissions:
      contents: read
      packages: read

    container:
      image: ghcr.io/shader-slang/slang-linux-gpu-ci:v1.5.1
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      options: >-
        --gpus all
        --user root
        --cap-add SYSLOG
        --device /dev/nvidia-modeset:/dev/nvidia-modeset
        --device /dev/dri:/dev/dri
        -e NVIDIA_DRIVER_CAPABILITIES=compute,utility,graphics
        -v /etc/vulkan/icd.d/nvidia_icd.json:/etc/vulkan/icd.d/nvidia_icd.json:ro
        -v /usr/share/nvidia:/usr/share/nvidia:ro
        -v /usr/share/glvnd/egl_vendor.d/10_nvidia.json:/usr/share/glvnd/egl_vendor.d/10_nvidia.json:ro

    defaults:
      run:
        shell: bash

    steps:
      - name: GPU health check
        run: |
          if ! output=$(nvidia-smi --query-gpu=name,driver_version,memory.total --format=csv,noheader 2>&1); then
            echo "nvidia-smi output: $output"
            echo "::error::GPU health check failed — this VM has a faulty GPU. Re-run to get a new VM."
            exit 1
          fi
          echo "GPU: $output"

      - name: Configure Git safe directory
        run: git config --global --add safe.directory '*'

      - uses: actions/checkout@v4
        with:
          submodules: "recursive"
          fetch-depth: "1"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: slang-tests-linux-x86_64-gcc-${{ inputs.config }}
          path: artifacts

      - name: Setup test environment
        run: |
          if [[ "${{ inputs.config }}" == "release" ]]; then
            cmake_config="Release"
          else
            cmake_config="Debug"
          fi
          echo "cmake_config=$cmake_config" >> $GITHUB_ENV

          bin_dir="$PWD/artifacts/${cmake_config}/bin"
          echo "bin_dir=$bin_dir" >> $GITHUB_ENV

          chmod +x "$bin_dir"/* 2>/dev/null || true
          echo "LD_LIBRARY_PATH=$PWD/artifacts/${cmake_config}/lib:$LD_LIBRARY_PATH" >> $GITHUB_ENV

          # Display environment configuration
          print-env-info

      - name: Enable core dumps
        run: |
          ulimit -c unlimited
          # Core dumps go to /tmp so they're easy to find
          echo "/tmp/core.%p.%e" > /proc/sys/kernel/core_pattern 2>/dev/null || true
          mkdir -p /tmp/crash-logs

      - name: Test Slang
        run: |
          set -o pipefail
          ulimit -c unlimited
          export SLANG_RUN_SPIRV_VALIDATION=1
          export SLANG_USE_SPV_SOURCE_LANGUAGE_UNKNOWN=1

          slang_test_args=(
            "-category" "full"
            "-expected-failure-list" "tests/expected-failure-github.txt"
            "-expected-failure-list" "tests/expected-failure-linux.txt"
            "-expected-failure-list" "tests/expected-failure-linux-gpu.txt"
            "-skip-reference-image-generation"
            "-show-adapter-info"
          )

          if [ "${{ inputs.server-count }}" -gt 1 ]; then
            slang_test_args+=("-use-test-server")
            slang_test_args+=("-server-count" "${{ inputs.server-count }}")
          fi

          # Skip most neural tests in debug builds to reduce CI time
          if [[ "${{ inputs.config }}" == "debug" ]]; then
            slang_test_args+=("-skip-list" "tests/skip-list-debug.txt")
          fi

          "$bin_dir/slang-test" "${slang_test_args[@]}" 2>&1 | tee test-output.log

      - name: Run slangc tests
        run: |
          PATH=$bin_dir:$PATH tools/slangc-test/test.sh 2>&1 | tee -a test-output.log

      - name: Test Slang via glsl
        if: inputs.config == 'release' && github.event_name == 'pull_request'
        run: |
          export SLANG_RUN_SPIRV_VALIDATION=1
          export SLANG_USE_SPV_SOURCE_LANGUAGE_UNKNOWN=1
          "$bin_dir/slang-test" \
            -use-test-server \
            -server-count ${{ inputs.server-count }} \
            -category full \
            -emit-spirv-via-glsl \
            -api vk \
            -expected-failure-list tests/expected-failure-via-glsl.txt \
            -expected-failure-list tests/expected-failure-github.txt \
            -expected-failure-list tests/expected-failure-linux.txt \
            -expected-failure-list tests/expected-failure-linux-gpu.txt \
            2>&1 | tee -a test-output.log

      - name: GPU post-test diagnostics
        if: failure()
        run: |
          gpu_crashed=0
          echo "=== GPU State ==="
          if ! nvidia-smi 2>&1; then
            echo "nvidia-smi FAILED (GPU may have crashed)"
            echo "::error::GPU crashed during tests — retrying may help."
            gpu_crashed=1
          fi
          echo ""
          echo "=== GPU Memory & ECC ==="
          nvidia-smi --query-gpu=name,driver_version,memory.used,memory.free,temperature.gpu,ecc.errors.uncorrected.volatile.total,pstate \
            --format=csv,noheader 2>&1 || true
          echo ""
          echo "=== XID Errors ==="
          nvidia-smi -q -d XID_ERRORS 2>&1 || true
          echo ""
          echo "=== GPU Process State ==="
          nvidia-smi pmon -c 1 2>&1 || true
          echo ""
          echo "=== Kernel GPU Messages ==="
          dmesg 2>/dev/null | grep -iE "nvidia|nvrm|xid|gpu|fault|segfault" | tail -50 || \
          sudo dmesg 2>/dev/null | grep -iE "nvidia|nvrm|xid|gpu|fault|segfault" | tail -50 || \
          echo "(dmesg not available in container)"
          if [[ "$gpu_crashed" -eq 1 ]]; then
            exit 1
          fi

      - name: Analyze core dumps
        if: failure()
        run: |
          CORE_FILES=$(find /tmp -name "core.*" -type f 2>/dev/null)
          if [[ -z "$CORE_FILES" ]]; then
            echo "No core dumps found"
            exit 0
          fi

          # gdb is pre-installed in the container (linux-gpu-ci)
          if ! which gdb >/dev/null 2>&1; then
            echo "::warning::gdb not found in container — skipping core dump analysis"
            exit 0
          fi

          for core_file in $CORE_FILES; do
            core_basename=$(basename "$core_file")
            # Extract executable name from core pattern: core.PID.EXECUTABLE
            exe_name=$(echo "$core_basename" | cut -d. -f3)
            if [[ -z "$exe_name" ]]; then
              exe_name="test-server"
            fi

            binary=$(find "$bin_dir" -name "$exe_name" -type f 2>/dev/null | head -1)
            if [[ -z "$binary" ]]; then
              echo "::warning::Core dump $core_basename: could not find binary '$exe_name'"
              continue
            fi

            echo ""
            echo "::group::Core dump analysis: $core_basename ($exe_name)"
            gdb -batch \
              -ex "set pagination off" \
              -ex "echo === Signal ===\n" \
              -ex "info signal" \
              -ex "echo \n=== Backtrace ===\n" \
              -ex "bt full 30" \
              -ex "echo \n=== All Threads ===\n" \
              -ex "thread apply all bt 15" \
              "$binary" "$core_file" 2>&1 || echo "(gdb analysis failed)"
            echo "::endgroup::"
          done

      - name: Enrich intermittency report with system data
        if: always()
        run: |
          REPORT="intermittency-report.json"

          # If slang-test didn't create the file (no retries), create a minimal one
          if [[ ! -f "$REPORT" ]]; then
            echo '{"retries": {"total": 0, "passed_on_retry": 0, "tests": []}, "scheduling_stopped": false}' > "$REPORT"
          fi

          # Collect GPU state
          gpu_crashed=false
          gpu_info=""
          if nvidia-smi --query-gpu=name,driver_version,memory.used,temperature.gpu,pstate \
              --format=csv,noheader 2>/dev/null; then
            gpu_info=$(nvidia-smi --query-gpu=name,driver_version,memory.used,temperature.gpu,pstate \
              --format=csv,noheader 2>/dev/null | head -1)
          else
            gpu_crashed=true
          fi

          # Count core dumps
          core_count=$(find /tmp -name "core.*" -type f 2>/dev/null | wc -l | tr -d ' ')
          core_files=""
          if [[ "$core_count" -gt 0 ]]; then
            core_files=$(find /tmp -name "core.*" -type f 2>/dev/null | xargs -I{} basename {} | tr '\n' ', ' | sed 's/,$//')
          fi

          # Use python to merge system data into existing JSON (jq may not be available)
          python3 -c "
          import json, sys
          with open('$REPORT') as f:
              data = json.load(f)
          data['system'] = {
              'gpu_crashed': $( [[ "$gpu_crashed" == "true" ]] && echo "True" || echo "False" ),
              'gpu_info': '''$gpu_info'''.strip(),
              'core_dumps': $core_count,
              'core_files': '''$core_files'''.strip()
          }
          with open('$REPORT', 'w') as f:
              json.dump(data, f, indent=2)
          " 2>/dev/null || echo "::warning::Failed to enrich intermittency report with system data"

          echo "Intermittency report:"
          cat "$REPORT"

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: crash-logs-${{ inputs.config }}-slang-test
          path: |
            /tmp/core.*
            /tmp/crash-logs/
          retention-days: 3
          if-no-files-found: ignore

      - name: Upload intermittency report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: intermittency-report-${{ inputs.config }}-slang-test
          path: intermittency-report.json
          retention-days: 30
          if-no-files-found: ignore

      - name: Compress and upload test log on failure
        if: failure()
        run: gzip -9 test-output.log 2>/dev/null || true

      - name: Upload test log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-log-${{ inputs.config }}-slang-test
          path: test-output.log.gz
          retention-days: 7
          if-no-files-found: ignore
          compression-level: 0

  test-slang-rhi:
    runs-on: ["Linux", "self-hosted", "GPU"]
    timeout-minutes: 30

    permissions:
      contents: read
      packages: read

    container:
      image: ghcr.io/shader-slang/slang-linux-gpu-ci:v1.5.1
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      options: >-
        --gpus all
        --user root
        --cap-add SYSLOG
        --device /dev/nvidia-modeset:/dev/nvidia-modeset
        --device /dev/dri:/dev/dri
        -e NVIDIA_DRIVER_CAPABILITIES=compute,utility,graphics
        -v /etc/vulkan/icd.d/nvidia_icd.json:/etc/vulkan/icd.d/nvidia_icd.json:ro
        -v /usr/share/nvidia:/usr/share/nvidia:ro
        -v /usr/share/glvnd/egl_vendor.d/10_nvidia.json:/usr/share/glvnd/egl_vendor.d/10_nvidia.json:ro

    defaults:
      run:
        shell: bash

    steps:
      - name: GPU health check
        run: |
          if ! output=$(nvidia-smi --query-gpu=name,driver_version,memory.total --format=csv,noheader 2>&1); then
            echo "nvidia-smi output: $output"
            echo "::error::GPU health check failed — this VM has a faulty GPU. Re-run to get a new VM."
            exit 1
          fi
          echo "GPU: $output"

      - name: Configure Git safe directory
        run: git config --global --add safe.directory '*'

      - uses: actions/checkout@v4
        with:
          submodules: "recursive"
          fetch-depth: "1"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: slang-tests-linux-x86_64-gcc-${{ inputs.config }}
          path: artifacts

      - name: Setup test environment
        run: |
          if [[ "${{ inputs.config }}" == "release" ]]; then
            cmake_config="Release"
          else
            cmake_config="Debug"
          fi
          echo "cmake_config=$cmake_config" >> $GITHUB_ENV

          bin_dir="$PWD/artifacts/${cmake_config}/bin"
          echo "bin_dir=$bin_dir" >> $GITHUB_ENV

          chmod +x "$bin_dir"/* 2>/dev/null || true
          echo "LD_LIBRARY_PATH=$PWD/artifacts/${cmake_config}/lib:$LD_LIBRARY_PATH" >> $GITHUB_ENV

          # Display environment configuration
          print-env-info

      - name: Run slang-rhi tests
        run: |
          export SLANG_RHI_EXCLUDE_TESTS="md-clear*,cmd-copy*,cmd-upload*,fence*,staging-heap*,texture-create*"
          "$bin_dir/slang-rhi-tests" -check-devices -tce="$SLANG_RHI_EXCLUDE_TESTS"

      - name: Run slang-rhi tests (OptiX 8.0)
        run: |
          "$bin_dir/slang-rhi-tests" -check-devices -optix-version=80000 -tc="ray-tracing-*.cuda"

      - name: Run slang-rhi tests (OptiX 8.1)
        run: |
          "$bin_dir/slang-rhi-tests" -check-devices -optix-version=80100 -tc="ray-tracing-*.cuda"

      - name: GPU post-test diagnostics
        if: failure()
        run: |
          gpu_crashed=0
          echo "=== GPU State ==="
          if ! nvidia-smi 2>&1; then
            echo "nvidia-smi FAILED (GPU may have crashed)"
            echo "::error::GPU crashed during tests — retrying may help."
            gpu_crashed=1
          fi
          echo ""
          echo "=== GPU Memory & ECC ==="
          nvidia-smi --query-gpu=name,driver_version,memory.used,memory.free,temperature.gpu,ecc.errors.uncorrected.volatile.total,pstate \
            --format=csv,noheader 2>&1 || true
          echo ""
          echo "=== XID Errors ==="
          nvidia-smi -q -d XID_ERRORS 2>&1 || true
          echo ""
          echo "=== GPU Process State ==="
          nvidia-smi pmon -c 1 2>&1 || true
          echo ""
          echo "=== Kernel GPU Messages ==="
          dmesg 2>/dev/null | grep -iE "nvidia|nvrm|xid|gpu|fault|segfault" | tail -50 || \
          sudo dmesg 2>/dev/null | grep -iE "nvidia|nvrm|xid|gpu|fault|segfault" | tail -50 || \
          echo "(dmesg not available in container)"
          if [[ "$gpu_crashed" -eq 1 ]]; then
            exit 1
          fi
