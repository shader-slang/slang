name: Rerun GPU Failures

# Triggers after the CI workflow completes (not while it's still running).
# Runs in the base repo context with full permissions, so it works for
# fork PRs and merge queue runs alike.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  rerun-gpu-failures:
    runs-on: ubuntu-latest
    # Only act on failed runs, and cap at 2 automatic retries.
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.run_attempt < 3
    permissions:
      actions: write
    steps:
      - name: Check for GPU health check failures and rerun
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          echo "Inspecting run $RUN_ID for GPU health check failures..."

          # Find failed jobs where the "GPU health check" step failed
          failed_job_ids=$(gh api "repos/${{ github.repository }}/actions/runs/$RUN_ID/jobs?per_page=100" \
            --jq '[.jobs[] | select(.conclusion == "failure") | select(.steps[]? | select(.name == "GPU health check" and .conclusion == "failure")) | .id] | .[]' \
            || true)

          if [ -z "$failed_job_ids" ]; then
            echo "No GPU health check failures found — not rerunning."
            exit 0
          fi

          echo "GPU health check failures detected in jobs: $failed_job_ids"

          # Rerun each failed job individually
          for job_id in $failed_job_ids; do
            echo "Rerunning job $job_id..."
            gh run rerun --job "$job_id" --repo "${{ github.repository }}" || echo "::warning::Failed to rerun job $job_id"
          done

          echo "Done."
