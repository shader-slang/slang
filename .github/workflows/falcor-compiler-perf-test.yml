# This is a basic workflow to help you get started with Actions

name: Falcor Compiler Perf-Test

on:
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened, ready_for_review]
    paths-ignore:
      - "docs/**"
      - "LICENSES/**"
      - "LICENSE"
      - "CONTRIBUTING.md"
      - "README.md"
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  build:
    name: Build
    if: github.event.pull_request.draft != true
    timeout-minutes: 100
    continue-on-error: false
    runs-on: [Windows, self-hosted, build]
    defaults:
      run:
        shell: bash
    steps:
      - name: Add Git Bash to PATH
        shell: pwsh
        run: |
          Add-Content -Path $env:GITHUB_PATH -Value "C:\\Program Files\\Git\\bin"
          Add-Content -Path $env:GITHUB_PATH -Value "C:\\Program Files\\Git\\usr\\bin"
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
          submodules: "recursive"
          fetch-depth: "0"
      # Restore (read-only) the Windows-release sccache populated on master by
      # populate-sccache.yml. We deliberately do not save a new cache entry, so
      # this adds zero pressure on the 10 GB GitHub Actions cache budget and
      # cannot evict the populate caches.
      - name: Restore sccache cache (read-only)
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: C:/sccache
          key: sccache-windows-cl-x86_64-release-${{ github.sha }}
          restore-keys: |
            sccache-windows-cl-x86_64-release-
      - name: Setup sccache
        uses: ./.github/actions/setup-sccache
        with:
          platform: windows
      - name: Setup
        uses: ./.github/actions/common-setup
        with:
          os: windows
          compiler: cl
          platform: x86_64
          config: release
          build-llvm: true
      - name: Build Slang
        run: |
          echo "📊 sccache statistics (pre-build):"
          sccache --show-stats || true
          cmake --preset default --fresh \
            -DSLANG_SLANG_LLVM_FLAVOR=USE_SYSTEM_LLVM \
            -DCMAKE_COMPILE_WARNING_AS_ERROR=true \
            -DSLANG_ENABLE_CUDA=1 \
            -DCMAKE_C_COMPILER_LAUNCHER="${sccache_path}" \
            -DCMAKE_CXX_COMPILER_LAUNCHER="${sccache_path}" \
            -DCMAKE_DISABLE_PRECOMPILE_HEADERS=ON
          cmake --workflow --preset release
          echo "📊 sccache statistics (post-build):"
          sccache --show-stats || true
      - name: Upload Slang build
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: slang-falcor-perf-build-windows-release
          path: build/Release/bin/
          if-no-files-found: error
          retention-days: 7
  test:
    name: Test (Falcor Perf)
    needs: build
    if: github.event.pull_request.draft != true
    timeout-minutes: 100
    continue-on-error: false
    runs-on: [Windows, self-hosted, perf]
    defaults:
      run:
        shell: bash
    steps:
      - name: Add Git Bash to PATH
        shell: pwsh
        run: |
          Add-Content -Path $env:GITHUB_PATH -Value "C:\\Program Files\\Git\\bin"
          Add-Content -Path $env:GITHUB_PATH -Value "C:\\Program Files\\Git\\usr\\bin"
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
          submodules: "false"
          fetch-depth: "1"
      - name: Download Slang build
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: slang-falcor-perf-build-windows-release
          path: build/Release/bin

      - uses: robinraju/release-downloader@28fc21f50d76778e7023361aa1f863e717d3d56f # v1.13
        id: download
        with:
          # The source repository path.
          # Expected format {owner}/{repo}
          # Default: ${{ github.repository }}
          repository: "shader-slang/falcor-compile-perf-test"

          # A flag to set the download target as latest release
          # The default value is 'false'
          latest: true

          # The name of the file to download.
          # Use this field only to specify filenames other than tarball or zipball, if any.
          # Supports wildcard pattern (eg: '*', '*.deb', '*.zip' etc..)
          fileName: "falcor_perf_test-*-win-64.zip"

          # Relative path under $GITHUB_WORKSPACE to place the downloaded file(s)
          # It will create the target directory automatically if not present
          # eg: out-file-path: "my-downloads" => It will create directory $GITHUB_WORKSPACE/my-downloads
          out-file-path: "falcor-perf-test"

          # Somehow there is a bug in this flag, the executable extracted is not runnable. We have to
          # extract ourselves.
          extract: false

      - name: run falcor-compiler-perf-test
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $filename = '${{ fromJson(steps.download.outputs.downloaded_files)[0] }}'
          # Check if the downloaded file exists
          if (-not (Test-Path $filename)) {
            Write-Error "Downloaded file not found: $filename"
            exit 1
          }
          Expand-Archive $filename -DestinationPath .\falcor-perf-test
          $env:PATH = ".\build\Release\bin;" + $env:PATH

          # View current PATH
          Write-Host "PATH is $env:PATH"

          # Run the executable and check exit code
          Write-Host "Running falcor performance test..."
          & .\falcor-perf-test\bin\Release\falcor_perftest.exe
          if ($LASTEXITCODE -ne 0) {
            Write-Error "falcor_perftest.exe failed with exit code: $LASTEXITCODE"
            exit $LASTEXITCODE
          }
          Write-Host "falcor performance test completed successfully"
