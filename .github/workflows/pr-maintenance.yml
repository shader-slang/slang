name: PR Maintenance

# Thin caller for the reusable PR board-sync workflow. Declares the PR event
# triggers (a reusable workflow cannot declare them itself) and delegates all
# logic to pr-board-sync.yml. slang consumes its own reusable workflow so there
# is a single source of truth; other shader-slang repos use the cross-repo form:
#
#   uses: shader-slang/slang/.github/workflows/pr-board-sync.yml@master
#
# See .github/workflows/pr-board-sync.yml for the board IDs and required secrets.

on:
  pull_request_target:
    types:
      [
        opened,
        reopened,
        synchronize,
        closed,
        ready_for_review,
        converted_to_draft,
        enqueued,
        dequeued,
        review_requested,
      ]
  pull_request_review:
    types: [submitted]
  check_suite:
    types: [completed]

jobs:
  board-sync:
    permissions:
      # Caps the GITHUB_TOKEN handed to the reusable workflow; its only
      # GITHUB_TOKEN use is unrequesting reviewers (pull-requests: write).
      pull-requests: write
    uses: ./.github/workflows/pr-board-sync.yml
    secrets:
      ADD_TO_PROJECT_PAT: ${{ secrets.ADD_TO_PROJECT_PAT }}
      SLANGBOT_MEMBERS_READONLY: ${{ secrets.SLANGBOT_MEMBERS_READONLY }}
