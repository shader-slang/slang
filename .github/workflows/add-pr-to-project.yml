name: Add PR to Project Board

# Adds new PRs to the shader-slang project board and sets the "Source" field
# to "Internal" (dev team member) or "Community" (everyone else).
#
# Uses pull_request_target so secrets are available for fork PRs.
# This workflow only reads PR metadata and makes API calls — it never
# checks out or executes PR code.

on:
  pull_request_target:
    types: [opened]

jobs:
  add-to-project:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check if PR author is in dev team
        id: check_team
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.SLANGBOT_MEMBERS_READONLY }}
          script: |
            const username = context.payload.pull_request.user.login;
            let isTeamMember = false;

            try {
              await github.rest.teams.getMembershipForUserInOrg({
                org: 'shader-slang',
                team_slug: 'dev',
                username,
              });
              isTeamMember = true;
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }

            console.log(`PR author: ${username}`);
            console.log(`Is dev team member: ${isTeamMember}`);

            core.setOutput('source', isTeamMember ? 'Internal' : 'Community');

      - name: Add PR to project board and set Source field
        uses: actions/github-script@v7
        env:
          SOURCE: ${{ steps.check_team.outputs.source }}
        with:
          github-token: ${{ secrets.ADD_TO_PROJECT_PAT }}
          script: |
            // Project and field IDs for:
            //   https://github.com/orgs/shader-slang/projects/13
            //
            // To re-query these IDs, run:
            //   gh api graphql -f query='{ organization(login: "shader-slang") {
            //     projectV2(number: 13) { id fields(first: 20) { nodes {
            //       ... on ProjectV2SingleSelectField { id name options { id name } }
            //     } } } } }'
            const PROJECT_ID = 'PVT_kwDOAb2kZs4BSJKy';
            const SOURCE_FIELD_ID = 'PVTSSF_lADOAb2kZs4BSJKyzg_w_AM';
            const SOURCE_OPTIONS = {
              'Internal': '407f2ea2',
              'Community': '31a0b1ae',
            };

            const source = process.env.SOURCE;
            const optionId = SOURCE_OPTIONS[source];
            if (!optionId) {
              throw new Error(`Unknown source value: ${source}`);
            }
            const prNodeId = context.payload.pull_request.node_id;

            // Add the PR to the project (idempotent if already present)
            const addResult = await github.graphql(`
              mutation($projectId: ID!, $contentId: ID!) {
                addProjectV2ItemById(input: {projectId: $projectId, contentId: $contentId}) {
                  item { id }
                }
              }
            `, {
              projectId: PROJECT_ID,
              contentId: prNodeId,
            });

            const itemId = addResult?.addProjectV2ItemById?.item?.id;
            if (!itemId) {
              throw new Error('Failed to add PR to project: no item ID returned');
            }
            console.log(`Added PR to project, item ID: ${itemId}`);

            // Set the Source field
            const updateResult = await github.graphql(`
              mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                updateProjectV2ItemFieldValue(input: {
                  projectId: $projectId,
                  itemId: $itemId,
                  fieldId: $fieldId,
                  value: { singleSelectOptionId: $optionId }
                }) {
                  projectV2Item { id }
                }
              }
            `, {
              projectId: PROJECT_ID,
              itemId: itemId,
              fieldId: SOURCE_FIELD_ID,
              optionId: optionId,
            });

            if (!updateResult?.updateProjectV2ItemFieldValue?.projectV2Item?.id) {
              throw new Error('Failed to set Source field: unexpected response');
            }

            console.log(`Set Source field to: ${source}`);
