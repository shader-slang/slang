name: Compile Regression-Test

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths-ignore:
      - "docs/**"
      - "LICENSES/**"
      - "LICENSE"
      - "CONTRIBUTING.md"
      - "README.md"
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened, ready_for_review]
    paths-ignore:
      - "docs/**"
      - "LICENSES/**"
      - "LICENSE"
      - "CONTRIBUTING.md"
      - "README.md"
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  build:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft != true
    timeout-minutes: 100
    continue-on-error: false
    strategy:
      fail-fast: false
      matrix:
        os: [windows]
        config: [release]
        compiler: [cl]
        platform: [x86_64]
        include:
          # Self-hosted falcor tests
          - warnings-as-errors: true
            test-category: full
            full-gpu-tests: false
            runs-on: [Windows, self-hosted, regression-test]
    runs-on: ${{ matrix.runs-on }}
    permissions:
      id-token: write # Required for Workload Identity (unused by fork PRs)
      contents: read
    env:
      IS_FORK_PR: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: "recursive"
          fetch-depth: "0"

      - name: Authenticate to Google Cloud
        if: env.IS_FORK_PR != 'true'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/125098404903/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider"
          service_account: "github-ci@slang-runners.iam.gserviceaccount.com"

      - name: Setup
        uses: ./.github/actions/common-setup
        with:
          os: ${{matrix.os}}
          compiler: ${{matrix.compiler}}
          platform: ${{matrix.platform}}
          config: ${{matrix.config}}
          build-llvm: true
      - name: Build Slang
        run: |
          # TODO(#11146): Build with the temporary MergeReturnPass workaround in this workflow.
          # Remove this override with SLANG_ENABLE_SPIRV_OPT_MERGE_RETURN when retired.
          cmake --preset default --fresh \
            -DSLANG_SLANG_LLVM_FLAVOR=USE_SYSTEM_LLVM \
            -DCMAKE_COMPILE_WARNING_AS_ERROR=${{matrix.warnings-as-errors}} \
            -DSLANG_ENABLE_CUDA=1 \
            -DSLANG_ENABLE_SPIRV_OPT_MERGE_RETURN=OFF
          cmake --workflow --preset "${{matrix.config}}"
      - name: Test SPIR-V optimizer workaround
        run: |
          export SLANG_RUN_SPIRV_VALIDATION=1
          # The category is required even with an explicit path: without it, this OFF-only
          # file is filtered out and slang-test exits successfully after running zero tests.
          set +e
          test_output="$("$bin_dir/slang-test.exe" -category spirv-opt-off tests/spirv/merge-return-workaround-off.slang 2>&1)"
          test_status=$?
          set -e

          printf '%s\n' "$test_output"

          if [ "$test_status" -ne 0 ]; then
            exit "$test_status"
          fi

          passed_pattern="^passed test: 'tests/spirv/merge-return-workaround-off[.]slang([.][0-9]+)?'"
          passed_count="$(grep -Ec "$passed_pattern" <<< "$test_output" || true)"
          if [ "$passed_count" -ne 2 ]; then
            echo "Expected slang-test to run both tests/spirv/merge-return-workaround-off.slang variants."
            exit 1
          fi

          # Exercise the broader SPIR-V suite under the workaround too. The ON-shape
          # merge-return test is invalid in this OFF-configured build.
          "$bin_dir/slang-test.exe" tests/spirv \
            -exclude-prefix tests/spirv/merge-return-workaround.slang
      - name: Run compile and validation test
        run: |
          cp -r /c/slang_compile_test_suite_a .
          cd slang_compile_test_suite_a
          export SLANGC_PATH="$bin_dir/slangc.exe"
          bash ./compile_all_slang.sh
