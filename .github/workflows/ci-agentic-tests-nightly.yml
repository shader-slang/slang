name: Agentic Tests (Nightly)

# Runs the LLM-generated, doc-anchored test bundles under
# docs/generated/tests/ via `slang-test -test-dir docs/generated/tests`.
# This is Phase B2 of the agentic-tests framework — the suite is
# additive, not a replacement for tests/, and runs nightly only because
# regenerating it from docs is expensive.
#
# Linux-only on purpose: every directive in the suite either runs
# under slangi (interpreter), the CPU/LLVM backend, or a text-emit
# target (HLSL/SPIRV-asm/Metal/WGSL/CUDA/CPP). No GPU runtime is
# required. Adding macOS/Windows would multiply runner cost without
# catching new regressions — slang-test ignores backends the runner
# doesn't have.

on:
  workflow_dispatch:
  schedule:
    # Run nightly at 4:00 AM UTC, after coverage-nightly's 02:00 slot
    # (which has a 240-min timeout) so they don't fight for the same
    # Linux runner pool. Matches the schedule documented in
    # docs/generated/tests/_meta/regenerate.md § CI integration.
    - cron: "0 4 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  agentic-tests:
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    permissions:
      id-token: write # Workload Identity for GCS-cached LLVM
      contents: read
      packages: read # Pull slang-linux-clang-ci container from GHCR
    container:
      image: ghcr.io/shader-slang/slang-linux-clang-ci:v1.0.1
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      options: --user root

    env:
      IS_FORK_PR: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == true }}

    defaults:
      run:
        shell: bash

    steps:
      - name: Configure Git safe directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - uses: actions/checkout@v4
        with:
          submodules: "recursive"
          persist-credentials: false

      - name: Authenticate to Google Cloud
        if: env.IS_FORK_PR != 'true'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/125098404903/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider"
          service_account: "github-ci@slang-runners.iam.gserviceaccount.com"

      - name: Setup sccache
        uses: ./.github/actions/setup-sccache
        with:
          platform: linux

      - name: Setup LLVM from GCS
        uses: ./.github/actions/setup-llvm-from-gcs
        with:
          os: linux
          compiler: gcc
          platform: x86_64
          llvm-hash: ${{ hashFiles('external/build-llvm.sh') }}
          build-if-missing: "true"
          github-token: ${{ github.token }}

      - name: Setup
        uses: ./.github/actions/common-setup
        with:
          os: linux
          compiler: gcc
          platform: x86_64
          config: release
          build-llvm: true
          use-cached-llvm: false

      - name: Build slang-test, slangi, slangc, test-server
        run: |
          cmake_launcher_defines=()
          if [[ -n "${sccache_path:-}" ]]; then
            cmake_launcher_defines+=("-DCMAKE_C_COMPILER_LAUNCHER=${sccache_path}")
            cmake_launcher_defines+=("-DCMAKE_CXX_COMPILER_LAUNCHER=${sccache_path}")
            cmake_launcher_defines+=("-DSLANG_ENABLE_PCH=OFF")
          fi
          cmake --preset default --fresh \
            -DSLANG_SLANG_LLVM_FLAVOR=USE_SYSTEM_LLVM \
            "${cmake_launcher_defines[@]}"
          cmake --build --preset release \
            --target slang-test slangi slangc test-server

      - name: Lint the agentic-tests bundles
        # Structural lint must pass before slang-test runs — a bundle
        # whose front-matter or //META block is malformed produces
        # spurious slang-test failures that obscure real ones.
        run: |
          python3 docs/generated/tests/_meta/regenerate.py lint

      - name: Run agentic test suite
        id: run-tests
        env:
          # Validate emitted SPIR-V (catches modules the compiler
          # produced but that don't satisfy the spec — e.g. invalid
          # storage-class combinations).
          SLANG_RUN_SPIRV_VALIDATION: "1"
          # Intentionally NOT setting SLANG_USE_SPV_SOURCE_LANGUAGE_UNKNOWN:
          # regular CI sets it to pin provenance for tests/ that CHECK
          # `OpSource Unknown`. The agentic suite was generated against
          # default compiler behavior and CHECKs `OpSource Slang`, so
          # inheriting that env var here produces spurious failures.
        run: |
          # Invoke slang-test directly with -expected-failure-list.
          # slang-test reclassifies failures listed in the file as
          # `failed(expected)` (TestResult::ExpectedFail), keeps them
          # out of the unexpected-failure exit code, and emits a
          # `passing tests that are expected to fail` section when an
          # entry has been fixed and should be removed.
          #
          # server-count 4 matches the suite's documented invocation
          # (regenerate.md § CI integration).
          #
          # tee preserves the upstream exit code via PIPESTATUS[0].
          set +e
          set -o pipefail
          "$bin_dir/slang-test" \
            -test-dir docs/generated/tests \
            -use-test-server -server-count 4 \
            -expected-failure-list docs/generated/tests/_meta/expected-failures.txt \
            | tee slang-test-output.log
          rc=${PIPESTATUS[0]}
          set +o pipefail
          set -e

          # Parse slang-test's summary line for the step-summary table.
          # Format (see tools/slang-test/test-reporter.cpp ~line 713):
          #   X% of tests passed (Y/Z)[, W tests ignored][, K tests failed expectedly]
          # where Z = passed + truly-failed + expected-failed.
          summary_line=$(grep -E '% of tests passed \([0-9]+/[0-9]+\)' slang-test-output.log | tail -1)
          passed=$(echo "$summary_line" | sed -E 's@.*\(([0-9]+)/[0-9]+\).*@\1@')
          total=$(echo "$summary_line" | sed -E 's@.*\([0-9]+/([0-9]+)\).*@\1@')
          ignored=$(echo "$summary_line" | sed -nE 's@.*, ([0-9]+) tests ignored.*@\1@p')
          expected_fail=$(echo "$summary_line" | sed -nE 's@.*, ([0-9]+) tests failed expectedly.*@\1@p')
          passed=${passed:-0}
          total=${total:-0}
          ignored=${ignored:-0}
          expected_fail=${expected_fail:-0}
          failed=$(( total - passed - expected_fail ))
          if [ "$failed" -lt 0 ]; then failed=0; fi

          # Lines listed under "passing tests that are expected to
          # fail:" are entries that should be removed from
          # expected-failures.txt.
          unexpected_pass=$(awk '
            /^passing tests that are expected to fail:/ { in_block = 1; next }
            in_block && /^---/ { sep++; if (sep == 2) in_block = 0; next }
            in_block && sep == 1 { count++ }
            END { print count + 0 }
          ' slang-test-output.log)

          {
            echo "# Agentic Test Suite"
            echo ""
            echo "| Bucket | Count |"
            echo "| --- | --- |"
            echo "| Passed | ${passed} |"
            echo "| Ignored (backend missing in slang-test) | ${ignored} |"
            if [ "${expected_fail}" -gt 0 ]; then
              echo "| Expected-fail (listed in expected-failures.txt) | ${expected_fail} |"
            fi
            if [ "${unexpected_pass}" -gt 0 ]; then
              echo "| Unexpectedly-passing (remove from expected-failures.txt) | ${unexpected_pass} |"
            fi
            echo "| **FAILED** | **${failed}** |"
            echo ""
            if [ "${expected_fail}" -gt 0 ]; then
              echo "Expected-fail entries are tracked in"
              echo "\`docs/generated/tests/_meta/expected-failures.txt\`."
              echo ""
            fi
            if [ "${failed}" -gt 0 ]; then
              echo "Unexpected failing tests:"
              echo ""
              echo '```'
              awk '
                /^[0-9]+ failing tests:/ { in_block = 1; next }
                in_block && /^---/ { sep++; if (sep == 2) in_block = 0; next }
                in_block && sep == 1 { print }
              ' slang-test-output.log
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          exit $rc

      - name: Upload slang-test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agentic-slang-test-output
          path: slang-test-output.log
          retention-days: 14
          if-no-files-found: ignore
