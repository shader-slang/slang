name: CI Coverage Container Workflow

on:
  workflow_call:
    inputs:
      config:
        required: true
        type: string
      runs-on:
        required: true
        type: string
      server-count:
        required: false
        type: number
        default: 4
      deploy-pages:
        required: false
        type: boolean
        default: false

jobs:
  coverage-container:
    runs-on: ${{ fromJSON(inputs.runs-on) }}
    timeout-minutes: 180

    permissions:
      contents: read
      packages: read

    container:
      image: ghcr.io/shader-slang/slang-linux-gpu-ci:v1.4.0
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      options: >-
        --gpus all
        --user root
        --device /dev/nvidia-modeset:/dev/nvidia-modeset
        --device /dev/dri:/dev/dri
        -e NVIDIA_DRIVER_CAPABILITIES=compute,utility,graphics
        -v /etc/vulkan/icd.d/nvidia_icd.json:/etc/vulkan/icd.d/nvidia_icd.json:ro
        -v /usr/share/nvidia:/usr/share/nvidia:ro
        -v /usr/share/glvnd/egl_vendor.d/10_nvidia.json:/usr/share/glvnd/egl_vendor.d/10_nvidia.json:ro

    defaults:
      run:
        shell: bash

    steps:
      - name: GPU health check
        run: |
          if ! output=$(nvidia-smi --query-gpu=name,driver_version,memory.total --format=csv,noheader 2>&1); then
            echo "nvidia-smi output: $output"
            echo "::error::GPU health check failed — this VM has a faulty GPU. Re-run to get a new VM."
            exit 1
          fi
          echo "GPU: $output"

      - name: Configure Git safe directory
        run: git config --global --add safe.directory '*'

      - uses: actions/checkout@v4
        with:
          submodules: "recursive"
          fetch-depth: "0"

      - name: Install Clang 18 and LLVM Coverage Tools
        run: |
          # Add LLVM APT repository
          wget -O - https://apt.llvm.org/llvm-snapshot.gpg.key | apt-key add -
          . /etc/os-release
          echo "deb http://apt.llvm.org/$VERSION_CODENAME/ llvm-toolchain-$VERSION_CODENAME-18 main" \
            > /etc/apt/sources.list.d/llvm.list
          apt-get update

          # Install clang-18 and LLVM coverage tools
          apt-get install -y clang-18 clang++-18 llvm-18

          # Create symlinks for coverage tools
          update-alternatives --install /usr/bin/llvm-profdata llvm-profdata /usr/bin/llvm-profdata-18 100
          update-alternatives --install /usr/bin/llvm-cov llvm-cov /usr/bin/llvm-cov-18 100

          # Create clang/clang++ symlinks so Slang's downstream compiler
          # detection finds them (it looks for 'clang++', not 'clang++-18')
          update-alternatives --install /usr/bin/clang clang /usr/bin/clang-18 100
          update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-18 100

          # Verify installation
          clang-18 --version
          llvm-profdata --version
          llvm-cov --version
          echo "CMake version: $(cmake --version | head -1)"
          echo "CUDA version: $(nvcc --version | tail -1)"

      - name: Build Slang with Coverage and CUDA
        run: |
          echo "Building with coverage instrumentation + CUDA support"

          # Set compilers
          export CC=clang-18
          export CXX=clang++-18

          # Configure with coverage preset + CUDA
          # FETCH_BINARY downloads pre-built slang-llvm (needed by slang-test for FileCheck)
          cmake --preset coverage --fresh \
            -DSLANG_ENABLE_CUDA=ON \
            -DSLANG_SLANG_LLVM_FLAVOR=FETCH_BINARY

          # Build
          cmake --build --preset coverage -j$(nproc)

          # Verify CUDA support
          if ldd build/RelWithDebInfo/lib/librender-test-tool.so 2>/dev/null | grep -q cuda; then
            echo "✅ render-test-tool has CUDA support!"
          else
            echo "⚠️  render-test-tool may not have CUDA linked"
            ldd build/RelWithDebInfo/lib/librender-test-tool.so 2>/dev/null || true
          fi

      - name: Build SIGABRT coverage flush helper
        run: |
          # When running in-process (server-count 1), GPU assertion failures in
          # slang-rhi call std::abort() which skips atexit handlers and loses all
          # profraw coverage data. This LD_PRELOAD shim intercepts SIGABRT and
          # calls __llvm_profile_write_file() to flush coverage before dying.
          cat > /tmp/coverage_flush.c << 'CEOF'
          #include <signal.h>
          #include <stdio.h>
          #include <stdlib.h>
          extern int __llvm_profile_write_file(void) __attribute__((weak));
          static void sigabrt_handler(int sig) {
              fprintf(stderr, "SIGABRT caught — flushing coverage data before exit\n");
              if (__llvm_profile_write_file)
                  __llvm_profile_write_file();
              signal(SIGABRT, SIG_DFL);
              raise(SIGABRT);
          }
          __attribute__((constructor))
          static void install_handler(void) {
              signal(SIGABRT, sigabrt_handler);
          }
          CEOF
          clang-18 -shared -fPIC -o /tmp/coverage_flush.so /tmp/coverage_flush.c
          echo "Built SIGABRT coverage flush helper"

      - name: Run Tests with Coverage
        run: |
          # Generate both HTML and LCOV formats
          export COVERAGE_HTML=1
          export COVERAGE_LCOV=1
          export COVERAGE_HTML_DIR="$PWD/coverage-html"
          export COVERAGE_LCOV_FILE="$PWD/coverage.lcov"

          # Set library path so slang-test can find shared libraries
          export LD_LIBRARY_PATH="$PWD/build/RelWithDebInfo/lib:${LD_LIBRARY_PATH:-}"

          # Preload SIGABRT handler to flush coverage data on GPU assertion crashes
          export LD_PRELOAD="/tmp/coverage_flush.so"

          # Ensure binaries are executable
          chmod +x build/RelWithDebInfo/bin/* 2>/dev/null || true

          # Set SPIRV validation environment variables
          export SLANG_RUN_SPIRV_VALIDATION=1
          export SLANG_USE_SPV_SOURCE_LANGUAGE_UNKNOWN=1

          # Build slang-test arguments for GPU testing
          test_args=(
            "-category" "full"
            "-expected-failure-list" "tests/expected-failure-github.txt"
            "-expected-failure-list" "tests/expected-failure-linux-gpu.txt"
            "-skip-reference-image-generation"
            "-show-adapter-info"
            "-ignore-abort-msg"
          )

          # Add test server arguments if server count > 1
          if [ "${{ inputs.server-count }}" -gt 1 ]; then
            test_args+=("-use-test-server")
            test_args+=("-server-count" "${{ inputs.server-count }}")
          fi

          # Run coverage with GPU test suite
          ./tools/coverage/run-coverage.sh "${test_args[@]}"

      - name: Generate Coverage Summary
        id: coverage-summary
        run: |
          BUILD_DIR="${BUILD_DIR:-build}"
          CONFIG="${CONFIG:-RelWithDebInfo}"
          COVERAGE_DIR="${COVERAGE_DIR:-$BUILD_DIR/coverage-data}"

          LLVM_COV="${LLVM_COV:-llvm-cov}"
          LIB_EXT="so"
          LIBSLANG="$BUILD_DIR/$CONFIG/lib/libslang.$LIB_EXT"

          # Load slangc compiler-only ignore patterns (shared definition)
          source tools/coverage/slangc-ignore-patterns.sh

          # Generate full library coverage report
          REPORT_OUTPUT=$($LLVM_COV report "$LIBSLANG" -instr-profile="$COVERAGE_DIR/slang-test.profdata" 2>/dev/null || echo "")

          # Generate slangc compiler-only coverage report
          SLANGC_REPORT_OUTPUT=$($LLVM_COV report "$LIBSLANG" -instr-profile="$COVERAGE_DIR/slang-test.profdata" "${SLANGC_IGNORE_ARGS[@]}" 2>/dev/null || echo "")

          if [[ -n "$REPORT_OUTPUT" ]]; then
            TOTALS_LINE=$(echo "$REPORT_OUTPUT" | grep "^TOTAL" | head -1)

            if [[ -n "$TOTALS_LINE" ]]; then
              read -r _ regions_hit regions_total region_pct functions_hit functions_total function_pct lines_hit lines_total line_pct branches_hit branches_total branch_pct <<< "$TOTALS_LINE"

              # Parse slangc-only metrics
              slangc_line_pct=""
              if [[ -n "$SLANGC_REPORT_OUTPUT" ]]; then
                SLANGC_TOTALS=$(echo "$SLANGC_REPORT_OUTPUT" | grep "^TOTAL" | head -1)
                if [[ -n "$SLANGC_TOTALS" ]]; then
                  read -r _ slangc_regions_hit slangc_regions_total slangc_region_pct slangc_functions_hit slangc_functions_total slangc_function_pct slangc_lines_hit slangc_lines_total slangc_line_pct slangc_branches_hit slangc_branches_total slangc_branch_pct <<< "$SLANGC_TOTALS"
                fi
              fi

              echo "coverage=$line_pct" >> $GITHUB_OUTPUT

              # Generate step summary
              cat >> $GITHUB_STEP_SUMMARY <<EOF
          # Coverage Report (Linux GPU)

          ## Full Library
          - **Line Coverage:** ${line_pct}% (${lines_hit} / ${lines_total})
          - **Region Coverage:** ${region_pct}% (${regions_hit} / ${regions_total})
          - **Function Coverage:** ${function_pct}% (${functions_hit} / ${functions_total})
          - **Branch Coverage:** ${branch_pct}% (${branches_hit} / ${branches_total})
          EOF

              if [[ -n "$slangc_line_pct" ]]; then
                cat >> $GITHUB_STEP_SUMMARY <<EOF

          ## slangc Compiler Pipeline
          - **Line Coverage:** ${slangc_line_pct}% (${slangc_lines_hit} / ${slangc_lines_total})
          - **Region Coverage:** ${slangc_region_pct}% (${slangc_regions_hit} / ${slangc_regions_total})
          - **Function Coverage:** ${slangc_function_pct}% (${slangc_functions_hit} / ${slangc_functions_total})
          - **Branch Coverage:** ${slangc_branch_pct}% (${slangc_branches_hit} / ${slangc_branches_total})
          EOF
              fi

              REPORT_DATE=$(date -u +"%Y-%m-%d")
              COMMIT_SHORT=$(git rev-parse --short HEAD)

              # Build JSON with optional slangc fields
              SLANGC_JSON=""
              if [[ -n "$slangc_line_pct" ]]; then
                SLANGC_JSON=$(cat <<SLANGC_EOF
            "slangc_line_coverage": "${slangc_line_pct}",
            "slangc_lines_hit": ${slangc_lines_hit},
            "slangc_lines_found": ${slangc_lines_total},
            "slangc_region_coverage": "${slangc_region_pct}",
            "slangc_regions_hit": ${slangc_regions_hit},
            "slangc_regions_found": ${slangc_regions_total},
            "slangc_function_coverage": "${slangc_function_pct}",
            "slangc_functions_hit": ${slangc_functions_hit},
            "slangc_functions_found": ${slangc_functions_total},
            "slangc_branch_coverage": "${slangc_branch_pct}",
            "slangc_branches_hit": ${slangc_branches_hit},
            "slangc_branches_found": ${slangc_branches_total},
          SLANGC_EOF
              )
              fi

              cat > coverage-summary.json <<EOF
          {
            "date": "${REPORT_DATE}",
            "commit": "${COMMIT_SHORT}",
            "platform": "linux-gpu",
            "platform_detail": "linux-gpu-x86_64",
            "line_coverage": "${line_pct}",
            "lines_hit": ${lines_hit},
            "lines_found": ${lines_total},
            "region_coverage": "${region_pct}",
            "regions_hit": ${regions_hit},
            "regions_found": ${regions_total},
            "function_coverage": "${function_pct}",
            "functions_hit": ${functions_hit},
            "functions_found": ${functions_total},
            "branch_coverage": "${branch_pct}",
            "branches_hit": ${branches_hit},
            "branches_found": ${branches_total},
            ${SLANGC_JSON}
            "_version": 2
          }
          EOF
              echo "Saved coverage summary to coverage-summary.json"
              cat coverage-summary.json
            else
              echo "Error: Could not parse TOTALS line from llvm-cov report"
              exit 1
            fi
          else
            echo "Error: Failed to generate llvm-cov report"
            exit 1
          fi

      - name: Upload Coverage Artifacts for Merging
        if: ${{ !inputs.deploy-pages }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage-linux-gpu-x86_64
          path: |
            coverage-summary.json
            coverage-html/
            coverage-html-slangc/
            build/RelWithDebInfo/coverage-data/slang-test.profdata
            build/RelWithDebInfo/lib/libslang.so
          retention-days: 7

      # Direct deployment not implemented in this workflow
      # The nightly workflow merges artifacts and deploys
