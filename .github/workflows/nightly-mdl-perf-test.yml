name: Nightly MDL Perf Test

# Daily tip-of-tree compile-time sweep. Builds master HEAD on the dedicated
# benchmark runner, runs the perf suite, stores the day's results in the
# perf-results repo under daily/<date>-<sha>/, and rebuilds the tracking series
# (per-release history ++ post-release daily points). See
# tools/compile-perf/DESIGN.md.

on:
  schedule:
    - cron: "0 5 * * *" # daily 05:00 UTC
  workflow_dispatch:
    inputs:
      ref:
        # actions/checkout resolves branches, tags, and full 40-char SHAs
        # only; a short SHA fails with "branch or tag not found".
        description: "full commit SHA or branch to build (blank = master HEAD)"
        default: ""
      samples:
        description: "timed samples per run"
        default: "5"
      only:
        description: "comma-separated workload subset (blank = full suite)"
        default: ""
      publish:
        description: "push results + update tracking + deploy pages (set false for one-off measurements: results are uploaded as a run artifact only)"
        default: "true"
      notify-slack:
        description: "send the Slack notification for this manual run too (scheduled runs always notify) — lets the notification path be tested end-to-end without waiting for the cron"
        default: "false"

concurrency:
  group: nightly-mdl-perf-test
  cancel-in-progress: false # never cancel a running benchmark — timing must be clean

env:
  # Dedicated results repo (mirrors the MDL slang-material-modules-benchmark
  # pattern). Requires a PAT secret SLANG_COMPILE_PERF_PAT with push access.
  PERF_RESULTS_REPO: shader-slang/slang-compile-perf
  # Scheduled runs have no inputs; default to publishing.
  PUBLISH: ${{ github.event.inputs.publish || 'true' }}

permissions:
  contents: read # GITHUB_TOKEN read-only; writes use SLANG_COMPILE_PERF_PAT

jobs:
  nightly:
    # The NVIDIA RGFX perf pool, reached through the VM-based GitHub bridge
    # (rtrci github-bridge target shader-slang/slang:windows-x64-perf) — the
    # SAME pool the release history sweep targets, so absolute timings stay
    # comparable. The pre-VM pool (runner group nvrgfx, label nvrgfx-perf)
    # was retired 2026-07; timings recorded before the migration may show a
    # step at the boundary.
    runs-on:
      labels: [Windows, X64, nvrgfx-perf-kernelvm-bridge]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
          persist-credentials: false
          submodules: "recursive"
          fetch-depth: "0"

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.x"

      - name: Common setup
        uses: ./.github/actions/common-setup
        with:
          os: windows
          compiler: cl
          platform: x86_64
          config: release
          build-llvm: false

      - name: Build Slang (tip of tree)
        run: |
          # Match release.yml flags so daily ToT timings are directly comparable to the
          # release history. LTO is the critical flag: a plain Release build runs sema
          # ~1.5x slower than the official LTO binaries, producing a build-method step
          # at the release->daily boundary rather than a real regression.
          # SLANG_STANDARD_MODULE_DEVELOP_BUILD=OFF also matches release.yml.
          # LLVM is disabled: the prebuilt slang-llvm artifact links against a newer
          # MSVC CRT than is available on the perf runner, causing LNK2001
          # linker errors. The perf suite only uses SPIRV/Metal/WGSL targets which
          # do not need the LLVM backend.
          cmake --preset default --fresh `
            -DSLANG_SLANG_LLVM_FLAVOR=DISABLE `
            -DCMAKE_COMPILE_WARNING_AS_ERROR=false `
            -DSLANG_ENABLE_RELEASE_LTO=ON `
            -DSLANG_STANDARD_MODULE_DEVELOP_BUILD=OFF
          cmake --workflow --preset release

      - name: Checkout MDL-SDK corpus
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          repository: "shader-slang/MDL-SDK"
          # Pin to a known-good commit so corpus drift doesn't silently shift
          # mdl_dxr timings. Update this pin intentionally when refreshing the
          # corpus, then resync history (compile-perf-release-sweep force=true).
          ref: "446562493bed1b175e7cf105425ca3596764652f"
          path: "external/MDL-SDK"
          persist-credentials: false
          sparse-checkout: |
            ./examples/mdl_sdk/dxr/content/slangified

      # NB: persist-credentials stays on (default) here — the "Push results" step
      # below relies on the PAT credential this checkout persists in .git/config.
      - name: Checkout perf results repo
        if: env.PUBLISH == 'true'
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          repository: ${{ env.PERF_RESULTS_REPO }}
          path: "perf-results"
          token: ${{ secrets.SLANG_COMPILE_PERF_PAT }}

      - name: Run nightly sweep + update tracking
        shell: bash
        # Inputs arrive via env and are never interpolated into the script, so a
        # value with shell metacharacters can't break out — it's just an argv item.
        env:
          SAMPLES: ${{ github.event.inputs.samples || '5' }}
          ONLY: ${{ github.event.inputs.only }}
        run: |
          set -euo pipefail
          SUITE="$GITHUB_WORKSPACE/tools/compile-perf"
          RESULTS="$GITHUB_WORKSPACE/perf-results"
          SLANGC="$GITHUB_WORKSPACE/build/Release/bin/slangc.exe"
          LABEL="$(git log -1 --format=%cs HEAD)-$(git rev-parse --short HEAD)"
          COMMIT="$(git rev-parse HEAD)"
          # Full committer timestamp: same-date sibling points (labels carry
          # only the commit's DATE) sort by true code order in the series.
          COMMIT_TIME="$(git log -1 --format=%cI HEAD)"
          CORPUS_SHA="$(git -C "$GITHUB_WORKSPACE/external/MDL-SDK" rev-parse HEAD)"
          # The trend step below judges exactly the point this run registers
          # (daily labels share the swept commit's DATE, so several points can
          # share a date and series order alone cannot identify this run's).
          echo "PERF_LABEL=$LABEL" >> "$GITHUB_ENV"

          # publish=false: measure only — write results to a workspace dir that
          # the artifact step uploads; no tracking registration.
          if [ "$PUBLISH" != "true" ]; then
            RESULTS="$GITHUB_WORKSPACE/bench-results"
          fi

          # MDL corpus for the mdl_dxr workload.
          mkdir -p "$SUITE/corpus/mdl"
          cp external/MDL-SDK/examples/mdl_sdk/dxr/content/slangified/*.slang "$SUITE/corpus/mdl/"

          cd "$SUITE"
          args=(--slangc "$SLANGC" --label "$LABEL" --out "$RESULTS/daily" --samples "$SAMPLES" --warmup 1)
          [ -n "$ONLY" ] && args+=(--only "$ONLY")
          # Daily ToT sweep -> perf-results/daily/<label>/results.json
          python3 bench.py "${args[@]}"
          if [ "$PUBLISH" = "true" ]; then
            # Stamp meta + rebuild perf-results/tracking/tracking.json
            python3 track.py register --results "$RESULTS" --index "$RESULTS/index.json" \
              --label "$LABEL" --commit "$COMMIT" --corpus-sha "$CORPUS_SHA" \
              --commit-time "$COMMIT_TIME"
          fi

      - name: Upload results artifact (publish=false)
        if: always() && env.PUBLISH != 'true'
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: bench-results-${{ github.sha }}
          path: bench-results/
          if-no-files-found: ignore

      # Exercise the api-driver + api workloads every night WITHOUT publishing:
      # they are opt-in for the tracked series until the history is resynced
      # with them, but unexercised code bit-rots — this builds the driver with
      # the host cl and runs all six api workloads against the just-built
      # slang, writing to a scratch dir the job discards. Failures fail the job before results are pushed.
      - name: API workload smoke (non-publishing)
        shell: bash
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE/tools/compile-perf"
          # The list comes from the manifest so a future api workload can never
          # be silently missing here — the one source of truth names them.
          API_WORKLOADS="$(python3 -c 'from lib import manifest; print(",".join(w.name for w in manifest.WORKLOADS if w.mode == "api"))')"
          python3 bench.py --slangc "$GITHUB_WORKSPACE/build/Release/bin/slangc.exe" \
            --label api-smoke --out "$GITHUB_WORKSPACE/api-smoke-results" \
            --samples 1 --warmup 0 \
            --only "$API_WORKLOADS"

      - name: Push results
        if: env.PUBLISH == 'true'
        shell: bash
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE/perf-results"
          git config user.name "slang-perf-bot"
          git config user.email "slang-perf-bot@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then echo "no changes"; exit 0; fi
          git commit -m "nightly ToT $(date -u +%Y-%m-%d) ($(cd "$GITHUB_WORKSPACE" && git rev-parse --short HEAD))"
          git push

      # Remove the PAT credential that actions/checkout baked into perf-results'
      # .git/config — on a persistent self-hosted runner this would otherwise
      # outlive the job and be readable by subsequent jobs.
      - name: Revoke PAT from perf-results git config
        if: always() && env.PUBLISH == 'true'
        shell: bash
        run: |
          git -C "$GITHUB_WORKSPACE/perf-results" config --unset \
            http."https://github.com/".extraheader 2>/dev/null || true

      # Generate HTML reports from ALL data in the results repo and deploy to
      # the gh-pages branch of slang-compile-perf, which is served at
      # shader-slang.org/slang-compile-perf. continue-on-error so a report
      # failure never blocks the trend check below.
      - name: Generate HTML reports
        if: env.PUBLISH == 'true'
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          SUITE="$GITHUB_WORKSPACE/tools/compile-perf"
          RESULTS="$GITHUB_WORKSPACE/perf-results"
          if [ ! -f "$RESULTS/index.json" ]; then
            echo "No index.json in results repo; skipping report generation"
            exit 0
          fi
          cd "$SUITE"
          python3 report.py --results "$RESULTS" --index "$RESULTS/index.json"

      - name: Checkout gh-pages branch
        if: env.PUBLISH == 'true'
        continue-on-error: true
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          repository: ${{ env.PERF_RESULTS_REPO }}
          ref: gh-pages
          path: perf-pages
          token: ${{ secrets.SLANG_COMPILE_PERF_PAT }}

      - name: Deploy HTML reports to GitHub Pages
        if: env.PUBLISH == 'true'
        continue-on-error: true
        shell: bash
        env:
          SLANG_COMPILE_PERF_PAT: ${{ secrets.SLANG_COMPILE_PERF_PAT }}
        run: |
          set -euo pipefail
          ANALYSIS="$GITHUB_WORKSPACE/perf-results/analysis"
          PAGES="$GITHUB_WORKSPACE/perf-pages"

          if [ ! -d "$ANALYSIS" ]; then
            echo "No analysis dir; skipping pages deploy"
            exit 0
          fi

          if [ -d "$PAGES/.git" ]; then
            cd "$PAGES"
            # Remove all tracked files so stale workload pages don't linger
            git rm -rf . --quiet || true
          else
            # gh-pages branch doesn't exist yet — create it as an orphan
            mkdir -p "$PAGES"
            cd "$PAGES"
            git init
            git checkout --orphan gh-pages
            git remote add origin "https://x-access-token:${SLANG_COMPILE_PERF_PAT}@github.com/${{ env.PERF_RESULTS_REPO }}.git"
          fi

          git config user.name "slang-perf-bot"
          git config user.email "slang-perf-bot@users.noreply.github.com"

          cp -r "$ANALYSIS/." .
          mv report_per_workload.html index.html
          # _combined_index.json is a derived intermediate — no need to serve it
          rm -f _combined_index.json
          # Serve files verbatim: without this marker GitHub Pages runs the
          # generated report through legacy Jekyll, whose builds have failed
          # or hung on this content. Must be re-created on every deploy
          # because the `git rm -rf .` above removes it.
          touch .nojekyll

          git add -A
          if git diff --cached --quiet; then echo "no changes"; exit 0; fi
          git commit -m "perf report $(date -u +%Y-%m-%d)"
          git push origin gh-pages

      - name: Revoke PAT from perf-pages git config
        if: always() && env.PUBLISH == 'true'
        shell: bash
        run: |
          git -C "$GITHUB_WORKSPACE/perf-pages" config --unset \
            http."https://github.com/".extraheader 2>/dev/null || true
          git -C "$GITHUB_WORKSPACE/perf-pages" remote set-url origin \
            "https://github.com/${{ env.PERF_RESULTS_REPO }}.git" 2>/dev/null || true

      # Runs AFTER the push so the data is stored even when this step fails the
      # job. trend.py exits non-zero (job red + ::error:: annotations) when a
      # primary timer drifts past threshold vs the trailing median. --label
      # pins the judgement to the point THIS run registered: daily labels are
      # keyed by the swept commit's date, so several points can share a date
      # and the series' last point may be a sibling, not this run's.
      - name: Check trend (fail on regression)
        id: trend
        if: env.PUBLISH == 'true'
        shell: bash
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE/tools/compile-perf"
          python3 trend.py --results "$GITHUB_WORKSPACE/perf-results" --label "${PERF_LABEL:?}"

      - name: Notify Slack
        if: always() && (github.event_name == 'schedule' || github.event.inputs.notify-slack == 'true')
        shell: bash
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_COMPILE_PERF }}
          TREND_OUTCOME: ${{ steps.trend.outcome }}
          JOB_STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$SLACK_WEBHOOK" ]; then
            echo "SLACK_WEBHOOK_COMPILE_PERF not set; skipping Slack notification"
            exit 0
          fi
          export DATE=$(date -u +%Y-%m-%d)
          # A regression must be classified BEFORE the generic-failure case: the
          # trend step exits non-zero on a regression, which also drives
          # job.status to failure, so testing JOB_STATUS first would shadow the
          # regression message. JOB_STATUS then distinguishes "trend skipped
          # because an earlier step failed" (job failed) from "trend skipped
          # because this is a publish=false measurement-only run".
          if [ "$TREND_OUTCOME" = "failure" ]; then
            export ICON=":warning:"
            export STATUS="Regression detected — see CI run for details"
          elif [ "$JOB_STATUS" != "success" ]; then
            export ICON=":x:"
            export STATUS="Nightly job failed — see CI run for details"
          elif [ "$TREND_OUTCOME" = "success" ]; then
            export ICON=":white_check_mark:"
            export STATUS="No regressions detected"
          else
            # Covers every green-job case where the trend step did not run
            # (publish=false today; also a cancelled/regated step) — phrased
            # generically so it stays true if the trend step's gate changes.
            export ICON=":information_source:"
            export STATUS="Trend check did not run — see CI run for details"
          fi
          python3 -c "
          import json, os, urllib.request
          payload = {
              'text': (
                  f'{os.environ[\"ICON\"]} *Compile-perf nightly — {os.environ[\"DATE\"]}*\n'
                  f'{os.environ[\"STATUS\"]}\n'
                  f'• Run: {os.environ[\"RUN_URL\"]}\n'
                  f'• Report: https://shader-slang.org/slang-compile-perf/ '
                  f'(may take a few minutes to update after the run)'
              )
          }
          req = urllib.request.Request(
              os.environ['SLACK_WEBHOOK'],
              data=json.dumps(payload).encode(),
              headers={'Content-Type': 'application/json'})
          # Non-blocking by contract: a Slack outage must not red an
          # otherwise-green run (a red step here would be indistinguishable
          # from a real regression at a glance). The ::warning:: annotation
          # keeps a broken webhook visible on the run summary.
          try:
              urllib.request.urlopen(req, timeout=10)
              print('Slack notification sent')
          except Exception as e:
              print(f'::warning title=Slack notification failed::{e}')
          "
