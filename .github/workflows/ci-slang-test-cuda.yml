name: CI CUDA Test Workflow

on:
  workflow_call:
    inputs:
      config:
        required: true
        type: string
      server-count:
        required: false
        type: number
        default: 4
      enable-debug-layers:
        required: false
        type: boolean
        default: true

jobs:
  # Run CUDA tests in CUDA image (has working CUDA support)
  # Note: Vulkan tests are skipped due to NVIDIA Vulkan ICD not working in containers
  # with .run driver installation. Vulkan coverage is provided by Windows GPU tests.
  test-slang-cuda:
    runs-on: ["Linux", "self-hosted", "GPU"]
    timeout-minutes: 60
    container:
      image: nvidia/cuda:12.9.1-devel-ubuntu22.04
      options: --gpus all --user root

    defaults:
      run:
        shell: bash

    steps:
      - name: Install Git and dependencies
        run: |
          apt-get update && apt-get install -y \
            git \
            libx11-6 \
            python3
          git config --global --add safe.directory '*'

      - uses: actions/checkout@v4
        with:
          submodules: "recursive"
          fetch-depth: "1"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: slang-tests-linux-x86_64-gcc-${{ inputs.config }}-cuda
          path: artifacts

      - name: Setup test environment
        run: |
          if [[ "${{ inputs.config }}" == "release" ]]; then
            cmake_config="Release"
          else
            cmake_config="Debug"
          fi
          echo "cmake_config=$cmake_config" >> $GITHUB_ENV

          bin_dir="$PWD/artifacts/${cmake_config}/bin"
          echo "bin_dir=$bin_dir" >> $GITHUB_ENV

          chmod +x "$bin_dir"/* 2>/dev/null || true
          echo "LD_LIBRARY_PATH=$PWD/artifacts/${cmake_config}/lib:$LD_LIBRARY_PATH" >> $GITHUB_ENV

          # Verify GPU is accessible
          echo "=== GPU Info ==="
          nvidia-smi

          # Check CUDA
          echo "=== CUDA libraries ==="
          ldconfig -p | grep -i cuda || echo "No CUDA libraries in ldconfig"

      - name: Test Slang (CUDA API)
        run: |
          slang_test_args=(
            "-category" "full"
            "-api" "cuda"
            "-expected-failure-list" "tests/expected-failure-github.txt"
            "-expected-failure-list" "tests/expected-failure-linux-gpu.txt"
            "-skip-reference-image-generation"
            "-show-adapter-info"
            "-ignore-abort-msg"
          )

          if [ "${{ inputs.server-count }}" -gt 1 ]; then
            slang_test_args+=("-use-test-server")
            slang_test_args+=("-server-count" "${{ inputs.server-count }}")
          fi

          "$bin_dir/slang-test" "${slang_test_args[@]}"

      - name: Run slangc tests
        run: |
          PATH=$bin_dir:$PATH tools/slangc-test/test.sh

  # Run slang-rhi CUDA/OptiX tests (skip Vulkan-dependent tests)
  test-slang-rhi:
    runs-on: ["Linux", "self-hosted", "GPU"]
    timeout-minutes: 30
    container:
      image: nvidia/cuda:12.9.1-devel-ubuntu22.04
      options: --gpus all --user root

    defaults:
      run:
        shell: bash

    steps:
      - name: Install Git and dependencies
        run: |
          apt-get update && apt-get install -y git libx11-6
          git config --global --add safe.directory '*'

      - uses: actions/checkout@v4
        with:
          submodules: "recursive"
          fetch-depth: "1"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: slang-tests-linux-x86_64-gcc-${{ inputs.config }}-cuda
          path: artifacts

      - name: Setup test environment
        run: |
          if [[ "${{ inputs.config }}" == "release" ]]; then
            cmake_config="Release"
          else
            cmake_config="Debug"
          fi
          echo "cmake_config=$cmake_config" >> $GITHUB_ENV

          bin_dir="$PWD/artifacts/${cmake_config}/bin"
          echo "bin_dir=$bin_dir" >> $GITHUB_ENV

          chmod +x "$bin_dir"/* 2>/dev/null || true
          echo "LD_LIBRARY_PATH=$PWD/artifacts/${cmake_config}/lib:$LD_LIBRARY_PATH" >> $GITHUB_ENV

      - name: Run slang-rhi tests (OptiX 8.0)
        run: |
          "$bin_dir/slang-rhi-tests" -check-devices -optix-version=80000 -tc="ray-tracing-*.cuda"

      - name: Run slang-rhi tests (OptiX 8.1)
        run: |
          "$bin_dir/slang-rhi-tests" -check-devices -optix-version=80100 -tc="ray-tracing-*.cuda"

  # Skip slangpy tests - requires LLVM which is disabled in CUDA builds
  # Skip Vulkan tests - NVIDIA Vulkan ICD doesn't work in CUDA containers
