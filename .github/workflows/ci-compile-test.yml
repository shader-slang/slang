name: CI Compile Regression Test Workflow

on:
  workflow_call:

permissions:
  contents: read
  actions: read

jobs:
  test-compile-regression:
    name: Test (Compile Regression)
    timeout-minutes: 60
    runs-on: [Windows, self-hosted, regression-test]
    defaults:
      run:
        shell: bash
    steps:
      - name: Add Git Bash to PATH
        shell: pwsh
        run: |
          Add-Content -Path $env:GITHUB_PATH -Value "C:\\Program Files\\Git\\bin"
          Add-Content -Path $env:GITHUB_PATH -Value "C:\\Program Files\\Git\\usr\\bin"
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
          submodules: "false"
          fetch-depth: "1"
      - name: Download Slang build
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: slang-tests-windows-x86_64-cl-release
          path: build
      - name: Run compile and validation test
        run: |
          set -euo pipefail
          SLANGC_PATH="$(pwd)/build/Release/bin/slangc.exe"
          [[ -f "$SLANGC_PATH" ]] || { echo "Missing required file: $SLANGC_PATH" >&2; exit 1; }
          cp -r /c/slang_compile_test_suite_a .
          cd slang_compile_test_suite_a
          export SLANGC_PATH
          bash ./compile_all_slang.sh
