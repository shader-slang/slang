name: Export LLVM to GCS

on:
  workflow_dispatch:
    inputs:
      config:
        description: "LLVM configuration to export"
        required: true
        type: choice
        options:
          - linux-gcc-x86_64
          - linux-gcc-aarch64
          - linux-clang-18-x86_64
          - macos-clang-aarch64
          - windows-cl-x86_64

jobs:
  export:
    runs-on: ${{
      inputs.config == 'linux-gcc-aarch64' && 'ubuntu-24.04-arm' ||
      inputs.config == 'macos-clang-aarch64' && 'macos-latest' ||
      inputs.config == 'windows-cl-x86_64' && 'windows-latest' ||
      'ubuntu-22.04'
    }}
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Parse configuration
        id: parse
        shell: bash
        run: |
          CONFIG="${{ inputs.config }}"
          OS=$(echo $CONFIG | cut -d'-' -f1)
          COMPILER=$(echo $CONFIG | cut -d'-' -f2)
          PLATFORM=$(echo $CONFIG | cut -d'-' -f3)

          # Handle clang-18 case
          if [[ "$COMPILER" == "clang" && "$PLATFORM" == "18" ]]; then
            COMPILER="clang-18"
            PLATFORM=$(echo $CONFIG | cut -d'-' -f4)
          fi

          echo "os=$OS" >> $GITHUB_OUTPUT
          echo "compiler=$COMPILER" >> $GITHUB_OUTPUT
          echo "platform=$PLATFORM" >> $GITHUB_OUTPUT

      # Restore from existing GitHub Actions cache
      - name: Restore LLVM from GitHub Actions cache
        uses: actions/cache/restore@v4
        id: cache-llvm
        with:
          path: build/llvm-project-install
          key: llvm-${{ steps.parse.outputs.os }}-${{ steps.parse.outputs.compiler }}-${{ steps.parse.outputs.platform }}-${{ hashFiles('external/build-llvm.sh') }}

      - name: Verify LLVM was restored
        if: steps.cache-llvm.outputs.cache-hit != 'true'
        shell: bash
        run: |
          echo "ERROR: LLVM cache not found!"
          echo "Configuration: ${{ inputs.config }}"
          echo "Cache key: llvm-${{ steps.parse.outputs.os }}-${{ steps.parse.outputs.compiler }}-${{ steps.parse.outputs.platform }}-${{ hashFiles('external/build-llvm.sh') }}"
          exit 1

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/125098404903/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider"
          service_account: "github-ci@slang-runners.iam.gserviceaccount.com"

      - name: Compress and upload to GCS
        shell: bash
        run: |
          LLVM_HASH="${{ hashFiles('external/build-llvm.sh') }}"
          LLVM_KEY="llvm-${{ steps.parse.outputs.os }}-${{ steps.parse.outputs.compiler }}-${{ steps.parse.outputs.platform }}-${LLVM_HASH}"

          echo "📦 Compressing LLVM prebuilt: ${LLVM_KEY}"

          cd build/llvm-project-install

          echo "📊 Size before compression:"
          du -sh .

          echo "Compressing with zstd..."
          tar -cf - . | zstd -3 > /tmp/${LLVM_KEY}.tar.zst

          echo "📊 Compressed size:"
          ls -lh /tmp/${LLVM_KEY}.tar.zst

          echo "📤 Uploading to GCS..."
          gsutil cp /tmp/${LLVM_KEY}.tar.zst gs://slang-ci-cache/llvm-prebuilts/

          echo "🔓 Making publicly readable..."
          gsutil acl ch -u AllUsers:R gs://slang-ci-cache/llvm-prebuilts/${LLVM_KEY}.tar.zst

          echo "✅ Upload complete!"
          echo ""
          echo "GCS object details:"
          gsutil ls -lh gs://slang-ci-cache/llvm-prebuilts/${LLVM_KEY}.tar.zst

          # Cleanup
          rm /tmp/${LLVM_KEY}.tar.zst
