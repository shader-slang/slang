name: CMake Options Build (reusable)

# Reusable workflow: builds Slang once per matrix entry (each option set to
# its non-default value) for a given platform / compiler / config combination.
# Called from cmake-options.yml.

on:
  workflow_call:
    inputs:
      os:
        required: true
        type: string
      compiler:
        required: true
        type: string
      platform:
        required: true
        type: string
      config:
        required: true
        type: string
      runs-on:
        required: true
        type: string
      buildtool:
        description: >
          CMake -G value (e.g. "Visual Studio 17 2022"). When set, cmake is
          invoked directly with -G instead of --preset default. Leave empty
          to use --preset default (Ninja Multi-Config).
        required: false
        type: string
        default: ""
      arch:
        description: >
          MSVC cross-compilation architecture passed to ilammy/msvc-dev-cmd
          (e.g. "amd64_arm64" for Windows aarch64 cross-compilation). When
          set, a second msvc-dev-cmd step runs after common-setup to switch
          the compiler environment. Leave empty for native compilation.
        required: false
        type: string
        default: ""

jobs:
  build:
    runs-on: ${{ fromJSON(inputs.runs-on) }}
    timeout-minutes: 120
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          # The non-default value for each boolean option is determined at
          # configure time by querying cmake -LA (see Configure CMake step).
          # SLANG_LIB_TYPE is non-boolean and needs an explicit value.

          - option: SLANG_EMBED_CORE_MODULE_SOURCE
          - option: SLANG_EMBED_CORE_MODULE
          - option: SLANG_ENABLE_DXIL
          - option: SLANG_ENABLE_PCH
          - option: SLANG_STANDARD_MODULE_DEVELOP_BUILD
          - option: SLANG_ENABLE_SLANGD
            # slang-test hard-depends on slangd; examples include platform/window.h
            # which only exists under the tests target; disable both when slangd is off.
            extra_cmake_flags: "-DSLANG_ENABLE_TESTS=OFF -DSLANG_ENABLE_EXAMPLES=OFF"
          - option: SLANG_ENABLE_SLANGC
            # GFX references $<TARGET_FILE_DIR:slangc>; disable GFX when slangc is off.
            extra_cmake_flags: "-DSLANG_ENABLE_GFX=OFF"
          - option: SLANG_ENABLE_SLANGI
          - option: SLANG_ENABLE_SLANGRT
          - option: SLANG_ENABLE_SLANG_GLSLANG
          - option: SLANG_ENABLE_TESTS
            # example-base references headers from the platform/test target.
            extra_cmake_flags: "-DSLANG_ENABLE_EXAMPLES=OFF"
          - option: SLANG_ENABLE_EXAMPLES
          - option: SLANG_ENABLE_REPLAYER
          - option: SLANG_ENABLE_RELEASE_DEBUG_INFO
          - option: SLANG_ENABLE_SPLIT_DEBUG_INFO
          - option: SLANG_ENABLE_FULL_IR_VALIDATION
          # SLANG_ENABLE_IR_BREAK_ALLOC: the default preset overrides this with a
          # generator expression (ON for Debug, OFF for Release), which cmake -LA
          # cannot resolve at configure time. Use value_debug/value_release to
          # test the non-default value for each config.
          - option: SLANG_ENABLE_IR_BREAK_ALLOC
            value_debug: "OFF"
            value_release: "ON"
          - option: SLANG_EXCLUDE_DAWN
          - option: SLANG_EXCLUDE_TINT
          - option: SLANG_ENABLE_SPIRV_TOOLS_MIMALLOC
          - option: SLANG_ENABLE_RELEASE_LTO
          - option: SLANG_IGNORE_ABORT_MSG
          - option: SLANG_ENABLE_TIME_TRACE
          # SLANG_ENABLE_XLIB: defined as a STRING option (AUTO/ON/OFF) via auto_option,
          # so cmake -LA shows :STRING= not :BOOL=; an explicit value is required.
          - option: SLANG_ENABLE_XLIB
            value: "ON"
            linux_only: "true"
          - option: SLANG_ENABLE_SLANG_RHI
            # GFX, examples, and tests all require slang-rhi; disable them when off.
            extra_cmake_flags: >-
              -DSLANG_ENABLE_GFX=OFF
              -DSLANG_ENABLE_EXAMPLES=OFF
              -DSLANG_ENABLE_TESTS=OFF

          # Non-boolean: default is SHARED, always test STATIC.
          - option: SLANG_LIB_TYPE
            value: "STATIC"

          # System library options are linux_only because they require apt packages.
          # TODO: these currently fail because the Ubuntu apt packages for lz4, vulkan-headers,
          # spirv-headers, and glslang do not ship cmake config files, so find_package()
          # (config mode) cannot locate them. Re-enable once CMakeLists.txt adds a
          # pkg-config / find_library fallback for each of these options.
          # - option: SLANG_USE_SYSTEM_LZ4
          #   apt_packages: "liblz4-dev"
          #   linux_only: "true"
          # - option: SLANG_USE_SYSTEM_VULKAN_HEADERS
          #   apt_packages: "libvulkan-dev"
          #   linux_only: "true"
          # - option: SLANG_USE_SYSTEM_SPIRV_HEADERS
          #   apt_packages: "spirv-headers"
          #   linux_only: "true"
          # - option: SLANG_USE_SYSTEM_GLSLANG
          #   apt_packages: "glslang-dev"
          #   linux_only: "true"

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: "recursive"
          fetch-depth: "2"

      - name: Setup
        uses: ./.github/actions/common-setup
        with:
          os: ${{ inputs.os }}
          compiler: ${{ inputs.compiler }}
          platform: ${{ inputs.platform }}
          config: ${{ inputs.config }}
          build-llvm: false

      - name: Build generators (host architecture, for cross-compilation)
        if: inputs.os == 'windows' && inputs.arch != ''
        run: |
          cmake --workflow --preset generators --fresh
          mkdir build-platform-generators
          cmake --install build --config Release --component generators \
            --prefix build-platform-generators

      - name: Set up MSVC cross-compilation
        if: inputs.os == 'windows' && inputs.arch != ''
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ inputs.arch }}

      - name: Install system apt packages
        if: matrix.apt_packages != '' && inputs.os == 'linux'
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.apt_packages }}

      - name: Configure CMake (${{ matrix.option }})
        if: matrix.linux_only != 'true' || inputs.os == 'linux'
        run: |
          option="${{ matrix.option }}"
          value="${{ matrix.value }}"

          # Options whose preset default varies by config use value_debug /
          # value_release instead of a single value field.
          if [[ -z "$value" && "${{ inputs.config }}" == "debug" && -n "${{ matrix.value_debug }}" ]]; then
            value="${{ matrix.value_debug }}"
          elif [[ -z "$value" && "${{ inputs.config }}" != "debug" && -n "${{ matrix.value_release }}" ]]; then
            value="${{ matrix.value_release }}"
          fi

          # For boolean options (no explicit value in the matrix), query the
          # current cmake default and test the opposite so the matrix stays
          # in sync automatically when defaults change.
          if [[ -z "$value" ]]; then
            defaultVal=$(
              cmake --preset default --fresh \
                -DSLANG_SLANG_LLVM_FLAVOR=DISABLE \
                -DSLANG_USE_SCCACHE=OFF \
                -LA 2>/dev/null \
              | grep -E "^${option}:BOOL=" \
              | sed 's/.*=//'
            )
            case "$defaultVal" in
              ON) value=OFF ;;
              OFF) value=ON ;;
              *) echo "ERROR: could not detect boolean default for ${option} (got '${defaultVal}')"; exit 1 ;;
            esac
            echo "Detected default=${defaultVal}, testing ${option}=${value}"
            rm -fr build
          fi

          # When cross-compiling (arch set), generators were pre-built for the
          # host architecture and installed to build-platform-generators/.
          generators_path=""
          if [[ -n "${{ inputs.arch }}" ]]; then
            generators_path="-DSLANG_GENERATORS_PATH=build-platform-generators/bin"
          fi

          # SLANG_USE_SCCACHE=OFF prevents the env-var auto-activation path in
          # CMakeLists.txt from silently enabling sccache and polluting the
          # shared cache with objects built under non-default CMake options.
          if [[ -n "${{ inputs.buildtool }}" ]]; then
            cmake --fresh \
              -G "${{ inputs.buildtool }}" \
              -B build \
              -DSLANG_SLANG_LLVM_FLAVOR=DISABLE \
              -DSLANG_USE_SCCACHE=OFF \
              -DCMAKE_COMPILE_WARNING_AS_ERROR=ON \
              $generators_path \
              "-D${option}=${value}" \
              ${{ matrix.extra_cmake_flags || '' }}
          else
            cmake --preset default --fresh \
              -DSLANG_SLANG_LLVM_FLAVOR=DISABLE \
              -DSLANG_USE_SCCACHE=OFF \
              -DCMAKE_COMPILE_WARNING_AS_ERROR=ON \
              $generators_path \
              "-D${option}=${value}" \
              ${{ matrix.extra_cmake_flags || '' }}
          fi

      - name: Build Slang (${{ matrix.option }})
        if: matrix.linux_only != 'true' || inputs.os == 'linux'
        run: cmake --build build --config "$cmake_config"
