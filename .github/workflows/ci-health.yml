name: CI Health

on:
  schedule:
    - cron: "*/15 * * * *" # Every 15 minutes
  workflow_dispatch: {} # Manual trigger

concurrency:
  group: slang-ci-analytics-publish
  cancel-in-progress: false

jobs:
  update-health:
    # RUNNER SELECTION — switchable via the `ANALYTICS_RUNS_ON` repository
    # variable, WITHOUT a code change (Settings → Secrets and variables →
    # Actions → Variables): unset (default) → GitHub-hosted `ubuntu-latest`;
    # set to a runs-on JSON string (e.g. `["Linux", "self-hosted",
    # "analytics", "GCP"]`) → the GCP analytics pool.
    #
    # NOTE: this cap-health monitor was deliberately moved off the GitHub-hosted
    # pool (June 2026) because running it on `ubuntu-latest` starves it on the
    # very 20-runner cap it measures, biasing the samples. Prefer keeping it on
    # the GCP analytics pool (set the variable) unless the Teams-tier cap has
    # ample headroom. Same variable drives ci-analytics.yml and the ci.yml
    # wait-for-human-priority gate.
    runs-on: ${{ vars.ANALYTICS_RUNS_ON && fromJSON(vars.ANALYTICS_RUNS_ON) || fromJSON('["ubuntu-latest"]') }}
    permissions:
      contents: read
      actions: read
      id-token: write # Required for Workload Identity

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: "projects/125098404903/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider"
          service_account: "github-ci@slang-runners.iam.gserviceaccount.com"

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      - name: Checkout analytics repo
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          repository: shader-slang/slang-ci-analytics
          path: ci_analytics_repo
          token: ${{ secrets.CI_ANALYTICS_PAT }}

      - name: Generate health page
        env:
          GH_TOKEN: ${{ secrets.CI_ANALYTICS_PAT }}
        run: |
          python3 extras/ci/analytics/ci_health.py \
            --output ci_analytics_repo

      - name: Generate status page
        run: |
          python3 extras/ci/analytics/ci_status.py \
            --output ci_analytics_repo

      - name: Push health page
        run: |
          cd ci_analytics_repo || exit 1
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add health.html status.html
          git add health_snapshots.jsonl 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "Update CI health $(date -u +%Y-%m-%dT%H:%M)"
            for attempt in 1 2 3; do
              if git push; then
                exit 0
              fi
              if [ "$attempt" -eq 3 ]; then
                break
              fi
              echo "Push failed on attempt ${attempt}; rebasing before retry..."
              git pull --rebase || {
                echo "Failed to rebase CI health before retry" >&2
                exit 1
              }
            done
            echo "Failed to push CI health after retries" >&2
            exit 1
          fi
