name: CI

on:
  workflow_dispatch:
  merge_group:
    types: [checks_requested]
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened, ready_for_review]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'push' }}
jobs:
  filter:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft != true
    runs-on: ubuntu-latest
    outputs:
      should-run: ${{ steps.filter.outputs.should-run }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: "2"
      - id: filter
        run: |
          # This step prevents subsequent steps from running if only documentation was changed
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git fetch origin ${{ github.base_ref }}
            BASE=origin/${{ github.base_ref }}
          else
            BASE=HEAD^1
          fi

          shouldRun=true
          if files="$(git diff --name-only $BASE...HEAD)"; then
            # Git diff succeeded, check if non-documentation files were changed
            if echo "$files" | grep -qvE '^(docs/|LICENSES/|LICENSE$|CONTRIBUTING\.md$|README\.md$)'; then
              shouldRun=true
            else
              echo "Only documentation files changed, skipping remaining steps"
              shouldRun=false
            fi
          else
            echo "Git diff failed, conservatively running tests"
            shouldRun=true
          fi
          echo "should-run=$shouldRun" >> $GITHUB_OUTPUT

  # Full CI matrix lives in ci-matrix.yml so /ci slash command can reuse it.
  # Inputs default to empty/false → reusable workflows fall back to github.sha
  # and event-derived IS_FORK_PR, matching pre-extraction behavior exactly.
  matrix:
    needs: [filter]
    if: needs.filter.outputs.should-run == 'true'
    uses: ./.github/workflows/ci-matrix.yml

  # Top-level check-ci preserves the "CI / check-ci" check name that branch
  # protection requires, AND ensures docs-only PRs (matrix skipped via filter)
  # still report a green check rather than leaving "Expected — Waiting for
  # status" forever. Succeeds when matrix succeeded or was skipped; fails when
  # matrix failed or was cancelled.
  check-ci:
    needs: [filter, matrix]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Summarize matrix result
        env:
          MATRIX_RESULT: ${{ needs.matrix.result }}
          FILTER_SHOULD_RUN: ${{ needs.filter.outputs.should-run }}
        run: |
          echo "filter should-run: $FILTER_SHOULD_RUN"
          echo "matrix result:     $MATRIX_RESULT"
          case "$MATRIX_RESULT" in
            success)
              echo "All CI matrix jobs passed."
              exit 0
              ;;
            skipped)
              if [[ "$FILTER_SHOULD_RUN" == "false" ]]; then
                echo "Docs-only PR — matrix correctly skipped."
                exit 0
              fi
              echo "::error::Matrix was skipped but filter expected it to run."
              exit 1
              ;;
            failure|cancelled)
              echo "::error::CI matrix $MATRIX_RESULT"
              exit 1
              ;;
            *)
              echo "::error::Unexpected matrix result: $MATRIX_RESULT"
              exit 1
              ;;
          esac

  # Automatically retry GPU health check failures by dispatching ci-retry.yml,
  # which watches this run until it completes, then reruns only failed jobs.
  # Capped at 2 automatic retries via run_attempt check.
  retry-on-gpu-failure:
    needs: [matrix]
    if: failure() && github.event_name == 'merge_group' && fromJSON(github.run_attempt) < 3
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Check for GPU health check failures and dispatch retry
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: |
          gpu_failures=$(gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100" \
            --jq '[.jobs[]
              | select(.conclusion == "failure")
              | select(any(.steps[]?;
                  (.name == "GPU health check" and .conclusion == "failure") or
                  (.name == "GPU post-test diagnostics" and .conclusion == "failure")
                ))
            ] | length' \
            || echo "0")
          gpu_failures=${gpu_failures:-0}
          if ! [[ "$gpu_failures" =~ ^[0-9]+$ ]]; then
            gpu_failures=0
          fi

          if [ "$gpu_failures" -gt 0 ]; then
            echo "Found $gpu_failures GPU failure(s) — dispatching retry workflow..."
            gh workflow run ci-retry.yml -F run_id=${{ github.run_id }}
          else
            echo "No GPU failures — not retrying."
          fi
