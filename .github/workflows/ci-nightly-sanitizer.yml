name: Nightly Sanitizer

on:
  schedule:
    # Run nightly at 2:00 AM UTC
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  sanitizer-nightly:
    uses: ./.github/workflows/ci-slang-sanitizer.yml
    with:
      runs-on: '["ubuntu-22.04"]'
      # Nightly runs can afford broader coverage than PR smoke tests
      test-category: smoke
      server-count: 8
