name: CI MaterialX Regression Test Workflow

on:
  workflow_call:
    inputs:
      os:
        required: true
        type: string
      compiler:
        required: true
        type: string
      platform:
        required: true
        type: string
      config:
        required: true
        type: string
      runs-on:
        required: true
        type: string

jobs:
  materialx-integration:
    runs-on: ${{ fromJSON(inputs.runs-on) }}
    timeout-minutes: 15
    defaults:
      run:
        shell: bash
    env:
      # Pinned MaterialX commit that includes generateshader.py with the
      # slang target. Also part of the shader-corpus cache key below, so
      # bumping the pin automatically regenerates the cached corpus.
      # TODO: Switch to a stable release tag; v1.39.5 is the first release
      # containing the slang target.
      MATERIALX_COMMIT: 3bd5fa90225169d90e1cd83ca12c732a461025f8

    steps:
      # This job never builds Slang from source (it downloads a prebuilt
      # artifact), so the checkout only needs the workflow's local actions
      # and scripts — not the large submodule tree.
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: "1"

      - name: Check disk space
        uses: ./.github/actions/check-disk-space

      - name: Download Slang Artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          # Linux uses containerized builds with a different artifact naming pattern
          name: ${{ inputs.os == 'linux' && format('slang-tests-linux-x86_64-gcc-{0}', inputs.config) || format('slang-tests-{0}-{1}-{2}-{3}', inputs.os, inputs.platform, inputs.compiler, inputs.config) }}
          path: github_artifact

      - name: Setup Slang Path
        run: |
          # Set up bin_dir for slangc
          if [ "${{ inputs.os }}" == "windows" ]; then
            bin_dir="$(pwd)/github_artifact/Release/bin"
            SLANGC="${bin_dir}/slangc.exe"
          else
            bin_dir="$(pwd)/github_artifact/Release/bin"
            SLANGC="${bin_dir}/slangc"

            # Make executables executable on Unix systems
            chmod +x "${bin_dir}"/* 2>/dev/null || echo "Could not chmod all files"
            chmod +x "$SLANGC" || echo "Could not chmod slangc"
          fi

          echo "bin_dir=$bin_dir" >> $GITHUB_ENV
          echo "SLANGC=$SLANGC" >> $GITHUB_ENV

          # Verify slangc exists and is executable
          if [ ! -f "$SLANGC" ]; then
            echo "ERROR: slangc not found at: $SLANGC"
            echo "Artifact directory contents:"
            ls -laR github_artifact/ || true
            exit 1
          fi

          echo "Found slangc at: $SLANGC"
          "$SLANGC" --version || echo "Could not get slangc version"

      # The generated shader corpus is a pure function of the pinned
      # MaterialX commit and the generation logic in this workflow file
      # (both hashed into the key) — it never depends on the PR's Slang
      # changes, because generateshader.py runs MaterialX's own code
      # generator without involving slangc. On a cache hit the clone,
      # build, and generate steps below are skipped and the job goes
      # straight to compiling the corpus with the PR's slangc.
      - name: Restore generated shader corpus
        id: corpus-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ${{ runner.temp }}/materialx-test/generated-shaders
          key: materialx-corpus-${{ inputs.os }}-${{ env.MATERIALX_COMMIT }}-${{ hashFiles('.github/workflows/ci-materialx-regression-test.yml') }}

      - name: Setup Python
        if: steps.corpus-cache.outputs.cache-hit != 'true'
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.10"

      - name: Clone MaterialX
        if: steps.corpus-cache.outputs.cache-hit != 'true'
        run: |
          echo "===================================================================="
          echo "MaterialX → Slang Integration Test"
          echo "Platform: ${{ inputs.os }} | Config: ${{ inputs.config }}"
          echo "===================================================================="

          WORK_DIR="${RUNNER_TEMP}/materialx-test"
          mkdir -p "$WORK_DIR"
          cd "$WORK_DIR"

          echo "Cloning MaterialX repository..."
          git clone https://github.com/AcademySoftwareFoundation/MaterialX.git
          cd MaterialX
          git checkout "$MATERIALX_COMMIT"
          echo "SUCCESS: MaterialX cloned at commit $MATERIALX_COMMIT"

      - name: Build MaterialX
        if: steps.corpus-cache.outputs.cache-hit != 'true'
        run: |
          WORK_DIR="${RUNNER_TEMP}/materialx-test"
          cd "$WORK_DIR/MaterialX"

          echo "Configuring MaterialX build..."
          mkdir -p build
          cd build

          cmake \
            -DMATERIALX_BUILD_PYTHON=ON \
            -DMATERIALX_INSTALL_PYTHON=ON \
            -DMATERIALX_BUILD_VIEWER=OFF \
            -DMATERIALX_BUILD_GRAPH_EDITOR=OFF \
            -DMATERIALX_BUILD_TESTS=OFF \
            -DMATERIALX_BUILD_RENDER=OFF \
            ..

          echo "Building MaterialX (this may take a few minutes)..."
          cmake --build . --config Release -j 4

          echo "Installing MaterialX..."
          cmake --install . --config Release --prefix ../install

          echo "SUCCESS: MaterialX built and installed successfully"

      - name: Generate Slang Shaders from MaterialX
        if: steps.corpus-cache.outputs.cache-hit != 'true'
        run: |
          WORK_DIR="${RUNNER_TEMP}/materialx-test"
          cd "$WORK_DIR"

          # Set PYTHONPATH with correct separator for the platform
          if [ "${{ inputs.os }}" == "windows" ]; then
            export PYTHONPATH="$WORK_DIR/MaterialX/install/python;$PYTHONPATH"
          else
            export PYTHONPATH="$WORK_DIR/MaterialX/install/python:$PYTHONPATH"
          fi

          GENERATESHADER="$WORK_DIR/MaterialX/install/python/Scripts/generateshader.py"
          MATERIALX_RESOURCES="$WORK_DIR/MaterialX/resources/Materials/TestSuite"

          mkdir -p generated-shaders

          echo "Generating Slang shaders from MaterialX test suite..."

          # Find all .mtlx files and generate shaders
          # Use -printf to get paths relative to MATERIALX_RESOURCES (works cross-platform)
          cd "$MATERIALX_RESOURCES"
          MTLX_FILES=($(find . -name "*.mtlx" -type f | sed 's|^\./||' | sort))
          TOTAL_MTLX=${#MTLX_FILES[@]}
          echo "Found $TOTAL_MTLX MaterialX documents"

          # Go back to work directory where generated-shaders will be created
          cd "$WORK_DIR"

          SUCCESS_COUNT=0
          FAILED_COUNT=0
          SKIPPED_COUNT=0
          CURRENT=0

          for RELATIVE_PATH in "${MTLX_FILES[@]}"; do
            CURRENT=$((CURRENT + 1))
            MATERIAL_PATH="$MATERIALX_RESOURCES/$RELATIVE_PATH"
            CATEGORY=$(dirname "$RELATIVE_PATH")
            CATEGORY_DIR="generated-shaders/$CATEGORY"
            mkdir -p "$CATEGORY_DIR"

            echo "[$CURRENT/$TOTAL_MTLX] Generating $RELATIVE_PATH"

            # Skip Blackbody.slang due to upstream MaterialX code generation issue
            if [[ "$RELATIVE_PATH" == "pbrlib/bsdf/blackbody.mtlx" ]]; then
              echo "  -> Skipped (MaterialX const issue)"
              SKIPPED_COUNT=$((SKIPPED_COUNT + 1))
              continue
            fi

            ERROR_LOG=$(mktemp)
            if python3 "$GENERATESHADER" --target slang --outputPath "$CATEGORY_DIR" "$MATERIAL_PATH" > /dev/null 2>"$ERROR_LOG"; then
              # Check if shader was created
              if find "$CATEGORY_DIR" -name "*.slang" -maxdepth 1 -type f 2>/dev/null | grep -q .; then
                SUCCESS_COUNT=$((SUCCESS_COUNT + 1))
                echo "  -> OK"
              else
                SKIPPED_COUNT=$((SKIPPED_COUNT + 1))
                echo "  -> Skipped (no renderable)"
              fi
            else
              FAILED_COUNT=$((FAILED_COUNT + 1))
              echo "  -> FAILED"
              # Show error for first failure only
              if [ $FAILED_COUNT -eq 1 ]; then
                echo "  First failure error:"
                cat "$ERROR_LOG" | head -20
              fi
            fi
            rm -f "$ERROR_LOG"
          done

          SHADER_COUNT=$(find generated-shaders -name "*.slang" -type f | wc -l | xargs)

          echo "Generation complete:"
          echo "  Success:  $SUCCESS_COUNT"
          echo "  Skipped:  $SKIPPED_COUNT (no renderable elements or explicitly skipped)"
          echo "  Failed:   $FAILED_COUNT"
          echo "  Generated $SHADER_COUNT shaders"

          if [ $FAILED_COUNT -gt 0 ]; then
            echo "ERROR: Some shaders failed to generate"
            exit 1
          fi

      - name: Compile Shaders with slangc
        run: |
          WORK_DIR="${RUNNER_TEMP}/materialx-test"
          cd "$WORK_DIR"

          echo "Compiling shaders with slangc..."
          echo "Using: $SLANGC"

          SHADER_FILES=($(find generated-shaders -name "*.slang" -type f | sort))
          TOTAL_SHADERS=${#SHADER_FILES[@]}
          echo "Found $TOTAL_SHADERS generated shaders"

          if [ "$TOTAL_SHADERS" -eq 0 ]; then
            echo "ERROR: no generated shaders found; the restored corpus cache or the generation step produced nothing"
            exit 1
          fi

          # Compile the shaders in parallel. Each worker writes its verdict
          # (and, for failures, the compiler log) to a per-shader file under
          # RESULTS_DIR so that concurrent workers never interleave partial
          # output; the aggregation pass below reads those files back.
          RESULTS_DIR=$(mktemp -d)
          export RESULTS_DIR SLANGC

          compile_one() {
            local shader_path="$1"
            local relative_path="${shader_path#generated-shaders/}"
            local result_file="$RESULTS_DIR/${relative_path//\//__}"
            local out log
            out=$(mktemp)
            log=$(mktemp)
            if "$SLANGC" -target spirv -stage fragment -entry fragmentMain "$shader_path" -o "$out" > /dev/null 2>"$log"; then
              echo "PASS $relative_path" > "$result_file"
              echo "OK      $relative_path"
            else
              {
                echo "FAIL $relative_path"
                head -20 "$log"
              } > "$result_file"
              echo "FAILED  $relative_path"
            fi
            rm -f "$out" "$log"
          }
          export -f compile_one

          JOBS=$(nproc 2>/dev/null || echo 4)
          echo "Compiling with $JOBS parallel jobs"
          printf '%s\0' "${SHADER_FILES[@]}" | xargs -0 -n 1 -P "$JOBS" bash -c 'compile_one "$1"' _

          PASS_COUNT=0
          FAIL_COUNT=0
          FAILED_RESULTS=()
          for result in "$RESULTS_DIR"/*; do
            case "$(head -1 "$result")" in
              PASS\ *) PASS_COUNT=$((PASS_COUNT + 1)) ;;
              FAIL\ *) FAIL_COUNT=$((FAIL_COUNT + 1)); FAILED_RESULTS+=("$result") ;;
            esac
          done

          # Every shader must produce exactly one verdict; a mismatch means
          # a worker died without reporting (or two shaders collided on one
          # result file), so fail loudly instead of undercounting.
          if [ $((PASS_COUNT + FAIL_COUNT)) -ne "$TOTAL_SHADERS" ]; then
            echo "ERROR: $TOTAL_SHADERS shaders submitted but only $((PASS_COUNT + FAIL_COUNT)) results recorded"
            exit 1
          fi

          echo ""
          echo "===================================================================="
          echo "Results:"
          echo "===================================================================="
          echo "  Total shaders: $TOTAL_SHADERS"
          echo "  Compiled:      $PASS_COUNT"
          echo "  Failed:        $FAIL_COUNT"

          if [ $FAIL_COUNT -gt 0 ]; then
            echo ""
            echo "Failed shaders:"
            for result in "${FAILED_RESULTS[@]}"; do
              echo "  - $(head -1 "$result" | sed 's/^FAIL //')"
            done
            echo ""
            echo "Compiler output for failed shaders (first 10):"
            SHOWN=0
            for result in "${FAILED_RESULTS[@]}"; do
              echo "--- $(head -1 "$result" | sed 's/^FAIL //') ---"
              tail -n +2 "$result"
              SHOWN=$((SHOWN + 1))
              if [ $SHOWN -ge 10 ]; then break; fi
            done
            echo ""
            echo "FAILED: $FAIL_COUNT shaders failed compilation"
            exit 1
          fi

          echo ""
          echo "SUCCESS: All $PASS_COUNT tested shaders compiled (100%)"

          echo "===================================================================="
          echo "MaterialX → Slang Integration Test: PASSED"
          echo "===================================================================="

      - name: Upload Results on Failure
        if: failure()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: materialx-test-results-${{ inputs.os }}-${{ inputs.config }}
          path: |
            ${{ runner.temp }}/materialx-test/
          retention-days: 3
