name: CI Coverage Workflow

on:
  workflow_call:
    inputs:
      os:
        required: true
        type: string
      compiler:
        required: true
        type: string
      platform:
        required: true
        type: string
      config:
        required: true
        type: string
      runs-on:
        required: true
        type: string
      build-llvm:
        required: false
        type: boolean
        default: true
      server-count:
        required: false
        type: number
        default: 8
      container:
        required: false
        type: string
        default: ""
      deploy-pages:
        required: false
        type: boolean
        default: false
      pr-comment:
        required: false
        type: boolean
        default: false

jobs:
  coverage:
    runs-on: ${{ fromJSON(inputs.runs-on) }}
    # Windows coverage is the long pole: OpenCppCoverage ~2x, /Ob0 build
    # another ~1.2x, synthesis pass (needed without GPU drivers to pick up
    # backend emit coverage) adds another ~50 min. Budget accordingly.
    # Linux and macOS finish well under this; longer timeout is harmless.
    timeout-minutes: 240
    container: ${{ inputs.container != '' && fromJSON(format('{{"image":"{0}","options":"--user root","credentials":{{"username":"{1}","password":"{2}"}}}}', inputs.container, github.actor, github.token)) || null }}
    permissions:
      id-token: write # Required for Workload Identity (GCS auth)
      contents: read
      packages: read

    env:
      IS_FORK_PR: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == true }}

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: "recursive"
          fetch-depth: "0"

      - name: Check disk space
        uses: ./.github/actions/check-disk-space
        with:
          min-disk-gb: "10"

      - name: Install OpenCppCoverage (Windows)
        if: inputs.os == 'windows'
        shell: pwsh
        run: |
          # choco is preinstalled on GitHub-hosted windows-latest runners.
          # Pin the version so failures are obvious (not an upstream regression).
          choco install opencppcoverage --version 0.9.9.0 -y --no-progress
          if ($LASTEXITCODE -ne 0) { throw "choco install exited $LASTEXITCODE" }
          # Add to PATH for the rest of the job.
          Add-Content -Path $env:GITHUB_PATH -Value "C:\Program Files\OpenCppCoverage"
          # Verify by filesystem presence. Avoid invoking the tool here -- a
          # piped `--help | Select-Object -First 1` closes the pipe early,
          # and the resulting broken-pipe exit code trips the pwsh step
          # failure check.
          $exe = "C:\Program Files\OpenCppCoverage\OpenCppCoverage.exe"
          if (-not (Test-Path $exe)) { throw "OpenCppCoverage.exe missing at $exe" }
          Write-Host "OpenCppCoverage installed: $exe"

      - name: Install Clang 18 and LLVM Tools
        if: inputs.compiler == 'clang-18' && inputs.os == 'linux' && inputs.container == ''
        shell: bash
        run: |
          # Add LLVM APT repository
          curl -fsSL --retry 3 --retry-delay 5 -o /tmp/llvm-snapshot.gpg.key https://apt.llvm.org/llvm-snapshot.gpg.key
          sudo apt-key add /tmp/llvm-snapshot.gpg.key
          rm /tmp/llvm-snapshot.gpg.key
          sudo add-apt-repository "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-18 main"
          sudo apt-get update

          # Install clang-18 and LLVM coverage tools
          sudo apt-get install -y clang-18 clang++-18 llvm-18

          # Create symlinks for coverage tools (llvm-profdata, llvm-cov)
          sudo update-alternatives --install /usr/bin/llvm-profdata llvm-profdata /usr/bin/llvm-profdata-18 100
          sudo update-alternatives --install /usr/bin/llvm-cov llvm-cov /usr/bin/llvm-cov-18 100

          # Verify installation
          clang-18 --version
          clang++-18 --version
          llvm-profdata --version
          llvm-cov --version

      # Authenticate to Google Cloud (skip for fork PRs - no id-token available)
      - name: Authenticate to Google Cloud
        if: env.IS_FORK_PR != 'true'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/125098404903/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider"
          service_account: "github-ci@slang-runners.iam.gserviceaccount.com"

      - name: Setup LLVM from GCS
        if: inputs.build-llvm
        uses: ./.github/actions/setup-llvm-from-gcs
        with:
          os: ${{ inputs.os }}
          # Use gcc-built LLVM for Linux (ABI-compatible with clang-18)
          compiler: ${{ inputs.os == 'linux' && 'gcc' || inputs.compiler }}
          platform: ${{ inputs.platform }}
          llvm-hash: ${{ hashFiles('external/build-llvm.sh') }}
          build-if-missing: "true"
          github-token: ${{ github.token }}

      - name: Setup
        uses: ./.github/actions/common-setup
        with:
          os: ${{ inputs.os }}
          compiler: ${{ inputs.compiler }}
          platform: ${{ inputs.platform }}
          config: ${{ inputs.config }}
          build-llvm: ${{ inputs.build-llvm }}
          use-cached-llvm: false

      - name: Build Slang with Coverage
        run: |
          echo "cmake version: $(cmake --version)"
          echo "Building with coverage instrumentation (preset: coverage)"

          # Show ccache status if available
          if command -v ccache &> /dev/null; then
            echo "🔧 ccache configuration:"
            ccache --show-config | head -20 || true
            echo "📊 ccache statistics (pre-build):"
            ccache --show-stats || true
          else
            echo "ℹ️  ccache not available"
          fi

          # Prepare ccache launcher arguments if ccache is available
          cmake_launcher_defines=()
          if [[ -n "${ccache_symlinks_path:-}" ]]; then
            echo "🔧 Using ccache with launcher: ${ccache_symlinks_path}"
            echo "🔧 CCACHE_DIR is set to: ${CCACHE_DIR:-'not set'}"
            cmake_launcher_defines+=("-DCMAKE_C_COMPILER_LAUNCHER=${ccache_symlinks_path}")
            cmake_launcher_defines+=("-DCMAKE_CXX_COMPILER_LAUNCHER=${ccache_symlinks_path}")
          else
            echo "ℹ️  ccache_symlinks_path not set - building without ccache"
          fi

          if [[ "${{ inputs.os }}" =~ "windows" && "${{ inputs.config }}" == "debug" ]]; then
            # Doing a debug build will try to link against a release built llvm, this
            # is a problem on Windows, so make slang-llvm in release build and use
            # that as though it's a fetched binary via these presets.
            cmake --workflow --preset slang-llvm

            # Configure, pointing to our just-generated slang-llvm archive
            cmake --preset coverage --fresh \
              -DSLANG_SLANG_LLVM_FLAVOR=FETCH_BINARY \
              "-DSLANG_SLANG_LLVM_BINARY_URL=$(pwd)/build/dist-release/slang-llvm.zip" \
              "${cmake_launcher_defines[@]}"
            cmake --build --preset coverage
          elif [[ "${{ inputs.build-llvm }}" = "false" ]]; then
            # linux aarch64 cannot build llvm.
            cmake --preset coverage --fresh \
              -DSLANG_SLANG_LLVM_FLAVOR=DISABLE \
              "${cmake_launcher_defines[@]}"
            cmake --build --preset coverage
          else
            # Otherwise, use the "system" llvm we have just build or got from the
            # cache in the setup phase
            cmake --preset coverage --fresh \
              -DSLANG_SLANG_LLVM_FLAVOR=USE_SYSTEM_LLVM \
              "${cmake_launcher_defines[@]}"
            cmake --build --preset coverage
          fi

          # Show ccache statistics after build
          if command -v ccache &> /dev/null; then
            echo "📊 ccache statistics (post-build):"
            ccache --show-stats || true
          fi

      - name: Run Tests with Coverage (Linux/macOS)
        if: inputs.os != 'windows'
        run: |
          # Generate both HTML and LCOV formats
          export COVERAGE_HTML=1
          export COVERAGE_LCOV=1
          export COVERAGE_HTML_DIR="$PWD/coverage-html"
          export COVERAGE_LCOV_FILE="$PWD/coverage.lcov"

          # Set SPIRV validation environment variables (same as regular CI)
          export SLANG_RUN_SPIRV_VALIDATION=1
          export SLANG_USE_SPV_SOURCE_LANGUAGE_UNKNOWN=1

          # Build slang-test arguments (same as regular CI)
          test_args=(
            "-expected-failure-list" "tests/expected-failure-github.txt"
            "-skip-reference-image-generation"
            "-show-adapter-info"
            "-enable-debug-layers" "true"
          )

          # Add platform-appropriate expected failure lists
          test_args+=("-expected-failure-list" "tests/expected-failure-no-gpu.txt")

          # macOS: cross-dylib C++ exception tests fail in-process (server-count=1)
          if [[ "${{ inputs.os }}" == "macos" ]]; then
            test_args+=("-expected-failure-list" "tests/expected-failure-coverage.txt")
          fi

          # Add test server arguments if server count > 1
          if [ "${{ inputs.server-count }}" -gt 1 ]; then
            test_args+=("-use-test-server")
            test_args+=("-server-count" "${{ inputs.server-count }}")
          fi

          # --with-synthesis runs a second pass with -only-synthesized to
          # exercise backend emit paths without a GPU.
          # Retry once on failure to handle intermittent test failures.
          if ! ./tools/coverage/run-coverage.sh --with-synthesis "${test_args[@]}"; then
            echo "::warning::First coverage run failed. Retrying..."
            ./tools/coverage/run-coverage.sh --with-synthesis "${test_args[@]}"
          fi

      - name: Run Tests with Coverage (Windows)
        if: inputs.os == 'windows'
        shell: pwsh
        env:
          COVERAGE_LCOV: "1"
          COVERAGE_HTML: "1"
          # Use repo-root paths so the artifact upload step (OS-agnostic) finds
          # the expected layout.
          COVERAGE_LCOV_FILE: "coverage.lcov"
          COVERAGE_HTML_DIR: "coverage-html"
          # Match regular CI's SPIRV validation settings.
          SLANG_RUN_SPIRV_VALIDATION: "1"
          SLANG_USE_SPV_SOURCE_LANGUAGE_UNKNOWN: "1"
          CONFIG: "RelWithDebInfo"
          # Ninja preset writes to build\; override the script's default
          # vs2022-dev probe.
          BUILD_DIR: "build"
        run: |
          $testArgs = @(
            '-expected-failure-list', 'tests/expected-failure-github.txt'
            '-expected-failure-list', 'tests/expected-failure-no-gpu.txt'
            '-skip-reference-image-generation'
            '-show-adapter-info'
            '-enable-debug-layers', 'true'
          )
          if ([int]'${{ inputs.server-count }}' -gt 1) {
            $testArgs += @('-use-test-server', '-server-count', '${{ inputs.server-count }}')
          }

          # Retry once on intermittent failure. OpenCppCoverage itself
          # tolerates the child's non-zero exit (expected failures without
          # GPU drivers), but a script-level failure (missing dependency,
          # malformed args) still propagates.
          #
          # Synthesis pass (-WithSynthesis) is intentionally omitted on
          # Windows CI for Phase 1. Measured: Pass 3 (-only-synthesized)
          # takes ~2h on windows-latest with OCC + /Ob0, pushing the total
          # job past the 4h GitHub Actions timeout. As a result, Windows
          # coverage will be meaningfully lower than Linux/macOS because
          # -only-synthesized is how backend emit paths get covered on
          # runners without GPU drivers (see tmp/windows-coverage/plan.md
          # "finding 9"). Phase 2 (self-hosted Windows runner with GPU)
          # eliminates the need for synthesis entirely since Pass 1 would
          # then exercise the backend paths directly.
          $script = 'tools/coverage/run-coverage-windows.ps1'
          try {
            & $script @testArgs
          } catch {
            Write-Host "::warning::First coverage run failed ($_). Retrying..."
            & $script @testArgs
          }

      - name: Generate Coverage Summary (Linux/macOS)
        id: coverage-summary
        if: inputs.os != 'windows'
        run: |
          # Ensure git works in container (ownership check)
          git config --global --add safe.directory "$PWD"

          # Extract all coverage metrics from llvm-cov report output
          # The report was already generated by run-coverage.sh
          BUILD_DIR="${BUILD_DIR:-build}"
          CONFIG="${CONFIG:-RelWithDebInfo}"
          COVERAGE_DIR="${COVERAGE_DIR:-$BUILD_DIR/coverage-data}"

          if [[ "$OSTYPE" == "darwin"* ]]; then
            LLVM_COV="${LLVM_COV:-xcrun llvm-cov}"
            LIB_EXT="dylib"
          else
            LLVM_COV="${LLVM_COV:-llvm-cov}"
            LIB_EXT="so"
          fi

          LIBSLANG="$BUILD_DIR/$CONFIG/lib/libslang.$LIB_EXT"

          # Load slangc compiler-only ignore patterns (shared definition)
          source tools/coverage/slangc-ignore-patterns.sh

          # Generate full library coverage report
          REPORT_OUTPUT=$($LLVM_COV report "$LIBSLANG" -instr-profile="$COVERAGE_DIR/slang-test.profdata" 2>/dev/null || echo "")

          # Generate slangc compiler-only coverage report
          SLANGC_REPORT_OUTPUT=$($LLVM_COV report "$LIBSLANG" -instr-profile="$COVERAGE_DIR/slang-test.profdata" "${SLANGC_IGNORE_ARGS[@]}" 2>/dev/null || echo "")

          if [[ -n "$REPORT_OUTPUT" ]]; then
            TOTALS_LINE=$(echo "$REPORT_OUTPUT" | grep "^TOTAL" | head -1)

            if [[ -n "$TOTALS_LINE" ]]; then
              read -r _ regions_hit regions_total region_pct functions_hit functions_total function_pct lines_hit lines_total line_pct branches_hit branches_total branch_pct <<< "$TOTALS_LINE"

              # Parse slangc-only metrics
              slangc_line_pct=""
              if [[ -n "$SLANGC_REPORT_OUTPUT" ]]; then
                SLANGC_TOTALS=$(echo "$SLANGC_REPORT_OUTPUT" | grep "^TOTAL" | head -1)
                if [[ -n "$SLANGC_TOTALS" ]]; then
                  read -r _ slangc_regions_hit slangc_regions_total slangc_region_pct slangc_functions_hit slangc_functions_total slangc_function_pct slangc_lines_hit slangc_lines_total slangc_line_pct slangc_branches_hit slangc_branches_total slangc_branch_pct <<< "$SLANGC_TOTALS"
                fi
              fi

              echo "coverage=$line_pct" >> $GITHUB_OUTPUT

              # Generate step summary
              cat >> $GITHUB_STEP_SUMMARY <<EOF
          # Coverage Report

          ## Full Library
          - **Line Coverage:** ${line_pct}% (${lines_hit} / ${lines_total})
          - **Region Coverage:** ${region_pct}% (${regions_hit} / ${regions_total})
          - **Function Coverage:** ${function_pct}% (${functions_hit} / ${functions_total})
          - **Branch Coverage:** ${branch_pct}% (${branches_hit} / ${branches_total})
          EOF

              if [[ -n "$slangc_line_pct" ]]; then
                cat >> $GITHUB_STEP_SUMMARY <<EOF

          ## slangc Compiler Pipeline
          - **Line Coverage:** ${slangc_line_pct}% (${slangc_lines_hit} / ${slangc_lines_total})
          - **Region Coverage:** ${slangc_region_pct}% (${slangc_regions_hit} / ${slangc_regions_total})
          - **Function Coverage:** ${slangc_function_pct}% (${slangc_functions_hit} / ${slangc_functions_total})
          - **Branch Coverage:** ${slangc_branch_pct}% (${slangc_branches_hit} / ${slangc_branches_total})
          EOF
              fi

              # Save coverage summary as JSON for historical tracking
              REPORT_DATE=$(date -u +"%Y-%m-%d")
              COMMIT_SHORT=$(git rev-parse --short HEAD)

              # Build JSON with optional slangc fields
              SLANGC_JSON=""
              if [[ -n "$slangc_line_pct" ]]; then
                SLANGC_JSON=$(cat <<SLANGC_EOF
            "slangc_line_coverage": "${slangc_line_pct}",
            "slangc_lines_hit": ${slangc_lines_hit},
            "slangc_lines_found": ${slangc_lines_total},
            "slangc_region_coverage": "${slangc_region_pct}",
            "slangc_regions_hit": ${slangc_regions_hit},
            "slangc_regions_found": ${slangc_regions_total},
            "slangc_function_coverage": "${slangc_function_pct}",
            "slangc_functions_hit": ${slangc_functions_hit},
            "slangc_functions_found": ${slangc_functions_total},
            "slangc_branch_coverage": "${slangc_branch_pct}",
            "slangc_branches_hit": ${slangc_branches_hit},
            "slangc_branches_found": ${slangc_branches_total},
          SLANGC_EOF
              )
              fi

              cat > coverage-summary.json <<EOF
          {
            "date": "${REPORT_DATE}",
            "commit": "${COMMIT_SHORT}",
            "platform": "${{ inputs.os }}",
            "platform_detail": "${{ inputs.os }}-${{ inputs.platform }}",
            "line_coverage": "${line_pct}",
            "lines_hit": ${lines_hit},
            "lines_found": ${lines_total},
            "region_coverage": "${region_pct}",
            "regions_hit": ${regions_hit},
            "regions_found": ${regions_total},
            "function_coverage": "${function_pct}",
            "functions_hit": ${functions_hit},
            "functions_found": ${functions_total},
            "branch_coverage": "${branch_pct}",
            "branches_hit": ${branches_hit},
            "branches_found": ${branches_total},
            ${SLANGC_JSON}
            "_version": 2
          }
          EOF
              echo "Saved coverage summary to coverage-summary.json"
              cat coverage-summary.json
            fi
          fi

      - name: Generate Coverage Summary (Windows)
        id: coverage-summary-windows
        if: inputs.os == 'windows'
        shell: pwsh
        run: |
          # OpenCppCoverage has already produced the Cobertura XML via
          # run-coverage-windows.ps1. Parse it for the JSON summary used by
          # coverage-nightly.yml's merge step. Only line-level metrics are
          # available from Cobertura (no region/function/branch -- those are
          # llvm-cov-only), so those fields are omitted on Windows.
          $covDir = "build\coverage-data"
          $xmlPath = Join-Path $covDir 'full.cobertura.xml'
          $slangcLcov = 'coverage-slangc.lcov'
          if (-not (Test-Path $xmlPath)) {
              throw "Missing $xmlPath -- Pass 1 must have failed to produce coverage."
          }

          [xml]$cob = Get-Content -LiteralPath $xmlPath
          $c = $cob.coverage
          $line_pct = [math]::Round([double]$c.'line-rate' * 100, 2)
          $lines_hit = [int]$c.'lines-covered'
          $lines_total = [int]$c.'lines-valid'

          # Slangc-only totals: sum LF/LH from the filtered LCOV.
          $slangc_hit = 0
          $slangc_total = 0
          if (Test-Path $slangcLcov) {
              foreach ($line in Get-Content $slangcLcov) {
                  if ($line.StartsWith('LF:')) { $slangc_total += [int]$line.Substring(3) }
                  elseif ($line.StartsWith('LH:')) { $slangc_hit += [int]$line.Substring(3) }
              }
          }
          $slangc_pct = if ($slangc_total -gt 0) { [math]::Round($slangc_hit / $slangc_total * 100, 2) } else { 0 }

          "coverage=$line_pct" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding ascii

          # Step summary. Built line-by-line to avoid here-string indentation
          # leaking into markdown (leading spaces render as code blocks).
          $summary = @(
              "# Coverage Report (Windows)"
              ""
              "## Full Library"
              "- **Line Coverage:** $line_pct% ($lines_hit / $lines_total)"
              ""
              "## slangc Compiler Pipeline"
              "- **Line Coverage:** $slangc_pct% ($slangc_hit / $slangc_total)"
              ""
              "> Note: region/function/branch coverage is not available on Windows"
              "> (OpenCppCoverage produces line-level data only)."
          ) -join "`n"
          $summary | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8

          # coverage-summary.json for historical tracking. Schema mirrors the
          # Linux/macOS output but omits region/function/branch fields.
          $commitShort = (git rev-parse --short HEAD).Trim()
          $reportDate = (Get-Date -AsUTC).ToString('yyyy-MM-dd')
          $json = [ordered]@{
              date = $reportDate
              commit = $commitShort
              platform = 'windows'
              platform_detail = "windows-${{ inputs.platform }}"
              line_coverage = "$line_pct"
              lines_hit = $lines_hit
              lines_found = $lines_total
              slangc_line_coverage = "$slangc_pct"
              slangc_lines_hit = $slangc_hit
              slangc_lines_found = $slangc_total
              _version = 2
          }
          $json | ConvertTo-Json -Depth 2 | Set-Content -LiteralPath 'coverage-summary.json' -Encoding ascii
          Write-Host "Saved coverage-summary.json:"
          Get-Content 'coverage-summary.json' | Write-Host

      - name: Upload Coverage Artifacts for Merging
        if: ${{ !inputs.deploy-pages }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ inputs.os }}-${{ inputs.platform }}
          # coverage-html-slangc/ and libslang.* are Linux/macOS-only; the
          # Cobertura XML and slangc LCOV are Windows-only. upload-artifact
          # silently skips missing paths, so one path list works for all OSes.
          path: |
            coverage-summary.json
            coverage-html/
            coverage-html-slangc/
            coverage-slangc.lcov
            build/${{ inputs.config }}/coverage-data/slang-test.profdata
            build/${{ inputs.config }}/lib/libslang.*
            build/coverage-data/full.cobertura.xml
          retention-days: 7

      - name: Checkout Coverage Reports Repository
        if: ${{ inputs.deploy-pages }}
        uses: actions/checkout@v4
        with:
          repository: "shader-slang/slang-coverage-reports"
          path: "coverage-repo"
          token: ${{ secrets.SLANG_COVERAGE_REPORTS_PAT }}

      - name: Deploy Coverage to Separate Repository
        if: ${{ inputs.deploy-pages }}
        run: |
          # Get current date and short commit hash
          REPORT_DATE=$(date -u +"%Y-%m-%d")
          COMMIT_SHORT=$(git rev-parse --short HEAD)
          FULL_COMMIT=$(git rev-parse HEAD)
          REPORT_DIR="reports/history/${REPORT_DATE}-${COMMIT_SHORT}"

          cd coverage-repo

          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create directory structure
          mkdir -p "${REPORT_DIR}"
          mkdir -p reports/latest

          # Copy coverage HTML to historical location
          cp -r ../coverage-html/* "${REPORT_DIR}/"

          # Copy slangc compiler-only HTML report if it exists
          if [[ -d ../coverage-html-slangc ]]; then
            mkdir -p "${REPORT_DIR}/slangc"
            cp -r ../coverage-html-slangc/* "${REPORT_DIR}/slangc/"
          fi

          # Copy coverage summary JSON if it exists
          if [[ -f ../coverage-summary.json ]]; then
            cp ../coverage-summary.json "${REPORT_DIR}/"
          fi

          # Update latest (replace entire directory)
          rm -rf reports/latest/*
          cp -r ../coverage-html/* reports/latest/

          # Copy slangc report to latest
          if [[ -d ../coverage-html-slangc ]]; then
            mkdir -p reports/latest/slangc
            cp -r ../coverage-html-slangc/* reports/latest/slangc/
          fi

          # Copy coverage summary to latest
          if [[ -f ../coverage-summary.json ]]; then
            cp ../coverage-summary.json reports/latest/
          fi

          # Generate historical index
          bash ../tools/coverage/generate-history-index.sh reports/history

          # Generate main landing page
          bash ../tools/coverage/generate-landing-page.sh reports

          # Commit and push if there are changes
          git add reports/
          if ! git diff --cached --quiet; then
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
            git commit -m "Add coverage report for ${REPORT_DATE} (${COMMIT_SHORT})" \
                       -m "Generated from shader-slang/slang@${FULL_COMMIT}" \
                       -m "Date: ${TIMESTAMP}"

            git push origin main
            echo "Coverage report deployed successfully"
          else
            echo "No changes to coverage report"
          fi

      - name: Report Coverage in PR
        if: ${{ inputs.pr-comment }}
        uses: zgosalvez/github-actions-report-lcov@v4
        with:
          coverage-files: coverage.lcov
          minimum-coverage: 0
          artifact-name: coverage-report
          github-token: ${{ secrets.GITHUB_TOKEN }}
          update-comment: true

      - name: Compress and Upload LCOV Report
        run: |
          # Compress LCOV file to save space
          gzip -9 coverage.lcov
          echo "Compressed LCOV file:"
          ls -lh coverage.lcov.gz

      - name: Upload LCOV Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov-${{ inputs.os }}-${{ inputs.platform }}-${{ inputs.compiler }}
          path: coverage.lcov.gz
          retention-days: 7
          compression-level: 0 # Already compressed, no need to compress again
