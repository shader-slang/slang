name: CI Test Workflow

on:
  workflow_call:
    inputs:
      os:
        required: true
        type: string
      compiler:
        required: true
        type: string
      platform:
        required: true
        type: string
      config:
        required: true
        type: string
      runs-on:
        required: true
        type: string
      test-category:
        required: false
        type: string
        default: smoke
      full-gpu-tests:
        required: false
        type: boolean
        default: false
      server-count:
        required: false
        type: number
        default: 8
      enable-debug-layers:
        required: false
        type: boolean
        default: true
      artifact-suffix:
        required: false
        type: string
        default: ""
        description: "Optional suffix for artifact name (e.g., '-cuda')"
      cpu-only:
        required: false
        type: boolean
        default: false
        description: "Restrict slang-test to CPU and LLVM backends via -api cpu+llvm"
      gpu-api-only:
        required: false
        type: boolean
        default: false
        description: "Restrict slang-test to GPU APIs (vk+cuda+dx11+dx12+mtl+wgpu) while retaining no-API tests needed by multi-step workflows"
      gpu-tier:
        required: false
        type: string
        default: ""
        description: "GPU tier label (e.g., 't4', 'sm80plus'). Used to apply tier-specific skip lists."

jobs:
  test-slang:
    runs-on: ${{ fromJSON(inputs.runs-on) }}
    timeout-minutes: 80
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - name: Common Test Setup
        uses: ./.github/actions/common-test-setup
        with:
          os: ${{ inputs.os }}
          compiler: ${{ inputs.compiler }}
          platform: ${{ inputs.platform }}
          config: ${{ inputs.config }}
          artifact-suffix: ${{ inputs.artifact-suffix }}

      # TEMPORARY: enable core-dump capture on Linux to investigate the
      # SIGILL in slang-test on the linux-cpu job (seen 2026-05-04 PR #10977
      # and 2026-05-05 PR #11053, both crashing right after
      # tests/autodiff/global-param-hoisting.slang.1 (vk)). Remove once root-caused.
      - name: Enable core dumps (Linux)
        if: inputs.os == 'linux'
        shell: bash
        run: |
          mkdir -p "$GITHUB_WORKSPACE/cores"
          # Override Ubuntu's default apport pipe so cores land as plain files.
          sudo sysctl -w kernel.core_pattern="$GITHUB_WORKSPACE/cores/core.%e.%p"
          sudo sysctl -w kernel.core_uses_pid=1
          ulimit -c unlimited
          # Make sure gdb is installed for the post-run extraction step.
          sudo apt-get install -y --no-install-recommends gdb

      # TEMPORARY: gather AVX-512 detection ground truth on each Linux test
      # runner so we can validate the hypothesis behind #11062 (slang-llvm JIT
      # emits AVX-512 because LLVM reports the CPU supports it, then the
      # instruction faults at execution). Confirms which of these is happening:
      #   (a) CPUID reports AVX-512 + XCR0 has bits 5-7 + kmovd runs cleanly
      #       → falsifies hypothesis, points at IR/JIT-attribute leakage
      #   (b) CPUID reports AVX-512 but XCR0 lacks bits 5-7
      #       → OS XSAVE problem
      #   (c) CPUID reports AVX-512, XCR0 fine, kmovd still SIGILLs
      #       → hypervisor passthrough / instruction-mask discrepancy
      # Remove once #11062 is fixed and verified.
      - name: CPUID / AVX-512 probe (Linux)
        if: inputs.os == 'linux'
        shell: bash
        run: |
          echo "::group::Runner identity"
          uname -a
          # boot_id is unique per host boot — proxy for "same physical host".
          if [ -r /proc/sys/kernel/random/boot_id ]; then
            printf 'boot_id=%s\n' "$(cat /proc/sys/kernel/random/boot_id)"
          fi
          echo "::endgroup::"

          echo "::group::/proc/cpuinfo (first processor entry)"
          awk '/^processor/{n++} n==2{exit} {print}' /proc/cpuinfo
          echo "::endgroup::"

          echo "::group::AVX-512 family flags reported in /proc/cpuinfo"
          grep -oE 'avx512[a-z0-9]*' /proc/cpuinfo | sort -u || echo "(none)"
          echo "::endgroup::"

          echo "::group::clang -march=native (LLVM-style detection)"
          if command -v clang >/dev/null 2>&1; then
            clang --version | head -1
            # Print only the cc1 invocation line; that contains all
            # -target-cpu and -target-feature flags clang would set.
            clang -E -x c /dev/null -march=native -### 2>&1 \
              | tr ' ' '\n' \
              | grep -E '^-(target-cpu|target-feature|march|mcpu)' \
              | sort -u || true
          else
            echo "(clang not on PATH)"
          fi
          echo "::endgroup::"

          echo "::group::CPUID leaf 7, sub 0 (raw)"
          cat >/tmp/cpuid.c <<'EOF'
          #include <stdio.h>
          #include <stdint.h>
          static void cpuid_count(uint32_t leaf, uint32_t sub,
                                  uint32_t *a, uint32_t *b,
                                  uint32_t *c, uint32_t *d) {
              __asm__ volatile("cpuid"
                  : "=a"(*a), "=b"(*b), "=c"(*c), "=d"(*d)
                  : "a"(leaf), "c"(sub));
          }
          int main(void) {
              uint32_t a, b, c, d;
              cpuid_count(7, 0, &a, &b, &c, &d);
              printf("EAX=0x%08x EBX=0x%08x ECX=0x%08x EDX=0x%08x\n", a, b, c, d);
              printf("  AVX-512F   (EBX bit 16): %s\n", (b & (1u<<16)) ? "yes" : "no");
              printf("  AVX-512DQ  (EBX bit 17): %s\n", (b & (1u<<17)) ? "yes" : "no");
              printf("  AVX-512CD  (EBX bit 28): %s\n", (b & (1u<<28)) ? "yes" : "no");
              printf("  AVX-512BW  (EBX bit 30): %s\n", (b & (1u<<30)) ? "yes" : "no");
              printf("  AVX-512VL  (EBX bit 31): %s\n", (b & (1u<<31)) ? "yes" : "no");
              printf("  AVX-512VBMI(ECX bit  1): %s\n", (c & (1u<< 1)) ? "yes" : "no");
              printf("  AVX-512VNNI(ECX bit 11): %s\n", (c & (1u<<11)) ? "yes" : "no");
              return 0;
          }
          EOF
          cc -O0 -o /tmp/cpuid /tmp/cpuid.c && /tmp/cpuid || echo "(cpuid probe failed)"
          echo "::endgroup::"

          echo "::group::OS XSAVE state (XCR0)"
          # AVX-512 also requires the OS to enable XSAVE for opmask + ZMM regs
          # (XCR0 bits 5, 6, 7). If those are clear, AVX-512 instructions
          # raise #UD even on supporting hardware.
          cat >/tmp/xcr0.c <<'EOF'
          #include <stdio.h>
          #include <stdint.h>
          int main(void) {
              uint32_t a, d;
              __asm__ volatile("xgetbv" : "=a"(a), "=d"(d) : "c"(0));
              uint64_t xcr0 = ((uint64_t)d << 32) | a;
              printf("XCR0=0x%016llx\n", (unsigned long long)xcr0);
              printf("  X87/SSE  (bits 0-1): %s\n", (xcr0 & 0x3) == 0x3 ? "on" : "off");
              printf("  AVX      (bit 2):    %s\n", (xcr0 & (1ull<<2)) ? "on" : "off");
              printf("  opmask   (bit 5):    %s\n", (xcr0 & (1ull<<5)) ? "on" : "off");
              printf("  ZMM_Hi256(bit 6):    %s\n", (xcr0 & (1ull<<6)) ? "on" : "off");
              printf("  Hi16_ZMM (bit 7):    %s\n", (xcr0 & (1ull<<7)) ? "on" : "off");
              return 0;
          }
          EOF
          cc -O0 -o /tmp/xcr0 /tmp/xcr0.c && /tmp/xcr0 || echo "(xcr0 probe failed)"
          echo "::endgroup::"

          echo "::group::Execute kmovd %eax, %k1 in a child"
          # The exact instruction we observed crashing in the cores. Run in
          # a forked child so SIGILL doesn't terminate the whole job.
          cat >/tmp/avx512.c <<'EOF'
          #include <stdio.h>
          #include <stdlib.h>
          #include <unistd.h>
          #include <sys/wait.h>
          int main(void) {
              pid_t p = fork();
              if (p < 0) { perror("fork"); return 2; }
              if (p == 0) {
                  __asm__ volatile("kmovd %%eax, %%k1" : : : "k1");
                  fputs("kmovd executed cleanly\n", stdout);
                  fflush(stdout);
                  _exit(0);
              }
              int s = 0;
              waitpid(p, &s, 0);
              if (WIFEXITED(s)) {
                  printf("child exited normally, status=%d\n", WEXITSTATUS(s));
                  return 0;
              }
              if (WIFSIGNALED(s)) {
                  int sig = WTERMSIG(s);
                  printf("child killed by signal %d (%s)\n", sig,
                         sig == 4 ? "SIGILL" : sig == 11 ? "SIGSEGV" : "other");
                  return 132;
              }
              printf("child finished in unexpected state, raw=0x%x\n", s);
              return 3;
          }
          EOF
          cc -O0 -o /tmp/avx512 /tmp/avx512.c
          /tmp/avx512
          echo "kmovd probe exit code: $?"
          echo "::endgroup::"

      - name: Test Slang
        run: |
          # Inherit unlimited core size for any child processes (slang-test,
          # test-servers, etc.). No-op on non-Linux runners.
          ulimit -c unlimited || true
          # Fail fast on mutually exclusive inputs — both would accumulate
          # -api filters and produce an empty test partition.
          if [[ "${{ inputs.cpu-only }}" == "true" && "${{ inputs.gpu-api-only }}" == "true" ]]; then
            echo "::error::cpu-only and gpu-api-only are mutually exclusive"
            exit 1
          fi

          # SPIR-V emission / validation don't need a GPU — keep on all tiers.
          export SLANG_RUN_SPIRV_VALIDATION=1
          export SLANG_USE_SPV_SOURCE_LANGUAGE_UNKNOWN=1
          # Vulkan runtime validation needs a Vulkan device; skip on CPU tier.
          if [[ "${{ inputs.cpu-only }}" != "true" && "${{ inputs.enable-debug-layers }}" == "true" ]]; then
            export VK_INSTANCE_LAYERS=VK_LAYER_KHRONOS_validation
          fi
          # Build common slang-test arguments
          slang_test_args=(
            "-category" "${{ inputs.test-category }}"
            "-expected-failure-list" "tests/expected-failure-github.txt"
            "-skip-reference-image-generation"
            "-show-adapter-info"
            "-enable-debug-layers" "${{ inputs.enable-debug-layers }}"
          )

          # Restrict to CPU / LLVM backends; tests requiring any GPU API get
          # ignored by the test filter rather than run-and-failed.
          if [[ "${{ inputs.cpu-only }}" == "true" ]]; then
            slang_test_args+=("-api" "cpu+llvm")
          fi

          # Restrict to GPU APIs so (cpu) / (llvm) tests are skipped. Intentionally
          # NOT using -api-only: no-API tests still need to run because
          # COMPILE directives in multi-step compile→dispatch tests have
          # requiredFlags==0 and would be skipped, breaking the dispatch.
          if [[ "${{ inputs.gpu-api-only }}" == "true" ]]; then
            slang_test_args+=("-api" "vk+cuda+dx11+dx12+mtl+wgpu")
          fi

          # Add test server arguments only if server count > 1
          if [ "${{ inputs.server-count }}" -gt 1 ]; then
            slang_test_args+=("-use-test-server")
            slang_test_args+=("-server-count" "${{ inputs.server-count }}")
          fi

          # Add no-GPU failure list for non-GPU tests
          if [[ "${{ inputs.full-gpu-tests }}" != "true" ]]; then
            slang_test_args+=("-expected-failure-list" "tests/expected-failure-no-gpu.txt")
          fi

          # Add known failures on Linux regardless GPU presence
          if [[ "${{ inputs.os }}" == "linux" ]]; then
            slang_test_args+=("-expected-failure-list" "tests/expected-failure-linux.txt")
          fi

          # T4 runners cannot execute SM 8.0+ cooperative matrix / neural tests
          if [[ "${{ inputs.gpu-tier }}" == "t4" ]]; then
            slang_test_args+=("-skip-list" "tests/skip-list-gpu-t4.txt")
            slang_test_args+=("-expected-failure-list" "tests/expected-failure-linux-gpu.txt")
          fi

          # Skip most neural tests in debug builds to reduce CI time
          if [[ "${{ inputs.config }}" == "debug" ]]; then
            slang_test_args+=("-skip-list" "tests/skip-list-debug.txt")
          fi

          # Execute slang-test with all arguments
          "$bin_dir/slang-test" "${slang_test_args[@]}"
      - name: Run Slang examples
        # Run examples on release for pull requests, and not on merge_group, to reduce CI load.
        if: inputs.full-gpu-tests && inputs.config == 'release' && github.event_name == 'pull_request'
        run: |
          .github/workflows/ci-examples.sh \
           --bin-dir "$bin_dir" \
           --os "${{ inputs.os }}" \
           --platform "${{ inputs.platform }}" \
           --config "${{ inputs.config }}" \
           --skip-file tests/expected-example-failure-github.txt
      - name: Run slangc tests
        run: |
          PATH=$bin_dir:$PATH tools/slangc-test/test.sh
      - name: Test Slang via glsl
        # Run GLSL backend tests on release for pull requests, and not on merge_group, to reduce CI load.
        if: inputs.os != 'macos' && inputs.full-gpu-tests && inputs.config == 'release' && github.event_name == 'pull_request'
        run: |
          export SLANG_RUN_SPIRV_VALIDATION=1
          export SLANG_USE_SPV_SOURCE_LANGUAGE_UNKNOWN=1
          via_glsl_args=(
            -use-test-server
            -server-count ${{ inputs.server-count }}
            -category ${{ inputs.test-category }}
            -emit-spirv-via-glsl
            -api vk
            -expected-failure-list tests/expected-failure-via-glsl.txt
            -skip-reference-image-generation
          )
          if [[ "${{ inputs.gpu-tier }}" == "t4" ]]; then
            via_glsl_args+=("-skip-list" "tests/skip-list-gpu-t4.txt")
          fi
          "$bin_dir/slang-test" "${via_glsl_args[@]}"

      # TEMPORARY: extract gdb backtraces from any cores produced above and
      # upload both backtraces and raw cores as artifacts. Paired with
      # "Enable core dumps (Linux)". Remove once the SIGILL is root-caused.
      - name: Capture core dumps (Linux)
        if: always() && inputs.os == 'linux'
        shell: bash
        run: |
          shopt -s nullglob
          # Drop known-benign cores from intentional unit-test crashes (test-process
          # exercises subprocess management; gfx-smoke fails to load a GPU driver
          # on the GitHub-hosted runner). Keeps the artifact lean so the slang-test
          # cores we actually care about are easy to find.
          for benign in test-process gfx-smoke; do
            rm -f "$GITHUB_WORKSPACE/cores/core.$benign".*
          done
          cores=("$GITHUB_WORKSPACE/cores"/core.*)
          if [ "${#cores[@]}" -eq 0 ]; then
            echo "No interesting core dumps captured."
            exit 0
          fi
          echo "Captured ${#cores[@]} core dump(s):"
          ls -lh "${cores[@]}"
          mkdir -p "$GITHUB_WORKSPACE/cores/backtraces"
          for c in "${cores[@]}"; do
            name=$(basename "$c")
            # Pull the executable name out of core.<exe>.<pid>.
            exe_name=${name#core.}
            exe_name=${exe_name%.*}
            exe_path="$bin_dir/$exe_name"
            if [ ! -x "$exe_path" ]; then
              # Fall back to whatever gdb finds in the core itself.
              exe_path=""
            fi
            bt_file="$GITHUB_WORKSPACE/cores/backtraces/$name.bt.txt"
            echo "=== Backtrace for $name (exe=$exe_path) ===" | tee "$bt_file"
            # Run a richer gdb inspection: registers, faulting instruction,
            # disassembly around $pc, shared-library map (so we can correlate
            # the faulting RIP to a JITed mmap region), and process mappings.
            gdb -batch \
              -ex "set pagination off" \
              -ex "set print pretty on" \
              -ex "thread apply all bt full" \
              -ex "info registers" \
              -ex "x/i \$pc" \
              -ex "x/16i \$pc-32" \
              -ex "info sharedlibrary" \
              -ex "maintenance info sections" \
              ${exe_path:+"$exe_path"} "$c" 2>&1 | tee -a "$bt_file" || true
          done

      - name: Upload core dumps and backtraces
        if: always() && inputs.os == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: cores-${{ inputs.os }}-${{ inputs.platform }}-${{ inputs.compiler }}-${{ inputs.config }}${{ inputs.artifact-suffix }}
          path: cores/
          if-no-files-found: ignore
          retention-days: 7

  # Run slang-rhi tests when:
  # 1. full-gpu-tests is enabled AND
  # 2. Either it's a pull request OR config is release
  # This is to reduce the CI load but do some check on pull requests.
  # expensive slang-rhi tests are excluded with -tce option, because they are not relevant for Slang.
  test-slang-rhi:
    runs-on: ${{ fromJSON(inputs.runs-on) }}
    timeout-minutes: 50
    if: inputs.full-gpu-tests && (github.event_name == 'pull_request' || inputs.config == 'release')
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: "recursive"
          fetch-depth: "1"

      - name: Common Test Setup
        uses: ./.github/actions/common-test-setup
        with:
          os: ${{ inputs.os }}
          compiler: ${{ inputs.compiler }}
          platform: ${{ inputs.platform }}
          config: ${{ inputs.config }}
          artifact-suffix: ${{ inputs.artifact-suffix }}

      - name: Run slang-rhi tests
        run: |
          export SLANG_RHI_EXCLUDE_TESTS="md-clear*,cmd-copy*,cmd-upload*,fence*,staging-heap*,texture-create*"
          "$bin_dir/slang-rhi-tests" -check-devices -tce="$SLANG_RHI_EXCLUDE_TESTS"

      - name: Run slang-rhi tests (OptiX 8.0)
        if: inputs.os == 'windows' || inputs.os == 'linux'
        run: |
          "$bin_dir/slang-rhi-tests" -check-devices -optix-version=80000 -tc="ray-tracing-*.cuda"

      - name: Run slang-rhi tests (OptiX 8.1)
        if: inputs.os == 'windows' || inputs.os == 'linux'
        run: |
          "$bin_dir/slang-rhi-tests" -check-devices -optix-version=80100 -tc="ray-tracing-*.cuda"
