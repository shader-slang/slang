name: Check Python Scripts (Core Python Only)

on:
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "extras/**/*.py"
      - "tools/compile-perf/**/*.py"
      - ".github/workflows/check-python-core.yml"
  merge_group:
    types: [checks_requested]

jobs:
  check-python-core:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft != true
    strategy:
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
    runs-on: ${{ matrix.os }}
    name: Parse Python with core Python (${{ matrix.os }})
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Verify using system Python (no setup-python)
        run: |
          echo "Python: $(python3 --version)"
          echo "Path: $(which python3)"

      - name: Compile-check all extras Python scripts
        run: |
          failed=0
          while IFS= read -r -d '' f; do
            if ! python3 -m py_compile "$f"; then
              echo "FAIL: $f"
              failed=1
            fi
          done < <(find extras tools/compile-perf -type f -name '*.py' -print0)
          exit $failed

      - name: Check for non-stdlib imports
        run: |
          python3 -c "
          import ast, sys
          from pathlib import Path

          stdlib = sys.stdlib_module_names

          # Collect all .py stems and package dirs under extras/ so that
          # cross-directory project-local imports are recognized.
          project_modules = set()
          for root in (Path('extras'), Path('tools/compile-perf')):
              for p in root.rglob('*.py'):
                  project_modules.add(p.stem)
              for p in root.rglob('__init__.py'):
                  project_modules.add(p.parent.name)

          errors = []
          scan = [*Path('extras').rglob('*.py'), *Path('tools/compile-perf').rglob('*.py')]
          for filepath in sorted(scan):
              with open(filepath) as f:
                  tree = ast.parse(f.read(), str(filepath))
              def check_module(top, desc):
                  if top not in stdlib and top not in project_modules:
                      msg = f'{filepath}: non-stdlib import: {desc}'
                      print(msg)
                      errors.append(msg)

              for node in ast.walk(tree):
                  if isinstance(node, ast.Import):
                      for alias in node.names:
                          check_module(alias.name.split('.')[0], alias.name)
                  elif isinstance(node, ast.ImportFrom):
                      if node.module and node.level == 0:
                          check_module(node.module.split('.')[0], f'from {node.module}')
                  elif (
                      isinstance(node, ast.Call)
                      and isinstance(node.func, ast.Name)
                      and node.func.id == '__import__'
                      and node.args
                      and isinstance(node.args[0], ast.Constant)
                      and isinstance(node.args[0].value, str)
                  ):
                      check_module(node.args[0].value.split('.')[0], f'__import__({node.args[0].value!r})')
                  elif (
                      isinstance(node, ast.Call)
                      and isinstance(node.func, ast.Attribute)
                      and isinstance(node.func.value, ast.Name)
                      and node.func.value.id == 'importlib'
                      and node.func.attr == 'import_module'
                      and node.args
                      and isinstance(node.args[0], ast.Constant)
                      and isinstance(node.args[0].value, str)
                  ):
                      check_module(node.args[0].value.split('.')[0], f'importlib.import_module({node.args[0].value!r})')
          if errors:
              sys.exit(1)
          print('All imports are stdlib-only (local sibling modules allowed).')
          "

      # Importing the compile-perf suite executes its import-time self-check
      # asserts (lib/manifest.py workload validation, daily_movers/report/
      # breakdown fixtures, new_release_check cutoff pins) — without this the
      # only thing that ever imports these modules is the nightly, so a
      # broken import or failed self-check would merge cleanly and surface
      # as a lost nightly data point instead of a PR failure.
      - name: Import-check compile-perf suite (runs its self-check asserts)
        run: |
          cd tools/compile-perf
          python3 -c "import bench, report, breakdown, daily_movers, \
              new_release_check, sweep, sweep_report, track, trend, \
              compare_repro, ladder_scaling, fetch_releases"
