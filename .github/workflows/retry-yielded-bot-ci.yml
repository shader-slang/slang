name: Retry Yielded Bot CI

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:
  # Safety backstop in case a workflow_run event is missed. The job is
  # short-lived and exits immediately if CI is still active.
  schedule:
    - cron: "17 * * * *"

concurrency:
  group: retry-yielded-bot-ci
  cancel-in-progress: false

permissions:
  actions: write
  contents: read

jobs:
  retry:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Rerun oldest yielded bot CI if quiet
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 extras/ci/retry-yielded-bot-ci.py \
            --repo "$GITHUB_REPOSITORY" \
            --workflow ci.yml \
            --lookback-hours 12 \
            --max-attempts 3 \
            --max-reruns 1
