name: CI Falcor Test Workflow

on:
  workflow_call:

permissions:
  contents: read
  actions: read

jobs:
  test-falcor:
    name: Test (Falcor)
    timeout-minutes: 100
    runs-on: [Windows, self-hosted, falcor]
    defaults:
      run:
        shell: bash
    steps:
      - name: Add Git Bash to PATH
        shell: pwsh
        run: |
          Add-Content -Path $env:GITHUB_PATH -Value "C:\\Program Files\\Git\\bin"
          Add-Content -Path $env:GITHUB_PATH -Value "C:\\Program Files\\Git\\usr\\bin"
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
          submodules: "false"
          fetch-depth: "1"
      - name: Download Slang build
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: slang-tests-windows-x86_64-cl-release
          path: slang-bin
      - name: setup-falcor
        shell: pwsh
        run: |
          mkdir FalcorBin
          cd FalcorBin
          Copy-Item -Path 'C:\Falcor\build\windows-vs2022\bin' -Destination '.\build\windows-vs2022\bin' -Recurse -Exclude ("*.pdb")
          Copy-Item -Path 'C:\Falcor\tests' -Destination '.\' -Recurse
          Copy-Item -Path 'C:\Falcor\tools' -Destination '.\' -Recurse
          Copy-Item -Path 'C:\Falcor\media' -Destination '.\' -Recurse
          Copy-Item -Path 'C:\Falcor\media_internal' -Destination '.\' -Recurse
          Copy-Item -Path 'C:\Falcor\scripts' -Destination '.\' -Recurse
          cd ..\
      - name: Copy Slang to Falcor
        run: |
          cp --verbose --recursive --target-directory ./FalcorBin/build/windows-vs2022/bin/Release slang-bin/Release/bin/*
      - name: falcor-unit-test
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          cd .\FalcorBin\tests
          python ./testing/run_unit_tests.py --config windows-vs2022-Release -t "-slow"
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }
          cd ../../
      - name: falcor-image-test
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          cd .\FalcorBin\tests
          python ./testing/run_image_tests.py --config windows-vs2022-Release --run-only
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }
          cd ../../

  test-falcor-perf:
    name: Test (Falcor Perf)
    timeout-minutes: 100
    runs-on: [Windows, self-hosted, perf]
    defaults:
      run:
        shell: bash
    steps:
      - name: Add Git Bash to PATH
        shell: pwsh
        run: |
          Add-Content -Path $env:GITHUB_PATH -Value "C:\\Program Files\\Git\\bin"
          Add-Content -Path $env:GITHUB_PATH -Value "C:\\Program Files\\Git\\usr\\bin"
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
          submodules: "false"
          fetch-depth: "1"
      - name: Download Slang build
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: slang-tests-windows-x86_64-cl-release
          path: build

      - uses: robinraju/release-downloader@28fc21f50d76778e7023361aa1f863e717d3d56f # v1.13
        id: download
        with:
          # The source repository path.
          # Expected format {owner}/{repo}
          # Default: ${{ github.repository }}
          repository: "shader-slang/falcor-compile-perf-test"

          # A flag to set the download target as latest release
          # The default value is 'false'
          latest: true

          # The name of the file to download.
          # Use this field only to specify filenames other than tarball or zipball, if any.
          # Supports wildcard pattern (eg: '*', '*.deb', '*.zip' etc..)
          fileName: "falcor_perf_test-*-win-64.zip"

          # Relative path under $GITHUB_WORKSPACE to place the downloaded file(s)
          # It will create the target directory automatically if not present
          # eg: out-file-path: "my-downloads" => It will create directory $GITHUB_WORKSPACE/my-downloads
          out-file-path: "falcor-perf-test"

          # Somehow there is a bug in this flag, the executable extracted is not runnable. We have to
          # extract ourselves.
          extract: false

      - name: run falcor-compiler-perf-test
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $filename = '${{ fromJson(steps.download.outputs.downloaded_files)[0] }}'
          # Check if the downloaded file exists
          if (-not (Test-Path $filename)) {
            Write-Error "Downloaded file not found: $filename"
            exit 1
          }
          Expand-Archive $filename -DestinationPath .\falcor-perf-test
          $env:PATH = ".\build\Release\bin;" + $env:PATH

          # View current PATH
          Write-Host "PATH is $env:PATH"

          # Run the executable and check exit code
          Write-Host "Running falcor performance test..."
          & .\falcor-perf-test\bin\Release\falcor_perftest.exe
          if ($LASTEXITCODE -ne 0) {
            Write-Error "falcor_perftest.exe failed with exit code: $LASTEXITCODE"
            exit $LASTEXITCODE
          }
          Write-Host "falcor performance test completed successfully"
