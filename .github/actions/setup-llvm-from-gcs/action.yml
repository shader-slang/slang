name: Setup LLVM from GCS
description: Download LLVM prebuilts from Google Cloud Storage, build if missing

inputs:
  os:
    required: true
  compiler:
    required: true
  platform:
    required: true
  llvm-hash:
    description: "Hash of build-llvm scripts for cache key"
    required: true
  llvm-targets:
    description: "Semicolon-separated LLVM target architectures to build. Defaults to the cross-architecture set so libslang-llvm can emit code for all of them."
    required: false
    default: "X86;ARM;AArch64"
  build-if-missing:
    description: "Build LLVM if not found in GCS"
    required: false
    default: "true"
  github-token:
    description: "GitHub token for LLVM repo access"
    required: false

outputs:
  cache-hit:
    description: "Whether LLVM was found in GCS"
    value: ${{ steps.download.outputs.cache-hit }}

runs:
  using: composite
  steps:
    - name: Compute cache key
      id: cache-key
      shell: bash
      env:
        LLVM_TARGETS: ${{ inputs.llvm-targets }}
      run: |
        # Canonicalize llvm-targets: split on `;`, strip whitespace, lowercase
        # so the slug is case-insensitive (X86 vs x86 hit the same cache),
        # sort, dedupe, rejoin with `-`. Makes "X86;AArch64" and "AArch64;X86"
        # equivalent, tolerates stray whitespace, and avoids producing slugs
        # that contain mixed case.
        normalized_targets=()
        while IFS= read -r target; do
          target=${target//[[:space:]]/}
          if [ -z "$target" ]; then
            continue
          fi
          if [[ ! "$target" =~ ^[A-Za-z0-9_]+$ ]]; then
            echo "::error::Invalid LLVM target '${target}' in llvm-targets. Use a semicolon-separated list of target names."
            exit 1
          fi
          normalized_targets+=("$(printf '%s' "$target" | tr '[:upper:]' '[:lower:]')")
        done < <(printf '%s\n' "$LLVM_TARGETS" | tr ';' '\n')
        if [ "${#normalized_targets[@]}" -eq 0 ]; then
          echo "::error::llvm-targets must contain at least one non-empty LLVM target"
          exit 1
        fi
        TARGETS_SLUG="$(printf '%s\n' "${normalized_targets[@]}" | sort -u | paste -sd'-' -)"
        LLVM_KEY="llvm-${{ inputs.os }}-${{ inputs.compiler }}-${{ inputs.platform }}-${TARGETS_SLUG}-${{ inputs.llvm-hash }}"
        echo "llvm-key=${LLVM_KEY}" >> "$GITHUB_OUTPUT"

    - name: Download LLVM from GCS
      id: download
      shell: bash
      run: |
        LLVM_KEY="${{ steps.cache-key.outputs.llvm-key }}"
        PUBLIC_URL="https://storage.googleapis.com/slang-ci-cache/llvm-prebuilts/${LLVM_KEY}.tar.gz"

        echo "🔍 Checking for LLVM prebuilt: ${PUBLIC_URL}"

        # Remove any stale partial download from a previous run (self-hosted
        # runners persist /tmp between runs).
        rm -f /tmp/llvm-prebuilt.tar.gz

        # The bucket is publicly readable — download via curl (no gcloud SDK needed).
        if curl -fL --retry 3 --retry-delay 5 -o /tmp/llvm-prebuilt.tar.gz "${PUBLIC_URL}"; then
          echo "✅ Downloaded LLVM prebuilt"
        else
          echo "⚠️  LLVM prebuilt not found in GCS"
          echo "cache-hit=false" >> $GITHUB_OUTPUT
          exit 0
        fi

        echo "📦 Extracting LLVM..."
        mkdir -p build/llvm-project-install
        tar -xzf /tmp/llvm-prebuilt.tar.gz -C build/llvm-project-install
        rm /tmp/llvm-prebuilt.tar.gz

        # If the cached tarball is corrupt or missing the cmake-config tree we
        # link against, treat it as a cache miss and let the from-source
        # build step recover. Failing hard would block the build on a stale
        # cache entry that the next master push will overwrite anyway.
        if [ ! -d "build/llvm-project-install/lib/cmake/clang" ]; then
          echo "⚠️  Downloaded LLVM prebuilt is missing build/llvm-project-install/lib/cmake/clang/ — treating as cache miss"
          rm -rf build/llvm-project-install
          echo "cache-hit=false" >> $GITHUB_OUTPUT
          exit 0
        fi

        echo "cache-hit=true" >> $GITHUB_OUTPUT
        echo "✅ LLVM restored from GCS"

        echo "📊 LLVM installation size:"
        du -sh build/llvm-project-install

        # Set environment variables for CMake. We set CMAKE_PREFIX_PATH to the
        # LLVM install prefix so find_package(Clang CONFIG) can locate
        # ClangConfig.cmake via CMake's standard subdirectory search. Use $PWD
        # so the path resolves inside the current shell (container or host).
        # On Windows Git Bash, convert the path with `cygpath -m` so CMake sees
        # "C:/..." instead of "/c/...", and use `;` as the path separator
        # (CMake's documented separator on Windows; `:` would split drive
        # letters like `C:/` mid-path).
        LLVM_INSTALL="$PWD/build/llvm-project-install"
        PATH_SEP=":"
        if command -v cygpath >/dev/null; then
          LLVM_INSTALL="$(cygpath -m "$LLVM_INSTALL")"
          PATH_SEP=";"
        fi
        echo "CMAKE_PREFIX_PATH=${LLVM_INSTALL}${CMAKE_PREFIX_PATH:+${PATH_SEP}${CMAKE_PREFIX_PATH}}" >> $GITHUB_ENV
        echo "LLVM_DIR=${LLVM_INSTALL}/lib/cmake/llvm" >> $GITHUB_ENV
        echo "Clang_DIR=${LLVM_INSTALL}/lib/cmake/clang" >> $GITHUB_ENV

    - name: Build LLVM from source
      if: steps.download.outputs.cache-hit != 'true' && inputs.build-if-missing == 'true'
      shell: bash
      run: |
        echo "🔨 Building LLVM from source (this takes 20-40 minutes)..."

        # Use provided token or fallback to GITHUB_TOKEN
        REPO_URL="https://github.com/llvm/llvm-project"
        if [ -n "${{ inputs.github-token }}" ]; then
          REPO_URL="https://${{ inputs.github-token }}@github.com/llvm/llvm-project"
        fi

        # Use $PWD so the install prefix is an absolute path that is valid
        # inside the current shell (container or host). On Windows Git Bash,
        # convert to Windows-style ("C:/...") so CMake interprets it correctly.
        LLVM_INSTALL="$PWD/build/llvm-project-install"
        PATH_SEP=":"
        if command -v cygpath >/dev/null; then
          LLVM_INSTALL="$(cygpath -m "$LLVM_INSTALL")"
          PATH_SEP=";"
        fi

        ./external/build-llvm.sh \
          --install-prefix "${LLVM_INSTALL}" \
          --repo "${REPO_URL}" \
          --targets "${{ inputs.llvm-targets }}"

        echo "✅ LLVM build complete"

        # Verify the install actually landed where we expect. Fail hard
        # rather than letting the subsequent Slang configure fail with an
        # opaque find_package(Clang) error.
        if [ ! -d "${LLVM_INSTALL}/lib/cmake/clang" ]; then
          echo "::error::LLVM install is missing ${LLVM_INSTALL}/lib/cmake/clang/; install-distribution in external/build-llvm.sh did not produce ClangConfig.cmake."
          exit 1
        fi
        echo "📊 LLVM installation contents:"
        ls -la "${LLVM_INSTALL}/lib/cmake/clang/"

        # Set environment variables for CMake. See matching comment in the
        # download step above.
        echo "CMAKE_PREFIX_PATH=${LLVM_INSTALL}${CMAKE_PREFIX_PATH:+${PATH_SEP}${CMAKE_PREFIX_PATH}}" >> $GITHUB_ENV
        echo "LLVM_DIR=${LLVM_INSTALL}/lib/cmake/llvm" >> $GITHUB_ENV
        echo "Clang_DIR=${LLVM_INSTALL}/lib/cmake/clang" >> $GITHUB_ENV

    - name: Upload LLVM to GCS
      if: steps.download.outputs.cache-hit != 'true' && github.ref == 'refs/heads/master'
      shell: bash
      run: |
        LLVM_KEY="${{ steps.cache-key.outputs.llvm-key }}"
        GCS_PATH="gs://slang-ci-cache/llvm-prebuilts/${LLVM_KEY}.tar.gz"
        LLVM_DIR="$PWD/build/llvm-project-install"
        if command -v cygpath >/dev/null; then
          LLVM_DIR="$(cygpath -m "$LLVM_DIR")"
        fi

        if [ ! -d "${LLVM_DIR}" ]; then
          echo "ERROR: LLVM directory not found at ${LLVM_DIR}"
          exit 1
        fi

        if ! command -v gcloud &> /dev/null; then
          echo "⚠️  gcloud not available — skipping LLVM upload."
          echo "Upload manually: compress ${LLVM_DIR} and upload to ${GCS_PATH}"
          exit 0
        fi

        echo "📦 Compressing LLVM for upload..."
        echo "📊 Size before compression:"
        du -sh "${LLVM_DIR}"

        cd "${LLVM_DIR}"
        tar -czf "/tmp/${LLVM_KEY}.tar.gz" .
        cd -

        echo "📊 Compressed size:"
        ls -lh "/tmp/${LLVM_KEY}.tar.gz"

        echo "📤 Uploading to GCS: ${GCS_PATH}"

        gcloud config set storage/parallel_composite_upload_enabled False
        gcloud storage cp "/tmp/${LLVM_KEY}.tar.gz" "${GCS_PATH}"

        echo "✅ LLVM uploaded to GCS (publicly readable via bucket-level access)"

        # Cleanup
        rm "/tmp/${LLVM_KEY}.tar.gz"
