name: Setup sccache
description: Install and configure sccache for Linux, macOS, and Windows

inputs:
  platform:
    description: "Platform: linux, macos, or windows"
    required: true

runs:
  using: composite
  steps:
    # Install sccache
    - name: Install sccache (Linux)
      if: inputs.platform == 'linux'
      shell: bash
      run: |
        # Detect architecture
        ARCH=$(uname -m)
        if [[ "$ARCH" == "x86_64" ]]; then
          SCCACHE_ARCH="x86_64-unknown-linux-musl"
          SCCACHE_SHA256="782d2b5dd7ae0a55ebe368ab258114d0928d019ac2d949ab85d5d02f3926709e"
        elif [[ "$ARCH" == "aarch64" ]]; then
          SCCACHE_ARCH="aarch64-unknown-linux-musl"
          SCCACHE_SHA256="3a6a3712b49da3d263bf2d30d702de4302793016019e800bfb81c0c69401d8f8"
        else
          echo "Unsupported architecture: $ARCH"
          exit 1
        fi

        echo "Installing sccache for $ARCH ($SCCACHE_ARCH)"
        sccache_archive="/tmp/sccache.tar.gz"
        curl -fL --retry 3 --retry-delay 5 -o "$sccache_archive" \
          https://github.com/mozilla/sccache/releases/download/v0.15.0/sccache-v0.15.0-${SCCACHE_ARCH}.tar.gz
        printf '%s  %s\n' "$SCCACHE_SHA256" "$sccache_archive" | sha256sum -c -
        tar xz -f "$sccache_archive"
        rm "$sccache_archive"
        sccache_dir="sccache-v0.15.0-${SCCACHE_ARCH}"

        # Prefer a system install when available, but support non-root containers.
        if command -v sudo &> /dev/null && sudo -n true 2>/dev/null; then
          sudo mv "$sccache_dir/sccache" /usr/local/bin/
          sudo chmod +x /usr/local/bin/sccache
        elif [ -w /usr/local/bin ]; then
          mv "$sccache_dir/sccache" /usr/local/bin/
          chmod +x /usr/local/bin/sccache
        else
          if [[ -n "${RUNNER_TEMP:-}" && -d "$RUNNER_TEMP" && -w "$RUNNER_TEMP" ]]; then
            install_parent="$RUNNER_TEMP"
          else
            install_parent="/tmp"
          fi
          mkdir -p "$install_parent"
          install_dir=$(mktemp -d "$install_parent/sccache-bin.XXXXXX")
          mv "$sccache_dir/sccache" "$install_dir/"
          chmod +x "$install_dir/sccache"
          echo "$install_dir" >> "$GITHUB_PATH"
          export PATH="$install_dir:$PATH"
        fi
        rm -rf "$sccache_dir"

        sccache --version

    - name: Install sccache (macOS)
      if: inputs.platform == 'macos'
      shell: bash
      run: |
        # Pin sccache to a known version with checksum verification rather
        # than the rolling `brew install sccache`, matching the Linux and
        # Windows install paths above.
        ARCH=$(uname -m)
        if [[ "$ARCH" == "x86_64" ]]; then
          SCCACHE_ARCH="x86_64-apple-darwin"
          SCCACHE_SHA256="f8da93e0689122268f720ddb48c8357f3da18be8c88aff23a8e75a7a219367db"
        elif [[ "$ARCH" == "arm64" ]]; then
          SCCACHE_ARCH="aarch64-apple-darwin"
          SCCACHE_SHA256="430ef7b5f54256d3ed5bfe77e8b0afc51aa209aeebe4f95b69c3a52ce3acc6e9"
        else
          echo "Unsupported architecture: $ARCH"
          exit 1
        fi

        echo "Installing sccache for $ARCH ($SCCACHE_ARCH)"
        sccache_archive="$RUNNER_TEMP/sccache.tar.gz"
        curl -fL --retry 3 --retry-delay 5 -o "$sccache_archive" \
          https://github.com/mozilla/sccache/releases/download/v0.15.0/sccache-v0.15.0-${SCCACHE_ARCH}.tar.gz
        printf '%s  %s\n' "$SCCACHE_SHA256" "$sccache_archive" | shasum -a 256 -c -
        tar xz -C "$RUNNER_TEMP" -f "$sccache_archive"
        rm "$sccache_archive"

        install_dir="$RUNNER_TEMP/sccache-bin"
        mkdir -p "$install_dir"
        mv "$RUNNER_TEMP/sccache-v0.15.0-${SCCACHE_ARCH}/sccache" "$install_dir/"
        chmod +x "$install_dir/sccache"
        rm -rf "$RUNNER_TEMP/sccache-v0.15.0-${SCCACHE_ARCH}"
        echo "$install_dir" >> "$GITHUB_PATH"
        export PATH="$install_dir:$PATH"

        sccache --version

    - name: Install sccache (Windows)
      if: inputs.platform == 'windows'
      shell: pwsh
      run: |
        if (Get-Command sccache -ErrorAction SilentlyContinue) {
          Write-Host "✅ sccache already installed: $(sccache --version)"
        } else {
          # Verify x64 architecture
          if ($env:PROCESSOR_ARCHITECTURE -ne "AMD64") {
            Write-Host "Unsupported Windows architecture: $env:PROCESSOR_ARCHITECTURE"
            exit 1
          }

          Write-Host "Installing sccache for Windows..."
          $installDir = Join-Path $env:RUNNER_TEMP "sccache-bin"
          New-Item -ItemType Directory -Force -Path $installDir | Out-Null

          # Use .zip release to avoid tar path issues on Windows
          $zipFile = Join-Path $env:RUNNER_TEMP "sccache.zip"
          curl.exe -fL --retry 3 --retry-delay 5 -o $zipFile https://github.com/mozilla/sccache/releases/download/v0.15.0/sccache-v0.15.0-x86_64-pc-windows-msvc.zip
          $expectedHash = "dcf489090aa5ef4c7d145e8b29f759124c803d636c3107f397bd50d425b5f341"
          $actualHash = (Get-FileHash -Path $zipFile -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actualHash -ne $expectedHash) {
            throw "sccache archive SHA-256 mismatch: expected $expectedHash, got $actualHash"
          }
          Expand-Archive -Path $zipFile -DestinationPath $env:RUNNER_TEMP -Force
          Move-Item (Join-Path $env:RUNNER_TEMP "sccache-v0.15.0-x86_64-pc-windows-msvc\sccache.exe") (Join-Path $installDir "sccache.exe")
          $installDir | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
          & (Join-Path $installDir "sccache.exe") --version
        }

    # Configure sccache with local disk backend
    - name: Configure sccache (Unix)
      if: inputs.platform != 'windows'
      shell: bash
      run: |
        echo "SCCACHE_CACHE_ZSTD_LEVEL=3" >> $GITHUB_ENV
        echo "SCCACHE_IGNORE_SERVER_IO_ERROR=1" >> $GITHUB_ENV
        echo "SCCACHE_IDLE_TIMEOUT=0" >> $GITHUB_ENV
        echo "SCCACHE_BASE_DIR=$PWD" >> $GITHUB_ENV
        echo "SCCACHE_CACHE_SIZE=2G" >> $GITHUB_ENV
        echo "SCCACHE_DIR=/tmp/.cache/sccache" >> $GITHUB_ENV
        echo "sccache_cache_dir=/tmp/.cache/sccache" >> $GITHUB_ENV
        mkdir -p /tmp/.cache/sccache

        sccache_path=$(which sccache)
        echo "sccache_path=$sccache_path" >> $GITHUB_ENV

        echo "🔧 sccache configured for local disk backend"

    - name: Configure sccache (Windows)
      if: inputs.platform == 'windows'
      shell: pwsh
      run: |
        "SCCACHE_CACHE_ZSTD_LEVEL=3" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
        "SCCACHE_IGNORE_SERVER_IO_ERROR=1" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
        "SCCACHE_IDLE_TIMEOUT=0" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
        "SCCACHE_BASE_DIR=$PWD" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
        "SCCACHE_CACHE_SIZE=2G" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

        # Set Windows cache directory
        $sccacheDir = "C:\sccache"
        if (-not (Test-Path $sccacheDir -ErrorAction SilentlyContinue)) {
          try {
            New-Item -ItemType Directory -Force -Path $sccacheDir | Out-Null
          } catch {
            $sccacheDir = Join-Path $env:RUNNER_TEMP "sccache"
            New-Item -ItemType Directory -Force -Path $sccacheDir | Out-Null
          }
        }
        "SCCACHE_DIR=$sccacheDir" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
        "sccache_cache_dir=$sccacheDir" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

        $sccachePath = (Get-Command sccache).Source
        "sccache_path=$sccachePath" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

        Write-Host "🔧 sccache configured for local disk backend ($sccacheDir)"
