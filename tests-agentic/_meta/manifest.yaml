# Manifest mapping each agentic test bundle to its prompt, source doc,
# watched source paths, dependencies, coverage targets, and runner
# configuration. Consumed by _meta/regenerate.py.
#
# Schema: _meta/schema/manifest.schema.json
#
# Conventions:
#   - One bundle per file in docs/llm-generated/. Bundle key matches the
#     doc path (without the docs/llm-generated/ prefix).
#   - The bundle directory is tests-agentic/<key without .md>/.
#   - watched_paths globs are workspace-relative and use the same set as
#     the corresponding doc in docs/llm-generated/_meta/manifest.yaml.
#     This is intentional: when the watched source changes, the doc
#     becomes stale AND the test bundle becomes stale.
#   - source_doc is the docs/llm-generated/ file this bundle's tests
#     derive their claims from. Its sha256 is tracked separately so doc
#     edits invalidate the bundle.
#   - depends_on lists other bundles whose BUNDLE.md is provided as
#     context to the agent (Phase C cross-link pass). Mirrors the
#     analogous depends_on in the docs manifest.
#   - coverage_targets names the slangc source files this bundle is
#     responsible for exercising. Used by `expansion-candidates` to
#     rank bundles by under-coverage. NEVER fed to a test-writing prompt
#     as line-level detail; expansion stays doc-anchored.
#   - runner.category drives the slang-test filter that selects this
#     bundle in the nightly job. All categories begin with `agentic-`.
#   - size_cap_files is a soft cap on the number of .slang files in the
#     bundle; the lint pass warns above it.

version: 1
default_size_cap_files: 30
default_runner:
  tool: slang-test
  category_prefix: agentic-

bundles:
  # --- architecture/ -----------------------------------------------------

  architecture/overview:
    prompt: prompts/architecture-overview.md
    source_doc: docs/llm-generated/architecture/overview.md
    watched_paths:
      - source/slang/slang-compile-request.h
      - source/slang/slang-compile-request.cpp
      - source/slang/slang-module.h
      - source/slang/slang-module.cpp
      - include/slang.h
    depends_on: []
    coverage_targets:
      - source/slang/slang-compile-request.cpp
      - source/slang/slang-module.cpp
    runner:
      category: agentic-architecture
    size_cap_files: 15

  architecture/module-map:
    prompt: prompts/architecture-module-map.md
    source_doc: docs/llm-generated/architecture/module-map.md
    watched_paths:
      - source/slang/slang-*.h
      - source/slang/slang-*.cpp
      - source/compiler-core/slang-*.h
      - source/compiler-core/slang-*.cpp
    depends_on:
      - architecture/overview
    coverage_targets: []
    runner:
      category: agentic-architecture
    size_cap_files: 20

  architecture/dependency-graph:
    prompt: prompts/architecture-dependency-graph.md
    source_doc: docs/llm-generated/architecture/dependency-graph.md
    watched_paths:
      - source/*/CMakeLists.txt
    depends_on:
      - architecture/module-map
    coverage_targets: []
    runner:
