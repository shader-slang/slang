<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 510" font-family="'Segoe UI', system-ui, Arial, sans-serif">
  <defs>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#6B7280"/>
    </marker>
    <marker id="arrowDown" viewBox="0 0 10 10" refX="5" refY="9" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 1 0 L 5 9 L 9 0 z" fill="#6B7280"/>
    </marker>
  </defs>

  <rect width="960" height="510" fill="white" rx="8"/>

  <text x="480" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#111827">MMA Data Flow Through Memory Hierarchy</text>
  <text x="480" y="50" text-anchor="middle" font-size="12" fill="#6B7280">Per k-iteration: Global &#x2192; Shared Memory &#x2192; Cooperative Matrices &#x2192; Shared Memory &#x2192; Registers</text>

  <!-- Main pipeline -->
  <g transform="translate(30, 80)">
    <!-- Global Memory (W) -->
    <rect x="0" y="-18" width="140" height="46" rx="8" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5"/>
    <text x="70" y="0" text-anchor="middle" font-size="10" font-weight="600" fill="#5B21B6">Global Memory</text>
    <text x="70" y="16" text-anchor="middle" font-size="9" fill="#7C3AED">W (weight matrix)</text>

    <!-- Thread-local Registers (input) -->
    <rect x="0" y="34" width="140" height="46" rx="8" fill="#D1FAE5" stroke="#10B981" stroke-width="1.5"/>
    <text x="70" y="52" text-anchor="middle" font-size="10" font-weight="600" fill="#065F46">Registers</text>
    <text x="70" y="68" text-anchor="middle" font-size="9" fill="#059669">Thread-local input[K]</text>

    <!-- Arrow: Global Memory -> shA -->
    <line x1="145" y1="5" x2="185" y2="18" stroke="#8B5CF6" stroke-width="1.5" marker-end="url(#arrowGray)"/>
    <text x="168" y="4" text-anchor="middle" font-size="8" fill="#8B5CF6" font-weight="600">load</text>

    <!-- Arrow: Registers -> shB -->
    <line x1="145" y1="57" x2="185" y2="42" stroke="#10B981" stroke-width="1.5" marker-end="url(#arrowGray)"/>
    <text x="168" y="60" text-anchor="middle" font-size="8" fill="#10B981" font-weight="600">write</text>

    <!-- Shared Memory (input) -->
    <rect x="190" y="0" width="160" height="60" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
    <text x="270" y="18" text-anchor="middle" font-size="11" font-weight="600" fill="#92400E">Shared Memory</text>
    <text x="270" y="34" text-anchor="middle" font-size="9" fill="#B45309">shA: W tile (all warps)</text>
    <text x="270" y="48" text-anchor="middle" font-size="9" fill="#B45309">shB: input slice (per warp)</text>

    <!-- Arrow 2 -->
    <line x1="355" y1="30" x2="395" y2="30" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arrowGray)"/>
    <text x="375" y="22" text-anchor="middle" font-size="8.5" fill="#6B7280" font-weight="600">load</text>

    <!-- Cooperative Matrices -->
    <rect x="400" y="0" width="170" height="60" rx="8" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
    <text x="485" y="18" text-anchor="middle" font-size="11" font-weight="600" fill="#1E40AF">Cooperative Matrices</text>
    <text x="485" y="34" text-anchor="middle" font-size="9.5" fill="#3B82F6" font-weight="500">MatA[i] &#xD7; MatB[j]</text>
    <text x="485" y="48" text-anchor="middle" font-size="9.5" fill="#3B82F6" font-weight="500">&#x2192; MatC[i,j] += (MMA)</text>

    <!-- Arrow 3 -->
    <line x1="575" y1="30" x2="615" y2="30" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arrowGray)"/>
    <text x="595" y="22" text-anchor="middle" font-size="8.5" fill="#6B7280" font-weight="600">store</text>

    <!-- Shared Memory (output) -->
    <rect x="620" y="0" width="140" height="60" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
    <text x="690" y="18" text-anchor="middle" font-size="11" font-weight="600" fill="#92400E">Shared Memory</text>
    <text x="690" y="34" text-anchor="middle" font-size="9" fill="#B45309">shC: output tiles</text>
    <text x="690" y="48" text-anchor="middle" font-size="9" fill="#B45309">(col-major, per warp)</text>

    <!-- Arrow 4 -->
    <line x1="765" y1="30" x2="805" y2="30" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arrowGray)"/>
    <text x="785" y="22" text-anchor="middle" font-size="8.5" fill="#6B7280" font-weight="600">read</text>

    <!-- Registers -->
    <rect x="810" y="0" width="120" height="60" rx="8" fill="#D1FAE5" stroke="#10B981" stroke-width="1.5"/>
    <text x="870" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#065F46">Registers</text>
    <text x="870" y="38" text-anchor="middle" font-size="9" fill="#059669">output[M]</text>
    <text x="870" y="50" text-anchor="middle" font-size="9" fill="#059669">(per thread)</text>
  </g>

  <!-- Annotations below -->
  <g transform="translate(30, 165)">
    <!-- Source notes -->
    <rect x="0" y="0" width="160" height="42" rx="5" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="0.8"/>
    <text x="80" y="15" text-anchor="middle" font-size="8.5" fill="#5B21B6" font-weight="600">W: global, read-only</text>
    <text x="80" y="28" text-anchor="middle" font-size="8" fill="#065F46" font-weight="600">input[K]: thread-local register</text>
    <text x="80" y="39" text-anchor="middle" font-size="8" fill="#6B7280">Two different source types</text>

    <!-- shA note -->
    <rect x="190" y="0" width="160" height="42" rx="5" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="0.8"/>
    <text x="270" y="15" text-anchor="middle" font-size="8.5" fill="#374151" font-weight="600">loadShA: all warps cooperate</text>
    <text x="270" y="28" text-anchor="middle" font-size="8" fill="#6B7280">One column of W tiles</text>
    <text x="270" y="39" text-anchor="middle" font-size="8" fill="#6B7280">loaded per k-iteration</text>

    <!-- CoopMat note -->
    <rect x="400" y="0" width="170" height="42" rx="5" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="0.8"/>
    <text x="485" y="15" text-anchor="middle" font-size="8.5" fill="#374151" font-weight="600">16&#xD7;16 tile operations</text>
    <text x="485" y="28" text-anchor="middle" font-size="8" fill="#6B7280">coopMatMulAdd (hardware)</text>
    <text x="485" y="39" text-anchor="middle" font-size="8" fill="#6B7280">Each warp: own MatB, MatC</text>

    <!-- shC note -->
    <rect x="620" y="0" width="140" height="42" rx="5" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="0.8"/>
    <text x="690" y="15" text-anchor="middle" font-size="8.5" fill="#374151" font-weight="600">Column = one thread's output</text>
    <text x="690" y="28" text-anchor="middle" font-size="8" fill="#6B7280">Each thread reads its column</text>
    <text x="690" y="39" text-anchor="middle" font-size="8" fill="#6B7280">back to local register vector</text>
  </g>

  <!-- K-loop annotation -->
  <g transform="translate(30, 225)">
    <rect x="0" y="0" width="930" height="40" rx="6" fill="#F0F9FF" stroke="#BAE6FD" stroke-width="1"/>
    <text x="465" y="16" text-anchor="middle" font-size="10" font-weight="600" fill="#0369A1">K-Loop (outer): for k = 0 to K step 16</text>
    <text x="465" y="32" text-anchor="middle" font-size="9" fill="#0369A1">Each iteration loads the next column slice of W and the next 16 elements of each thread's input vector. GroupSync between iterations.</text>
  </g>

  <!-- ================================================================ -->
  <!-- SHARED MEMORY LAYOUT (BOTTOM)                                    -->
  <!-- ================================================================ -->
  <line x1="40" y1="280" x2="920" y2="280" stroke="#E5E7EB" stroke-width="1"/>
  <text x="480" y="305" text-anchor="middle" font-size="14" font-weight="700" fill="#374151">Shared Memory Tile Layout (per k-step)</text>

  <!-- shA: Weight tile (shared by all warps) -->
  <g transform="translate(40, 320)">
    <rect x="0" y="0" width="200" height="170" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
    <text x="100" y="18" text-anchor="middle" font-size="10" font-weight="700" fill="#1E40AF">shA (Weight Column Tile)</text>
    <text x="100" y="32" text-anchor="middle" font-size="8.5" fill="#3B82F6">M &#xD7; 16  (shared by all warps)</text>

    <g transform="translate(50, 42)">
      <rect x="0" y="0" width="100" height="55" rx="3" fill="#93C5FD" stroke="#1D4ED8" stroke-width="1.5"/>
      <text x="50" y="22" text-anchor="middle" font-size="10" fill="#1E3A8A" font-weight="700">MatA[0]</text>
      <text x="50" y="38" text-anchor="middle" font-size="8" fill="#1D4ED8">16 &#xD7; 16</text>
      <text x="50" y="48" text-anchor="middle" font-size="7" fill="#3B82F6">rows 0-15</text>

      <rect x="0" y="59" width="100" height="55" rx="3" fill="#93C5FD" stroke="#1D4ED8" stroke-width="1.5"/>
      <text x="50" y="81" text-anchor="middle" font-size="10" fill="#1E3A8A" font-weight="700">MatA[1]</text>
      <text x="50" y="97" text-anchor="middle" font-size="8" fill="#1D4ED8">16 &#xD7; 16</text>
      <text x="50" y="107" text-anchor="middle" font-size="7" fill="#3B82F6">rows 16-31</text>
    </g>

    <text x="100" y="164" text-anchor="middle" font-size="8" fill="#6B7280" font-style="italic">NCoopMatRow = M/16 = 2</text>
  </g>

  <!-- shB: Input tile (PER WARP) - with Warp 0 and Warp 1 -->
  <g transform="translate(280, 320)">
    <rect x="0" y="0" width="240" height="170" rx="6" fill="#D1FAE5" stroke="#10B981" stroke-width="1.5"/>
    <text x="120" y="18" text-anchor="middle" font-size="10" font-weight="700" fill="#065F46">shB (Input Row Tile) &#xD7; W warps</text>
    <text x="120" y="32" text-anchor="middle" font-size="8.5" fill="#10B981">16 &#xD7; N  (separate per warp)</text>

    <!-- Warp 0 -->
    <g transform="translate(10, 42)">
      <rect x="0" y="0" width="105" height="75" rx="3" fill="#6EE7B7" stroke="#047857" stroke-width="1.2"/>
      <text x="52" y="14" text-anchor="middle" font-size="8" fill="#064E3B" font-weight="600">Warp 0</text>
      <rect x="5" y="20" width="45" height="30" rx="2" fill="#A7F3D0" stroke="#047857" stroke-width="0.8"/>
      <text x="27" y="36" text-anchor="middle" font-size="8" fill="#064E3B" font-weight="600">MatB[0]</text>
      <text x="27" y="48" text-anchor="middle" font-size="6.5" fill="#047857">16&#xD7;16</text>
      <rect x="54" y="20" width="45" height="30" rx="2" fill="#A7F3D0" stroke="#047857" stroke-width="0.8"/>
      <text x="76" y="36" text-anchor="middle" font-size="8" fill="#064E3B" font-weight="600">MatB[1]</text>
      <text x="76" y="48" text-anchor="middle" font-size="6.5" fill="#047857">16&#xD7;16</text>
      <text x="52" y="65" text-anchor="middle" font-size="7" fill="#065F46">cols: T0-T15, T16-T31</text>
    </g>

    <!-- Warp 1 -->
    <g transform="translate(120, 42)">
      <rect x="0" y="0" width="105" height="75" rx="3" fill="#6EE7B7" stroke="#047857" stroke-width="1.2"/>
      <text x="52" y="14" text-anchor="middle" font-size="8" fill="#064E3B" font-weight="600">Warp 1</text>
      <rect x="5" y="20" width="45" height="30" rx="2" fill="#A7F3D0" stroke="#047857" stroke-width="0.8"/>
      <text x="27" y="36" text-anchor="middle" font-size="8" fill="#064E3B" font-weight="600">MatB[0]</text>
      <text x="27" y="48" text-anchor="middle" font-size="6.5" fill="#047857">16&#xD7;16</text>
      <rect x="54" y="20" width="45" height="30" rx="2" fill="#A7F3D0" stroke="#047857" stroke-width="0.8"/>
      <text x="76" y="36" text-anchor="middle" font-size="8" fill="#064E3B" font-weight="600">MatB[1]</text>
      <text x="76" y="48" text-anchor="middle" font-size="6.5" fill="#047857">16&#xD7;16</text>
      <text x="52" y="65" text-anchor="middle" font-size="7" fill="#065F46">cols: T0-T15, T16-T31</text>
    </g>

    <text x="120" y="132" text-anchor="middle" font-size="8" fill="#6B7280">Each warp has its own shB region</text>
    <text x="120" y="144" text-anchor="middle" font-size="8" fill="#6B7280">Each column = one thread's input[k:k+16]</text>
    <text x="120" y="158" text-anchor="middle" font-size="8" fill="#6B7280" font-style="italic">NCoopMatColumn = N/16 = 2</text>
  </g>

  <!-- Key: Loading into Cooperative Matrices -->
  <g transform="translate(560, 320)">
    <rect x="0" y="0" width="370" height="170" rx="6" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>
    <text x="185" y="20" text-anchor="middle" font-size="11" font-weight="700" fill="#374151">Loading into Cooperative Matrices</text>
    <line x1="15" y1="28" x2="355" y2="28" stroke="#E5E7EB" stroke-width="0.8"/>

    <rect x="12" y="36" width="12" height="12" rx="2" fill="#93C5FD" stroke="#1D4ED8" stroke-width="1"/>
    <text x="30" y="46" text-anchor="start" font-size="9" fill="#1E40AF" font-weight="600">MatA[i].Load&lt;RowMajor&gt;(shA, ...)</text>
    <text x="30" y="58" text-anchor="start" font-size="8" fill="#6B7280">Stride = width of A tile in uint4 vectors</text>
    <text x="30" y="70" text-anchor="start" font-size="8" fill="#6B7280">Same tile loaded by ALL warps in workgroup</text>

    <rect x="12" y="80" width="12" height="12" rx="2" fill="#A7F3D0" stroke="#047857" stroke-width="1"/>
    <text x="30" y="90" text-anchor="start" font-size="9" fill="#065F46" font-weight="600">MatB[j].Load&lt;ColumnMajor&gt;(shB, ...)</text>
    <text x="30" y="102" text-anchor="start" font-size="8" fill="#6B7280">Stride = height of B tile in uint4 vectors</text>
    <text x="30" y="114" text-anchor="start" font-size="8" fill="#6B7280">Each warp loads from its OWN shB region</text>

    <rect x="12" y="124" width="12" height="12" rx="2" fill="#FDE68A" stroke="#D97706" stroke-width="1"/>
    <text x="30" y="134" text-anchor="start" font-size="9" fill="#92400E" font-weight="600">MatC[i*NCol+j]: register-resident accumulator</text>
    <text x="30" y="146" text-anchor="start" font-size="8" fill="#6B7280">Initialized to 0, accumulated across all k-steps</text>
    <text x="30" y="158" text-anchor="start" font-size="8" fill="#6B7280">Stored to shC only after all k-iterations complete</text>
  </g>
</svg>
