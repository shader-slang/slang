<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" font-family="'Segoe UI', system-ui, Arial, sans-serif">
  <defs>
    <marker id="aG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#6B7280"/>
    </marker>
  </defs>

  <rect width="960" height="540" fill="white" rx="8"/>

  <!-- Title -->
  <text x="480" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#111827">NeRF vs Traditional Reconstruction</text>

  <!-- ================================================================ -->
  <!-- Traditional pipeline (top, red)                                   -->
  <!-- ================================================================ -->
  <g transform="translate(30, 60)">
    <rect x="0" y="0" width="900" height="170" rx="10" fill="#FEF2F2" stroke="#FECACA" stroke-width="1"/>
    <text x="20" y="22" font-size="13" font-weight="700" fill="#991B1B">Traditional</text>

    <!-- Pipeline stages -->
    <g transform="translate(15, 42)">
      <!-- Photos -->
      <rect x="0" y="4" width="56" height="44" rx="5" fill="#E5E7EB" stroke="#9CA3AF" stroke-width="1"/>
      <rect x="5" y="8" width="20" height="16" rx="1" fill="#D1D5DB"/><rect x="29" y="8" width="20" height="16" rx="1" fill="#D1D5DB"/>
      <rect x="5" y="28" width="20" height="16" rx="1" fill="#D1D5DB"/><rect x="29" y="28" width="20" height="16" rx="1" fill="#D1D5DB"/>
      <text x="28" y="62" text-anchor="middle" font-size="8" fill="#6B7280">Photos</text>

      <line x1="62" y1="26" x2="82" y2="26" stroke="#9CA3AF" stroke-width="1.2" marker-end="url(#aG)"/>

      <!-- SfM -->
      <rect x="88" y="4" width="72" height="44" rx="5" fill="#E5E7EB" stroke="#9CA3AF" stroke-width="1"/>
      <text x="124" y="24" text-anchor="middle" font-size="9" font-weight="600" fill="#374151">SfM</text>
      <text x="124" y="38" text-anchor="middle" font-size="7" fill="#6B7280">feature match</text>
      <text x="124" y="62" text-anchor="middle" font-size="8" fill="#DC2626">fragile</text>

      <line x1="166" y1="26" x2="186" y2="26" stroke="#9CA3AF" stroke-width="1.2" marker-end="url(#aG)"/>

      <!-- Sparse points -->
      <rect x="192" y="4" width="60" height="44" rx="5" fill="#E5E7EB" stroke="#9CA3AF" stroke-width="1"/>
      <circle cx="207" cy="16" r="1.5" fill="#6B7280"/><circle cx="218" cy="20" r="1.5" fill="#6B7280"/>
      <circle cx="230" cy="14" r="1.5" fill="#6B7280"/><circle cx="212" cy="30" r="1.5" fill="#6B7280"/>
      <circle cx="225" cy="34" r="1.5" fill="#6B7280"/><circle cx="240" cy="26" r="1.5" fill="#6B7280"/>
      <circle cx="237" cy="38" r="1.5" fill="#6B7280"/><circle cx="205" cy="40" r="1.5" fill="#6B7280"/>
      <text x="222" y="62" text-anchor="middle" font-size="8" fill="#6B7280">Sparse</text>

      <line x1="258" y1="26" x2="278" y2="26" stroke="#9CA3AF" stroke-width="1.2" marker-end="url(#aG)"/>

      <!-- MVS -->
      <rect x="284" y="4" width="72" height="44" rx="5" fill="#E5E7EB" stroke="#9CA3AF" stroke-width="1"/>
      <text x="320" y="24" text-anchor="middle" font-size="9" font-weight="600" fill="#374151">MVS</text>
      <text x="320" y="38" text-anchor="middle" font-size="7" fill="#6B7280">dense match</text>
      <text x="320" y="62" text-anchor="middle" font-size="8" fill="#DC2626">slow</text>

      <line x1="362" y1="26" x2="382" y2="26" stroke="#9CA3AF" stroke-width="1.2" marker-end="url(#aG)"/>

      <!-- Dense points -->
      <rect x="388" y="4" width="60" height="44" rx="5" fill="#E5E7EB" stroke="#9CA3AF" stroke-width="1"/>
      <!-- Dense dot grid -->
      <g transform="translate(394, 10)">
        <circle cx="4" cy="3" r="0.8" fill="#374151"/><circle cx="9" cy="3" r="0.8" fill="#374151"/><circle cx="14" cy="3" r="0.8" fill="#374151"/><circle cx="19" cy="3" r="0.8" fill="#374151"/><circle cx="24" cy="3" r="0.8" fill="#374151"/><circle cx="29" cy="3" r="0.8" fill="#374151"/><circle cx="34" cy="3" r="0.8" fill="#374151"/><circle cx="39" cy="3" r="0.8" fill="#374151"/><circle cx="44" cy="3" r="0.8" fill="#374151"/>
        <circle cx="4" cy="8" r="0.8" fill="#374151"/><circle cx="9" cy="8" r="0.8" fill="#374151"/><circle cx="14" cy="8" r="0.8" fill="#374151"/><circle cx="19" cy="8" r="0.8" fill="#374151"/><circle cx="24" cy="8" r="0.8" fill="#374151"/><circle cx="29" cy="8" r="0.8" fill="#374151"/><circle cx="34" cy="8" r="0.8" fill="#374151"/><circle cx="39" cy="8" r="0.8" fill="#374151"/><circle cx="44" cy="8" r="0.8" fill="#374151"/>
        <circle cx="4" cy="13" r="0.8" fill="#374151"/><circle cx="9" cy="13" r="0.8" fill="#374151"/><circle cx="14" cy="13" r="0.8" fill="#374151"/><circle cx="19" cy="13" r="0.8" fill="#374151"/><circle cx="24" cy="13" r="0.8" fill="#374151"/><circle cx="29" cy="13" r="0.8" fill="#374151"/><circle cx="34" cy="13" r="0.8" fill="#374151"/><circle cx="39" cy="13" r="0.8" fill="#374151"/><circle cx="44" cy="13" r="0.8" fill="#374151"/>
        <circle cx="4" cy="18" r="0.8" fill="#374151"/><circle cx="9" cy="18" r="0.8" fill="#374151"/><circle cx="14" cy="18" r="0.8" fill="#374151"/><circle cx="19" cy="18" r="0.8" fill="#374151"/><circle cx="24" cy="18" r="0.8" fill="#374151"/><circle cx="29" cy="18" r="0.8" fill="#374151"/><circle cx="34" cy="18" r="0.8" fill="#374151"/><circle cx="39" cy="18" r="0.8" fill="#374151"/><circle cx="44" cy="18" r="0.8" fill="#374151"/>
        <circle cx="4" cy="23" r="0.8" fill="#374151"/><circle cx="9" cy="23" r="0.8" fill="#374151"/><circle cx="14" cy="23" r="0.8" fill="#374151"/><circle cx="19" cy="23" r="0.8" fill="#374151"/><circle cx="24" cy="23" r="0.8" fill="#374151"/><circle cx="29" cy="23" r="0.8" fill="#374151"/><circle cx="34" cy="23" r="0.8" fill="#374151"/><circle cx="39" cy="23" r="0.8" fill="#374151"/><circle cx="44" cy="23" r="0.8" fill="#374151"/>
      </g>
      <text x="418" y="62" text-anchor="middle" font-size="8" fill="#6B7280">Dense</text>

      <line x1="454" y1="26" x2="474" y2="26" stroke="#9CA3AF" stroke-width="1.2" marker-end="url(#aG)"/>

      <!-- Mesh -->
      <rect x="480" y="4" width="60" height="44" rx="5" fill="#E5E7EB" stroke="#9CA3AF" stroke-width="1"/>
      <polygon points="498,12 514,10 506,26" fill="none" stroke="#374151" stroke-width="0.8"/>
      <polygon points="514,10 530,16 520,28" fill="none" stroke="#374151" stroke-width="0.8"/>
      <polygon points="506,26 520,28 512,40" fill="none" stroke="#374151" stroke-width="0.8"/>
      <polygon points="520,28 530,16 534,30" fill="none" stroke="#374151" stroke-width="0.8"/>
      <polygon points="492,28 506,26 498,40" fill="none" stroke="#374151" stroke-width="0.8"/>
      <text x="510" y="62" text-anchor="middle" font-size="8" fill="#DC2626">holes</text>

      <line x1="546" y1="26" x2="566" y2="26" stroke="#9CA3AF" stroke-width="1.2" marker-end="url(#aG)"/>

      <!-- Texture map -->
      <rect x="572" y="4" width="60" height="44" rx="5" fill="#E5E7EB" stroke="#9CA3AF" stroke-width="1"/>
      <rect x="580" y="10" width="44" height="30" rx="1" fill="#FEF3C7" stroke="#FDE68A" stroke-width="0.5"/>
      <line x1="591" y1="10" x2="591" y2="40" stroke="#FDE68A" stroke-width="0.4"/>
      <line x1="602" y1="10" x2="602" y2="40" stroke="#FDE68A" stroke-width="0.4"/>
      <line x1="613" y1="10" x2="613" y2="40" stroke="#FDE68A" stroke-width="0.4"/>
      <line x1="580" y1="20" x2="624" y2="20" stroke="#FDE68A" stroke-width="0.4"/>
      <line x1="580" y1="30" x2="624" y2="30" stroke="#FDE68A" stroke-width="0.4"/>
      <text x="602" y="62" text-anchor="middle" font-size="8" fill="#DC2626">seams</text>

      <line x1="638" y1="26" x2="658" y2="26" stroke="#9CA3AF" stroke-width="1.2" marker-end="url(#aG)"/>

      <!-- Render -->
      <rect x="664" y="4" width="60" height="44" rx="5" fill="#E5E7EB" stroke="#9CA3AF" stroke-width="1"/>
      <rect x="670" y="8" width="48" height="36" rx="2" fill="#D1D5DB"/>
      <polygon points="684,40 694,22 704,40" fill="#9CA3AF" opacity="0.4"/>
      <circle cx="706" cy="16" r="5" fill="#FDE68A" opacity="0.4"/>
      <text x="694" y="62" text-anchor="middle" font-size="8" fill="#6B7280">Render</text>
    </g>

    <!-- Summary line -->
    <text x="450" y="128" text-anchor="middle" font-size="10" fill="#991B1B" font-weight="600">7 fragile stages &#x2022; each loses information &#x2022; no view-dependent effects</text>

    <!-- Loss callout icons -->
    <g transform="translate(30, 136)">
      <!-- Info lost at each stage -->
      <rect x="0" y="0" width="840" height="22" rx="4" fill="#FEE2E2"/>
      <text x="420" y="15" text-anchor="middle" font-size="8" fill="#991B1B">
        lost: sub-pixel features &#x2192; occluded regions &#x2192; density &#x2192; topology &#x2192; reflectance detail &#x2192; view dependence
      </text>
    </g>
  </g>

  <!-- ================================================================ -->
  <!-- NeRF pipeline (bottom, green)                                     -->
  <!-- ================================================================ -->
  <g transform="translate(30, 252)">
    <rect x="0" y="0" width="900" height="120" rx="10" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1.2"/>
    <text x="20" y="22" font-size="13" font-weight="700" fill="#166534">NeRF</text>

    <g transform="translate(80, 36)">
      <!-- Photos -->
      <rect x="0" y="2" width="130" height="48" rx="6" fill="#D1FAE5" stroke="#10B981" stroke-width="1.2"/>
      <rect x="6" y="8" width="22" height="16" rx="2" fill="#A7F3D0"/>
      <rect x="32" y="8" width="22" height="16" rx="2" fill="#A7F3D0"/>
      <rect x="58" y="8" width="22" height="16" rx="2" fill="#A7F3D0"/>
      <rect x="84" y="8" width="22" height="16" rx="2" fill="#A7F3D0"/>
      <text x="65" y="38" text-anchor="middle" font-size="8" font-weight="600" fill="#065F46">Photos + poses</text>
      <text x="65" y="66" text-anchor="middle" font-size="9" fill="#059669" font-weight="600">same input</text>

      <!-- Arrow -->
      <line x1="140" y1="26" x2="220" y2="26" stroke="#10B981" stroke-width="2.5" marker-end="url(#aG)"/>
      <text x="180" y="18" text-anchor="middle" font-size="10" font-weight="700" fill="#059669">train</text>

      <!-- MLP box -->
      <rect x="230" y="0" width="160" height="52" rx="8" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
      <circle cx="255" cy="14" r="5" fill="#3B82F6"/><circle cx="255" cy="28" r="5" fill="#3B82F6"/><circle cx="255" cy="42" r="5" fill="#3B82F6"/>
      <circle cx="280" cy="10" r="4" fill="#60A5FA"/><circle cx="280" cy="22" r="4" fill="#60A5FA"/><circle cx="280" cy="34" r="4" fill="#60A5FA"/><circle cx="280" cy="46" r="4" fill="#60A5FA"/>
      <circle cx="305" cy="10" r="4" fill="#8B5CF6"/><circle cx="305" cy="22" r="4" fill="#8B5CF6"/><circle cx="305" cy="34" r="4" fill="#8B5CF6"/><circle cx="305" cy="46" r="4" fill="#8B5CF6"/>
      <circle cx="330" cy="14" r="5" fill="#A78BFA"/><circle cx="330" cy="28" r="5" fill="#A78BFA"/><circle cx="330" cy="42" r="5" fill="#A78BFA"/>
      <circle cx="360" cy="22" r="5" fill="#EF4444"/><circle cx="360" cy="38" r="5" fill="#EF4444"/>
      <text x="310" y="-8" text-anchor="middle" font-size="11" font-weight="700" fill="#1E40AF">MLP</text>
      <text x="310" y="66" text-anchor="middle" font-size="9" fill="#1E40AF" font-weight="600">one network</text>

      <!-- Arrow -->
      <line x1="400" y1="26" x2="480" y2="26" stroke="#10B981" stroke-width="2.5" marker-end="url(#aG)"/>
      <text x="440" y="18" text-anchor="middle" font-size="10" font-weight="700" fill="#059669">render</text>

      <!-- Output views -->
      <rect x="490" y="-2" width="56" height="46" rx="5" fill="#FFE4E6" stroke="#EF4444" stroke-width="1.2"/>
      <rect x="494" y="2" width="48" height="38" rx="3" fill="#FECDD3"/>
      <ellipse cx="518" cy="21" rx="14" ry="10" fill="#EF4444" opacity="0.15"/>
      <rect x="554" y="2" width="50" height="42" rx="5" fill="#FFE4E6" stroke="#EF4444" stroke-width="0.8" opacity="0.55"/>
      <rect x="612" y="6" width="44" height="38" rx="5" fill="#FFE4E6" stroke="#EF4444" stroke-width="0.6" opacity="0.3"/>
      <text x="570" y="60" text-anchor="middle" font-size="9" font-weight="600" fill="#9F1239">Any novel view</text>
    </g>

    <!-- Summary -->
    <text x="450" y="110" text-anchor="middle" font-size="10" fill="#166534" font-weight="600">3 steps &#x2022; nothing lost &#x2022; view-dependent effects &#x2022; fully differentiable</text>
  </g>

  <!-- ================================================================ -->
  <!-- Advantages at bottom                                              -->
  <!-- ================================================================ -->
  <g transform="translate(30, 400)">
    <text x="450" y="16" text-anchor="middle" font-size="14" font-weight="700" fill="#374151">What the MLP gives you for free</text>

    <g transform="translate(0, 30)">
      <!-- No geometry -->
      <g transform="translate(0, 0)">
        <!-- Crossed-out mesh -->
        <rect x="0" y="0" width="80" height="65" rx="6" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>
        <polygon points="20,15 40,10 30,35" fill="none" stroke="#D1D5DB" stroke-width="0.8"/>
        <polygon points="40,10 60,18 50,35" fill="none" stroke="#D1D5DB" stroke-width="0.8"/>
        <polygon points="30,35 50,35 40,52" fill="none" stroke="#D1D5DB" stroke-width="0.8"/>
        <line x1="8" y1="8" x2="72" y2="57" stroke="#DC2626" stroke-width="2" stroke-linecap="round"/>
        <line x1="72" y1="8" x2="8" y2="57" stroke="#DC2626" stroke-width="2" stroke-linecap="round"/>
        <text x="40" y="80" text-anchor="middle" font-size="9" font-weight="600" fill="#374151">No mesh needed</text>
        <text x="40" y="92" text-anchor="middle" font-size="8" fill="#6B7280">Implicit geometry</text>
      </g>

      <!-- View dependent -->
      <g transform="translate(190, 0)">
        <rect x="0" y="0" width="80" height="65" rx="6" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>
        <!-- Eye from different angles seeing different colors -->
        <circle cx="40" cy="32" r="14" fill="#E5E7EB" stroke="#9CA3AF" stroke-width="0.8"/>
        <!-- Color patches changing with angle -->
        <path d="M 26,28 L 40,18 L 54,28" fill="none" stroke="#3B82F6" stroke-width="1.5"/>
        <circle cx="40" cy="18" r="3" fill="#3B82F6"/>
        <path d="M 18,38 L 40,32 L 62,38" fill="none" stroke="#EF4444" stroke-width="1.5"/>
        <circle cx="18" cy="38" r="3" fill="#EF4444"/>
        <circle cx="62" cy="38" r="3" fill="#10B981"/>
        <path d="M 26,48 L 40,42 L 54,48" fill="none" stroke="#10B981" stroke-width="1.5"/>
        <text x="40" y="80" text-anchor="middle" font-size="9" font-weight="600" fill="#374151">View-dependent</text>
        <text x="40" y="92" text-anchor="middle" font-size="8" fill="#6B7280">Specular, transparent</text>
      </g>

      <!-- Continuous -->
      <g transform="translate(380, 0)">
        <rect x="0" y="0" width="80" height="65" rx="6" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>
        <!-- Smooth curve vs jagged -->
        <path d="M 10,50 Q 20,15 40,20 Q 55,25 70,10" fill="none" stroke="#10B981" stroke-width="2" stroke-linecap="round"/>
        <!-- Infinite zoom suggestion -->
        <circle cx="40" cy="22" r="12" fill="none" stroke="#10B981" stroke-width="0.8" stroke-dasharray="2,2"/>
        <circle cx="40" cy="22" r="6" fill="none" stroke="#10B981" stroke-width="0.5" stroke-dasharray="1.5,1.5"/>
        <text x="40" y="80" text-anchor="middle" font-size="9" font-weight="600" fill="#374151">Continuous</text>
        <text x="40" y="92" text-anchor="middle" font-size="8" fill="#6B7280">Infinite resolution</text>
      </g>

      <!-- Compact -->
      <g transform="translate(570, 0)">
        <rect x="0" y="0" width="80" height="65" rx="6" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>
        <!-- Big block -->
        <rect x="8" y="8" width="36" height="36" rx="3" fill="#FED7AA" stroke="#F59E0B" stroke-width="0.8"/>
        <text x="26" y="30" text-anchor="middle" font-size="7" fill="#9A3412">GB</text>
        <!-- Tiny block -->
        <rect x="52" y="30" width="16" height="14" rx="2" fill="#BBF7D0" stroke="#10B981" stroke-width="0.8"/>
        <text x="60" y="40" text-anchor="middle" font-size="6" fill="#166534">MB</text>
        <!-- Arrow -->
        <text x="48" y="35" font-size="10" fill="#9CA3AF">&#x2192;</text>
        <text x="40" y="80" text-anchor="middle" font-size="9" font-weight="600" fill="#374151">Compact</text>
        <text x="40" y="92" text-anchor="middle" font-size="8" fill="#6B7280">~5 MB MLP weights</text>
      </g>

      <!-- End to end -->
      <g transform="translate(760, 0)">
        <rect x="0" y="0" width="80" height="65" rx="6" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>
        <!-- Simple straight arrow -->
        <rect x="10" y="20" width="20" height="16" rx="2" fill="#D1FAE5" stroke="#10B981" stroke-width="0.6"/>
        <text x="20" y="31" text-anchor="middle" font-size="6" fill="#065F46">in</text>
        <line x1="32" y1="28" x2="46" y2="28" stroke="#10B981" stroke-width="1.5" marker-end="url(#aG)"/>
        <rect x="50" y="20" width="20" height="16" rx="2" fill="#FFE4E6" stroke="#EF4444" stroke-width="0.6"/>
        <text x="60" y="31" text-anchor="middle" font-size="6" fill="#9F1239">out</text>
        <text x="40" y="80" text-anchor="middle" font-size="9" font-weight="600" fill="#374151">End-to-end</text>
        <text x="40" y="92" text-anchor="middle" font-size="8" fill="#6B7280">No manual steps</text>
      </g>
    </g>
  </g>

  <text x="930" y="525" text-anchor="end" font-size="10" fill="#D1D5DB">7</text>
</svg>
