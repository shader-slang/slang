<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 725" font-family="'Segoe UI', system-ui, Arial, sans-serif">
  <defs>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#6B7280"/>
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#8B5CF6"/>
    </marker>
  </defs>

  <rect width="960" height="725" fill="white" rx="8"/>

  <!-- TITLE -->
  <text x="480" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">outerProductAccumulate: From Outer Product to Matrix Multiply</text>
  <text x="480" y="52" text-anchor="middle" font-size="12" fill="#6B7280">Backward pass: computing weight gradient dW from dOut and input</text>

  <!-- ================================================================ -->
  <!-- STEP 1: Single thread outer product                              -->
  <!-- ================================================================ -->
  <g transform="translate(0, 68)">
    <rect x="15" y="0" width="28" height="175" rx="4" fill="#374151"/>
    <text x="29" y="92" text-anchor="middle" font-size="10" fill="white" font-weight="700" transform="rotate(-90,29,92)">Step 1</text>

    <text x="300" y="8" text-anchor="middle" font-size="13" font-weight="700" fill="#374151">One Thread: Outer Product (rank-1 update)</text>

    <!-- dOut_i as tall rectangle (column vector) -->
    <g transform="translate(65, 28)">
      <rect x="0" y="0" width="34" height="115" rx="4" fill="#FFE4E6" stroke="#EF4444" stroke-width="1.5"/>
      <text x="17" y="62" text-anchor="middle" font-size="9" fill="#9F1239" font-weight="700">dOut_i</text>
      <!-- M on left (height) -->
      <text x="-10" y="60" text-anchor="middle" font-size="10" fill="#EF4444" font-weight="600" transform="rotate(-90,-10,60)">M</text>
      <!-- 1 on top (width) -->
      <text x="17" y="-5" text-anchor="middle" font-size="10" fill="#EF4444" font-weight="700">1</text>
    </g>

    <!-- outer product symbol -->
    <text x="122" y="96" text-anchor="middle" font-size="20" fill="#6B7280">&#x2297;</text>

    <!-- input_i^T as fat rectangle (row vector) -->
    <g transform="translate(145, 72)">
      <rect x="0" y="0" width="160" height="34" rx="4" fill="#D1FAE5" stroke="#10B981" stroke-width="1.5"/>
      <text x="80" y="22" text-anchor="middle" font-size="9" fill="#065F46" font-weight="700">input_i&#x1D40;</text>
      <!-- K on top (width) -->
      <text x="80" y="-5" text-anchor="middle" font-size="10" fill="#10B981" font-weight="600">K</text>
      <!-- 1 on right (height) -->
      <text x="172" y="22" text-anchor="middle" font-size="10" fill="#10B981" font-weight="700">1</text>
    </g>

    <!-- = -->
    <text x="330" y="96" text-anchor="middle" font-size="20" fill="#6B7280">=</text>

    <!-- Result: matrix_i (rank-1) -->
    <g transform="translate(350, 28)">
      <rect x="0" y="0" width="130" height="115" rx="4" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5"/>
      <text x="65" y="52" text-anchor="middle" font-size="13" fill="#5B21B6" font-weight="700">matrix_i</text>
      <text x="65" y="70" text-anchor="middle" font-size="9" fill="#7C3AED">rank-1</text>
      <text x="65" y="-8" text-anchor="middle" font-size="10" fill="#8B5CF6" font-weight="600">K</text>
      <text x="140" y="60" text-anchor="middle" font-size="10" fill="#8B5CF6" font-weight="600">M</text>
    </g>

    <!-- Annotation -->
    <g transform="translate(505, 32)">
      <rect x="0" y="0" width="220" height="68" rx="6" fill="#FFF1F2" stroke="#FECDD3" stroke-width="1"/>
      <text x="110" y="18" text-anchor="middle" font-size="9.5" fill="#9F1239" font-weight="600">Thread i owns dOut_i[M] and input_i[K]</text>
      <text x="110" y="34" text-anchor="middle" font-size="9" fill="#6B7280">Outer product = rank-1 matrix</text>
      <text x="110" y="48" text-anchor="middle" font-size="9" fill="#6B7280">matrix_i[m][k] = dOut_i[m] * input_i[k]</text>
      <text x="110" y="62" text-anchor="middle" font-size="9" fill="#6B7280">Shape: [M&#xD7;1] &#xD7; [1&#xD7;K] = [M&#xD7;K]</text>
    </g>
  </g>

  <!-- ================================================================ -->
  <!-- STEP 2: Accumulate across all N threads                          -->
  <!-- ================================================================ -->
  <g transform="translate(0, 260)">
    <rect x="15" y="0" width="28" height="145" rx="4" fill="#374151"/>
    <text x="29" y="78" text-anchor="middle" font-size="10" fill="white" font-weight="700" transform="rotate(-90,29,78)">Step 2</text>

    <text x="350" y="16" text-anchor="middle" font-size="13" font-weight="700" fill="#374151">Accumulate Across All N Threads in Warp: &#x3A3; (dOut &#x2297; input&#x1D40;)</text>

    <!-- Thread 0: matrix_0 -->
    <g transform="translate(60, 30)">
      <rect x="0" y="0" width="80" height="55" rx="4" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1"/>
      <text x="40" y="16" text-anchor="middle" font-size="8" font-weight="600" fill="#5B21B6">Thread 0</text>
      <text x="40" y="34" text-anchor="middle" font-size="10" fill="#5B21B6" font-weight="700">matrix_0</text>
      <text x="40" y="48" text-anchor="middle" font-size="7" fill="#6B7280">[M&#xD7;K] rank-1</text>
    </g>

    <text x="155" y="62" text-anchor="middle" font-size="16" fill="#374151" font-weight="700">+</text>

    <!-- Thread 1: matrix_1 -->
    <g transform="translate(170, 30)">
      <rect x="0" y="0" width="80" height="55" rx="4" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1"/>
      <text x="40" y="16" text-anchor="middle" font-size="8" font-weight="600" fill="#5B21B6">Thread 1</text>
      <text x="40" y="34" text-anchor="middle" font-size="10" fill="#5B21B6" font-weight="700">matrix_1</text>
      <text x="40" y="48" text-anchor="middle" font-size="7" fill="#6B7280">[M&#xD7;K] rank-1</text>
    </g>

    <text x="265" y="62" text-anchor="middle" font-size="16" fill="#374151" font-weight="700">+</text>

    <text x="295" y="62" text-anchor="middle" font-size="14" fill="#9CA3AF">...</text>

    <text x="325" y="62" text-anchor="middle" font-size="16" fill="#374151" font-weight="700">+</text>

    <!-- Thread N-1: matrix_{N-1} -->
    <g transform="translate(340, 30)">
      <rect x="0" y="0" width="90" height="55" rx="4" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1"/>
      <text x="45" y="16" text-anchor="middle" font-size="8" font-weight="600" fill="#5B21B6">Thread N-1</text>
      <text x="45" y="34" text-anchor="middle" font-size="10" fill="#5B21B6" font-weight="700">matrix_n</text>
      <text x="45" y="48" text-anchor="middle" font-size="7" fill="#6B7280">[M&#xD7;K] rank-1</text>
    </g>

    <!-- = dW -->
    <text x="450" y="62" text-anchor="middle" font-size="16" fill="#374151" font-weight="700">=</text>

    <g transform="translate(470, 30)">
      <rect x="0" y="0" width="90" height="55" rx="4" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5"/>
      <text x="45" y="20" text-anchor="middle" font-size="11" font-weight="700" fill="#5B21B6">dW</text>
      <text x="45" y="36" text-anchor="middle" font-size="8" fill="#7C3AED">[M &#xD7; K]</text>
      <text x="45" y="48" text-anchor="middle" font-size="7" fill="#6B7280">full rank</text>
    </g>

    <!-- Annotation -->
    <g transform="translate(590, 22)">
      <rect x="0" y="0" width="320" height="70" rx="6" fill="#F0F9FF" stroke="#BAE6FD" stroke-width="1"/>
      <text x="160" y="18" text-anchor="middle" font-size="9.5" fill="#0369A1" font-weight="600">Sum of N rank-1 outer products</text>
      <text x="160" y="34" text-anchor="middle" font-size="9" fill="#0369A1" font-family="'Courier New', monospace">dW = &#x3A3;_i  matrix_i</text>
      <text x="160" y="48" text-anchor="middle" font-size="9" fill="#0369A1" font-family="'Courier New', monospace">   = &#x3A3;_i  dOut_i &#x2297; input_i&#x1D40;</text>
      <text x="160" y="64" text-anchor="middle" font-size="9" fill="#6B7280">N = WarpSize (32). Can we do this efficiently?</text>
    </g>

    <!-- Key insight arrow -->
    <line x1="480" y1="100" x2="480" y2="130" stroke="#8B5CF6" stroke-width="2" marker-end="url(#arrowPurple)"/>
    <text x="480" y="144" text-anchor="middle" font-size="11" font-weight="700" fill="#8B5CF6">Key Insight &#x2193;</text>
  </g>

  <!-- ================================================================ -->
  <!-- STEP 3: Equivalent matrix-matrix multiply                        -->
  <!-- ================================================================ -->
  <g transform="translate(0, 450)">
    <rect x="15" y="0" width="28" height="240" rx="4" fill="#8B5CF6"/>
    <text x="29" y="125" text-anchor="middle" font-size="10" fill="white" font-weight="700" transform="rotate(-90,29,125)">Step 3: Matrix Multiply</text>

    <text x="480" y="16" text-anchor="middle" font-size="13" font-weight="700" fill="#5B21B6">&#x3A3; (dOut &#x2297; input&#x1D40;) = dOut_matrix &#xD7; input_matrix    &#x2192;  Use Cooperative Matrices!</text>

    <!-- Assemble dOut vectors as columns of a matrix -->
    <g transform="translate(60, 55)">
      <text x="70" y="-6" text-anchor="middle" font-size="10" font-weight="600" fill="#9F1239">dOut_matrix [M &#xD7; N]</text>
      <rect x="0" y="0" width="140" height="120" rx="4" fill="#FFE4E6" stroke="#EF4444" stroke-width="1.5"/>
      <!-- Column labels -->
      <text x="18" y="-16" text-anchor="middle" font-size="7" fill="#9F1239">T0</text>
      <text x="42" y="-16" text-anchor="middle" font-size="7" fill="#9F1239">T1</text>
      <text x="70" y="-16" text-anchor="middle" font-size="7" fill="#9CA3AF">...</text>
      <text x="100" y="-16" text-anchor="middle" font-size="7" fill="#9CA3AF">...</text>
      <text x="128" y="-16" text-anchor="middle" font-size="7" fill="#9F1239">Tn</text>
      <!-- Column dividers -->
      <line x1="30" y1="0" x2="30" y2="120" stroke="#EF4444" stroke-width="0.5" stroke-dasharray="3,2"/>
      <line x1="55" y1="0" x2="55" y2="120" stroke="#EF4444" stroke-width="0.5" stroke-dasharray="3,2"/>
      <line x1="85" y1="0" x2="85" y2="120" stroke="#EF4444" stroke-width="0.5" stroke-dasharray="3,2"/>
      <line x1="115" y1="0" x2="115" y2="120" stroke="#EF4444" stroke-width="0.5" stroke-dasharray="3,2"/>
      <!-- Content -->
      <text x="15" y="22" text-anchor="middle" font-size="7" fill="#9F1239">dO0</text>
      <text x="15" y="42" text-anchor="middle" font-size="7" fill="#9F1239">dO1</text>
      <text x="15" y="62" text-anchor="middle" font-size="7" fill="#9CA3AF">:</text>
      <text x="15" y="82" text-anchor="middle" font-size="6" fill="#9F1239">dOm</text>
      <text x="42" y="22" text-anchor="middle" font-size="7" fill="#9F1239">dO0</text>
      <text x="42" y="42" text-anchor="middle" font-size="7" fill="#9F1239">dO1</text>
      <text x="42" y="62" text-anchor="middle" font-size="7" fill="#9CA3AF">:</text>
      <text x="42" y="82" text-anchor="middle" font-size="6" fill="#9F1239">dOm</text>
      <text x="70" y="55" text-anchor="middle" font-size="10" fill="#9CA3AF">...</text>
      <text x="128" y="22" text-anchor="middle" font-size="7" fill="#9F1239">dO0</text>
      <text x="128" y="42" text-anchor="middle" font-size="7" fill="#9F1239">dO1</text>
      <text x="128" y="62" text-anchor="middle" font-size="7" fill="#9CA3AF">:</text>
      <text x="128" y="82" text-anchor="middle" font-size="6" fill="#9F1239">dOm</text>
      <!-- Labels -->
      <text x="-10" y="64" text-anchor="middle" font-size="9" fill="#EF4444" font-weight="600" transform="rotate(-90,-10,64)">M</text>
      <text x="70" y="136" text-anchor="middle" font-size="8.5" fill="#9F1239">Each col = one thread's dOut</text>
      <text x="70" y="148" text-anchor="middle" font-size="8" fill="#6B7280" font-style="italic">col-major in shared memory</text>
    </g>

    <!-- x -->
    <text x="225" y="123" text-anchor="middle" font-size="22" fill="#6B7280" font-weight="300">&#xD7;</text>

    <!-- Assemble input vectors as rows of a matrix -->
    <g transform="translate(250, 55)">
      <text x="70" y="-6" text-anchor="middle" font-size="10" font-weight="600" fill="#065F46">input_matrix [N &#xD7; K]</text>
      <rect x="0" y="0" width="140" height="120" rx="4" fill="#D1FAE5" stroke="#10B981" stroke-width="1.5"/>
      <!-- Row dividers -->
      <line x1="0" y1="25" x2="140" y2="25" stroke="#10B981" stroke-width="0.5" stroke-dasharray="3,2"/>
      <line x1="0" y1="50" x2="140" y2="50" stroke="#10B981" stroke-width="0.5" stroke-dasharray="3,2"/>
      <line x1="0" y1="75" x2="140" y2="75" stroke="#10B981" stroke-width="0.5" stroke-dasharray="3,2"/>
      <line x1="0" y1="100" x2="140" y2="100" stroke="#10B981" stroke-width="0.5" stroke-dasharray="3,2"/>
      <!-- Row labels -->
      <text x="-10" y="16" text-anchor="middle" font-size="7" fill="#065F46">T0</text>
      <text x="-10" y="40" text-anchor="middle" font-size="7" fill="#065F46">T1</text>
      <text x="-10" y="65" text-anchor="middle" font-size="7" fill="#9CA3AF">:</text>
      <text x="-10" y="92" text-anchor="middle" font-size="7" fill="#9CA3AF">:</text>
      <text x="-10" y="114" text-anchor="middle" font-size="7" fill="#065F46">Tn</text>
      <!-- Content -->
      <text x="22" y="16" text-anchor="middle" font-size="7" fill="#065F46">in0</text>
      <text x="50" y="16" text-anchor="middle" font-size="7" fill="#065F46">in1</text>
      <text x="78" y="16" text-anchor="middle" font-size="7" fill="#9CA3AF">...</text>
      <text x="118" y="16" text-anchor="middle" font-size="7" fill="#065F46">ink</text>
      <text x="22" y="40" text-anchor="middle" font-size="7" fill="#065F46">in0</text>
      <text x="50" y="40" text-anchor="middle" font-size="7" fill="#065F46">in1</text>
      <text x="78" y="40" text-anchor="middle" font-size="7" fill="#9CA3AF">...</text>
      <text x="118" y="40" text-anchor="middle" font-size="7" fill="#065F46">ink</text>
      <text x="70" y="65" text-anchor="middle" font-size="10" fill="#9CA3AF">...</text>
      <text x="22" y="114" text-anchor="middle" font-size="7" fill="#065F46">in0</text>
      <text x="50" y="114" text-anchor="middle" font-size="7" fill="#065F46">in1</text>
      <text x="78" y="114" text-anchor="middle" font-size="7" fill="#9CA3AF">...</text>
      <text x="118" y="114" text-anchor="middle" font-size="7" fill="#065F46">ink</text>
      <!-- Labels -->
      <text x="70" y="136" text-anchor="middle" font-size="8.5" fill="#065F46">Each row = one thread's input</text>
      <text x="70" y="148" text-anchor="middle" font-size="8" fill="#6B7280" font-style="italic">row-major in shared memory</text>
    </g>

    <!-- = -->
    <text x="415" y="123" text-anchor="middle" font-size="22" fill="#6B7280" font-weight="300">=</text>

    <!-- dW result -->
    <g transform="translate(440, 55)">
      <text x="60" y="-6" text-anchor="middle" font-size="10" font-weight="600" fill="#5B21B6">dW [M &#xD7; K]</text>
      <rect x="0" y="0" width="120" height="120" rx="4" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5"/>
      <text x="60" y="55" text-anchor="middle" font-size="14" font-weight="700" fill="#5B21B6">dW</text>
      <text x="60" y="75" text-anchor="middle" font-size="9" fill="#7C3AED">weight gradient</text>
      <text x="130" y="64" text-anchor="middle" font-size="9" fill="#8B5CF6" font-weight="600">M</text>
      <text x="60" y="-16" text-anchor="middle" font-size="9" fill="#8B5CF6" font-weight="600">K</text>
    </g>

    <!-- Big annotation: this IS a matrix multiply -->
    <g transform="translate(590, 53)">
      <rect x="0" y="0" width="330" height="130" rx="8" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="1.5"/>
      <text x="165" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#5B21B6">This IS a Matrix Multiply!</text>
      <line x1="15" y1="30" x2="315" y2="30" stroke="#DDD6FE" stroke-width="0.8"/>
      <text x="165" y="48" text-anchor="middle" font-size="9.5" fill="#5B21B6" font-family="'Courier New', monospace">dW[M&#xD7;K] = dOut[M&#xD7;N] &#xD7; input[N&#xD7;K]</text>
      <text x="165" y="66" text-anchor="middle" font-size="9" fill="#6B7280">Shared dimension = N (WarpSize)</text>
      <text x="165" y="82" text-anchor="middle" font-size="9" fill="#6B7280">Iterate over N in steps of 16</text>
      <text x="165" y="98" text-anchor="middle" font-size="9" fill="#6B7280">(same as MMA forward, but roles swapped:</text>
      <text x="165" y="112" text-anchor="middle" font-size="9" fill="#6B7280">shared dim is warp size, not K)</text>
      <text x="165" y="126" text-anchor="middle" font-size="9" fill="#5B21B6" font-weight="600">&#x2192; Use coopMatMulAdd with 16&#xD7;16 tiles!</text>
    </g>
  </g>
</svg>
