<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 320" font-family="'Segoe UI', system-ui, Arial, sans-serif">
  <defs>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#6B7280"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#3B82F6"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#10B981"/>
    </marker>
    <marker id="arrowAmber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#F59E0B"/>
    </marker>
    <filter id="glowHighlight" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="#EF4444" flood-opacity="0.4"/>
    </filter>
  </defs>

  <rect width="960" height="320" fill="white" rx="8"/>

  <!-- TITLE -->
  <text x="480" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Tile-Level Cooperative Matrix Operations (One k-step)</text>
  <text x="480" y="52" text-anchor="middle" font-size="12" fill="#6B7280">Inside each k-iteration: load tiles from shared memory, execute coopMatMulAdd, store results</text>

  <!-- ================================================================ -->
  <!-- NESTED LOOP VISUALIZATION                                        -->
  <!-- ================================================================ -->
  <line x1="40" y1="75" x2="920" y2="75" stroke="#E5E7EB" stroke-width="1"/>
  <text x="480" y="100" text-anchor="middle" font-size="14" font-weight="700" fill="#374151">Nested Tile Loop: coopMatMulAdd (per warp, per k-step)</text>

  <!-- The tile grid showing all 4 MMA operations -->
  <g transform="translate(40, 160)">
    <!-- MatA column on the left -->
    <text x="45" y="-8" text-anchor="middle" font-size="10" font-weight="600" fill="#1E40AF">MatA</text>
    <rect x="10" y="2" width="70" height="55" rx="3" fill="#93C5FD" stroke="#1D4ED8" stroke-width="1.5"/>
    <text x="45" y="26" text-anchor="middle" font-size="10" fill="#1E3A8A" font-weight="700">A[0]</text>
    <text x="45" y="42" text-anchor="middle" font-size="7.5" fill="#1D4ED8">16&#xD7;16</text>

    <rect x="10" y="62" width="70" height="55" rx="3" fill="#93C5FD" stroke="#1D4ED8" stroke-width="1.5"/>
    <text x="45" y="86" text-anchor="middle" font-size="10" fill="#1E3A8A" font-weight="700">A[1]</text>
    <text x="45" y="102" text-anchor="middle" font-size="7.5" fill="#1D4ED8">16&#xD7;16</text>

    <!-- MatB row on top (moved well above C tiles) -->
    <text x="185" y="-62" text-anchor="middle" font-size="10" font-weight="600" fill="#065F46">MatB (per warp)</text>
    <rect x="100" y="-55" width="70" height="40" rx="3" fill="#A7F3D0" stroke="#047857" stroke-width="1.5"/>
    <text x="135" y="-35" text-anchor="middle" font-size="10" fill="#064E3B" font-weight="700">B[0]</text>
    <text x="135" y="-23" text-anchor="middle" font-size="7.5" fill="#047857">16&#xD7;16</text>

    <rect x="180" y="-55" width="70" height="40" rx="3" fill="#A7F3D0" stroke="#047857" stroke-width="1.5"/>
    <text x="215" y="-35" text-anchor="middle" font-size="10" fill="#064E3B" font-weight="700">B[1]</text>
    <text x="215" y="-23" text-anchor="middle" font-size="7.5" fill="#047857">16&#xD7;16</text>

    <!-- MatC result grid (2x2) - the MMA outputs -->
    <text x="175" y="135" text-anchor="middle" font-size="10" font-weight="600" fill="#92400E">MatC (accumulator, per warp)</text>

    <!-- C[0,0] = A[0] x B[0] -->
    <rect x="100" y="2" width="70" height="55" rx="3" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
    <text x="135" y="20" text-anchor="middle" font-size="9" fill="#92400E" font-weight="700">C[0]</text>
    <text x="135" y="34" text-anchor="middle" font-size="7" fill="#B45309">+= A[0]&#xD7;B[0]</text>
    <text x="135" y="48" text-anchor="middle" font-size="7" fill="#D97706">16&#xD7;16</text>

    <!-- C[0,1] = A[0] x B[1] -->
    <rect x="180" y="2" width="70" height="55" rx="3" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
    <text x="215" y="20" text-anchor="middle" font-size="9" fill="#92400E" font-weight="700">C[1]</text>
    <text x="215" y="34" text-anchor="middle" font-size="7" fill="#B45309">+= A[0]&#xD7;B[1]</text>
    <text x="215" y="48" text-anchor="middle" font-size="7" fill="#D97706">16&#xD7;16</text>

    <!-- C[1,0] = A[1] x B[0] -->
    <rect x="100" y="62" width="70" height="55" rx="3" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
    <text x="135" y="80" text-anchor="middle" font-size="9" fill="#92400E" font-weight="700">C[2]</text>
    <text x="135" y="94" text-anchor="middle" font-size="7" fill="#B45309">+= A[1]&#xD7;B[0]</text>
    <text x="135" y="108" text-anchor="middle" font-size="7" fill="#D97706">16&#xD7;16</text>

    <!-- C[1,1] = A[1] x B[1] -->
    <rect x="180" y="62" width="70" height="55" rx="3" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
    <text x="215" y="80" text-anchor="middle" font-size="9" fill="#92400E" font-weight="700">C[3]</text>
    <text x="215" y="94" text-anchor="middle" font-size="7" fill="#B45309">+= A[1]&#xD7;B[1]</text>
    <text x="215" y="108" text-anchor="middle" font-size="7" fill="#D97706">16&#xD7;16</text>

    <!-- Arrows from A to C rows -->
    <line x1="82" y1="30" x2="97" y2="30" stroke="#3B82F6" stroke-width="1.2" marker-end="url(#arrowBlue)"/>
    <line x1="82" y1="90" x2="97" y2="90" stroke="#3B82F6" stroke-width="1.2" marker-end="url(#arrowBlue)"/>

    <!-- Arrows from B down to C columns (same visual length as A->C) -->
    <line x1="135" y1="-14" x2="135" y2="0" stroke="#10B981" stroke-width="1.2" marker-end="url(#arrowGreen)"/>
    <line x1="215" y1="-14" x2="215" y2="0" stroke="#10B981" stroke-width="1.2" marker-end="url(#arrowGreen)"/>
  </g>

  <!-- Pseudocode on the right -->
  <g transform="translate(330, 160)">
    <rect x="0" y="-55" width="590" height="195" rx="8" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>
    <text x="295" y="-35" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">Inner Math Loop (per warp)</text>
    <line x1="15" y1="-27" x2="575" y2="-27" stroke="#E5E7EB" stroke-width="0.8"/>

    <!-- Pseudocode -->
    <text x="20" y="-8" font-size="10" fill="#1E40AF" font-family="'Courier New', monospace" font-weight="600">// Load all MatA tiles from shA (shared)</text>
    <text x="20" y="8" font-size="10" fill="#374151" font-family="'Courier New', monospace">for i = 0 to NCoopMatRow-1:</text>
    <text x="44" y="22" font-size="10" fill="#3B82F6" font-family="'Courier New', monospace">matA[i] = MatA.Load&lt;RowMajor&gt;(shA, offset_i, stride)</text>

    <text x="20" y="46" font-size="10" fill="#065F46" font-family="'Courier New', monospace" font-weight="600">// For each MatB column tile, MMA with all MatA rows</text>
    <text x="20" y="62" font-size="10" fill="#374151" font-family="'Courier New', monospace">for j = 0 to NCoopMatCol-1:</text>
    <text x="44" y="78" font-size="10" fill="#10B981" font-family="'Courier New', monospace">matB = MatB.Load&lt;ColMajor&gt;(shB[warpId], offset_j, stride)</text>
    <text x="44" y="94" font-size="10" fill="#374151" font-family="'Courier New', monospace">for i = 0 to NCoopMatRow-1:</text>
    <text x="68" y="110" font-size="10" fill="#92400E" font-family="'Courier New', monospace" font-weight="600">matC[i*NCol+j] += coopMatMulAdd(matA[i], matB)</text>
  </g>

</svg>
