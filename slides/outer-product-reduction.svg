<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family="'Segoe UI', system-ui, Arial, sans-serif">
  <defs>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#6B7280"/>
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#8B5CF6"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#EF4444"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#3B82F6"/>
    </marker>
  </defs>

  <rect width="960" height="520" fill="white" rx="8"/>

  <!-- TITLE -->
  <text x="480" y="28" text-anchor="middle" font-size="18" font-weight="700" fill="#111827">Cross-Warp 2-Way Tree Reduction (sumReduceTiles)</text>
  <text x="480" y="48" text-anchor="middle" font-size="11" fill="#6B7280">log2(W) steps. Each step: right warp stores to shMem, left warp loads and adds.  Example: W = 4 warps</text>

  <!-- ================================================================ -->
  <!-- INITIAL STATE                                                    -->
  <!-- ================================================================ -->
  <g transform="translate(30, 70)">
    <text x="55" y="14" text-anchor="middle" font-size="11" font-weight="700" fill="#374151">Initial</text>

    <rect x="0" y="24" width="100" height="42" rx="5" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.2"/>
    <text x="50" y="42" text-anchor="middle" font-size="9" font-weight="600" fill="#92400E">Warp 0</text>
    <text x="50" y="56" text-anchor="middle" font-size="8" fill="#B45309">matC (partial)</text>

    <rect x="110" y="24" width="100" height="42" rx="5" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.2"/>
    <text x="160" y="42" text-anchor="middle" font-size="9" font-weight="600" fill="#92400E">Warp 1</text>
    <text x="160" y="56" text-anchor="middle" font-size="8" fill="#B45309">matC (partial)</text>

    <rect x="220" y="24" width="100" height="42" rx="5" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.2"/>
    <text x="270" y="42" text-anchor="middle" font-size="9" font-weight="600" fill="#92400E">Warp 2</text>
    <text x="270" y="56" text-anchor="middle" font-size="8" fill="#B45309">matC (partial)</text>

    <rect x="330" y="24" width="100" height="42" rx="5" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.2"/>
    <text x="380" y="42" text-anchor="middle" font-size="9" font-weight="600" fill="#92400E">Warp 3</text>
    <text x="380" y="56" text-anchor="middle" font-size="8" fill="#B45309">matC (partial)</text>
  </g>

  <!-- ================================================================ -->
  <!-- STEP 1: k=1, pairs (0,1) and (2,3)                              -->
  <!-- ================================================================ -->
  <g transform="translate(30, 160)">
    <rect x="0" y="-8" width="430" height="142" rx="8" fill="#FFF7ED" stroke="#FDBA74" stroke-width="1"/>
    <text x="215" y="10" text-anchor="middle" font-size="12" font-weight="700" fill="#9A3412">Step 1:  k = 1    (pairs of 2 neighboring warps)</text>

    <!-- Pair 0-1 -->
    <g transform="translate(10, 24)">
      <rect x="0" y="0" width="200" height="100" rx="6" fill="white" stroke="#FDBA74" stroke-width="0.8"/>
      <text x="100" y="16" text-anchor="middle" font-size="9" fill="#6B7280" font-weight="600">Pair: Warp 0 (left) + Warp 1 (right)</text>

      <!-- Warp 0 (left = receiver) -->
      <rect x="10" y="24" width="80" height="34" rx="4" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.2"/>
      <text x="50" y="38" text-anchor="middle" font-size="8.5" font-weight="600" fill="#1E40AF">Warp 0</text>
      <text x="50" y="50" text-anchor="middle" font-size="7" fill="#3B82F6">LEFT (load+add)</text>

      <!-- Warp 1 (right = sender) -->
      <rect x="110" y="24" width="80" height="34" rx="4" fill="#FFE4E6" stroke="#EF4444" stroke-width="1.2"/>
      <text x="150" y="38" text-anchor="middle" font-size="8.5" font-weight="600" fill="#9F1239">Warp 1</text>
      <text x="150" y="50" text-anchor="middle" font-size="7" fill="#EF4444">RIGHT (store)</text>

      <!-- Arrow: Warp1 stores to shMem, Warp0 loads -->
      <line x1="110" y1="41" x2="92" y2="41" stroke="#EF4444" stroke-width="1.5" marker-end="url(#arrowRed)"/>
      <text x="100" y="68" text-anchor="middle" font-size="7" fill="#6B7280">via shMem</text>

      <!-- Result -->
      <text x="100" y="84" text-anchor="middle" font-size="8" fill="#1E40AF" font-weight="600">Warp 0 = W0 + W1</text>
    </g>

    <!-- Pair 2-3 -->
    <g transform="translate(220, 24)">
      <rect x="0" y="0" width="200" height="100" rx="6" fill="white" stroke="#FDBA74" stroke-width="0.8"/>
      <text x="100" y="16" text-anchor="middle" font-size="9" fill="#6B7280" font-weight="600">Pair: Warp 2 (left) + Warp 3 (right)</text>

      <rect x="10" y="24" width="80" height="34" rx="4" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.2"/>
      <text x="50" y="38" text-anchor="middle" font-size="8.5" font-weight="600" fill="#1E40AF">Warp 2</text>
      <text x="50" y="50" text-anchor="middle" font-size="7" fill="#3B82F6">LEFT (load+add)</text>

      <rect x="110" y="24" width="80" height="34" rx="4" fill="#FFE4E6" stroke="#EF4444" stroke-width="1.2"/>
      <text x="150" y="38" text-anchor="middle" font-size="8.5" font-weight="600" fill="#9F1239">Warp 3</text>
      <text x="150" y="50" text-anchor="middle" font-size="7" fill="#EF4444">RIGHT (store)</text>

      <line x1="110" y1="41" x2="92" y2="41" stroke="#EF4444" stroke-width="1.5" marker-end="url(#arrowRed)"/>
      <text x="100" y="68" text-anchor="middle" font-size="7" fill="#6B7280">via shMem</text>

      <text x="100" y="84" text-anchor="middle" font-size="8" fill="#1E40AF" font-weight="600">Warp 2 = W2 + W3</text>
    </g>
  </g>

  <!-- ================================================================ -->
  <!-- STEP 2: k=2, pair (0,2)                                         -->
  <!-- ================================================================ -->
  <g transform="translate(30, 310)">
    <rect x="0" y="-8" width="430" height="142" rx="8" fill="#F0F9FF" stroke="#BAE6FD" stroke-width="1"/>
    <text x="215" y="10" text-anchor="middle" font-size="12" font-weight="700" fill="#0369A1">Step 2:  k = 2    (pairs of 4 = stride doubles)</text>

    <!-- Pair 0-2 -->
    <g transform="translate(10, 24)">
      <rect x="0" y="0" width="410" height="100" rx="6" fill="white" stroke="#BAE6FD" stroke-width="0.8"/>
      <text x="205" y="16" text-anchor="middle" font-size="9" fill="#6B7280" font-weight="600">Pair: Warp 0 (left) + Warp 2 (right)</text>

      <!-- Warp 0 (left = receiver, has W0+W1) -->
      <rect x="20" y="24" width="120" height="34" rx="4" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.2"/>
      <text x="80" y="38" text-anchor="middle" font-size="8.5" font-weight="600" fill="#1E40AF">Warp 0 (W0+W1)</text>
      <text x="80" y="50" text-anchor="middle" font-size="7" fill="#3B82F6">LEFT (load+add)</text>

      <!-- Warp 2 (right = sender, has W2+W3) -->
      <rect x="250" y="24" width="120" height="34" rx="4" fill="#FFE4E6" stroke="#EF4444" stroke-width="1.2"/>
      <text x="310" y="38" text-anchor="middle" font-size="8.5" font-weight="600" fill="#9F1239">Warp 2 (W2+W3)</text>
      <text x="310" y="50" text-anchor="middle" font-size="7" fill="#EF4444">RIGHT (store)</text>

      <!-- Arrow -->
      <line x1="248" y1="41" x2="142" y2="41" stroke="#EF4444" stroke-width="1.5" marker-end="url(#arrowRed)"/>
      <text x="195" y="36" text-anchor="middle" font-size="7.5" fill="#6B7280">store to shMem</text>
      <text x="195" y="48" text-anchor="middle" font-size="7.5" fill="#6B7280">load + add</text>

      <!-- Result -->
      <text x="205" y="84" text-anchor="middle" font-size="9" fill="#1E40AF" font-weight="700">Warp 0 = W0 + W1 + W2 + W3   (complete!)</text>
    </g>

    <!-- Warp 1, 3 idle -->
    <text x="215" y="132" text-anchor="middle" font-size="8.5" fill="#9CA3AF" font-style="italic">Warps 1, 3 are idle after Step 1.  Warp 3 is idle after Step 1.  Only left warps survive each step.</text>
  </g>

  <!-- ================================================================ -->
  <!-- RIGHT SIDE: Tree diagram + code                                  -->
  <!-- ================================================================ -->
  <g transform="translate(500, 70)">
    <rect x="0" y="0" width="430" height="210" rx="8" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>
    <text x="215" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">Reduction Tree (4 warps)</text>
    <line x1="15" y1="30" x2="415" y2="30" stroke="#E5E7EB" stroke-width="0.8"/>

    <!-- Tree visualization -->
    <!-- Level 0: 4 leaves -->
    <rect x="30" y="42" width="60" height="26" rx="4" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1"/>
    <text x="60" y="59" text-anchor="middle" font-size="8.5" fill="#92400E" font-weight="600">W0</text>

    <rect x="110" y="42" width="60" height="26" rx="4" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1"/>
    <text x="140" y="59" text-anchor="middle" font-size="8.5" fill="#92400E" font-weight="600">W1</text>

    <rect x="230" y="42" width="60" height="26" rx="4" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1"/>
    <text x="260" y="59" text-anchor="middle" font-size="8.5" fill="#92400E" font-weight="600">W2</text>

    <rect x="310" y="42" width="60" height="26" rx="4" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1"/>
    <text x="340" y="59" text-anchor="middle" font-size="8.5" fill="#92400E" font-weight="600">W3</text>

    <!-- Level 1: 2 nodes (k=1) -->
    <line x1="60" y1="70" x2="100" y2="90" stroke="#6B7280" stroke-width="1.2"/>
    <line x1="140" y1="70" x2="100" y2="90" stroke="#EF4444" stroke-width="1.2"/>

    <rect x="62" y="90" width="76" height="26" rx="4" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.2"/>
    <text x="100" y="107" text-anchor="middle" font-size="8" fill="#1E40AF" font-weight="600">W0+W1</text>

    <line x1="260" y1="70" x2="300" y2="90" stroke="#6B7280" stroke-width="1.2"/>
    <line x1="340" y1="70" x2="300" y2="90" stroke="#EF4444" stroke-width="1.2"/>

    <rect x="262" y="90" width="76" height="26" rx="4" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.2"/>
    <text x="300" y="107" text-anchor="middle" font-size="8" fill="#1E40AF" font-weight="600">W2+W3</text>

    <!-- Step labels -->
    <text x="405" y="107" text-anchor="middle" font-size="8" fill="#9A3412" font-weight="600">k=1</text>

    <!-- Level 2: 1 root (k=2) -->
    <line x1="100" y1="118" x2="200" y2="140" stroke="#6B7280" stroke-width="1.2"/>
    <line x1="300" y1="118" x2="200" y2="140" stroke="#EF4444" stroke-width="1.2"/>

    <rect x="140" y="140" width="120" height="28" rx="4" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5"/>
    <text x="200" y="159" text-anchor="middle" font-size="9" fill="#5B21B6" font-weight="700">W0+W1+W2+W3</text>

    <text x="405" y="158" text-anchor="middle" font-size="8" fill="#0369A1" font-weight="600">k=2</text>

    <!-- Legend -->
    <line x1="30" y1="185" x2="50" y2="185" stroke="#6B7280" stroke-width="1.2"/>
    <text x="55" y="189" text-anchor="start" font-size="8" fill="#6B7280">left (keeps result)</text>
    <line x1="160" y1="185" x2="180" y2="185" stroke="#EF4444" stroke-width="1.2"/>
    <text x="185" y="189" text-anchor="start" font-size="8" fill="#EF4444">right (stores to shMem)</text>
    <text x="30" y="203" text-anchor="start" font-size="8" fill="#6B7280">Total steps: log2(4) = 2.  General: log2(W) steps.</text>
  </g>

  <!-- Pseudocode -->
  <g transform="translate(500, 292)">
    <rect x="0" y="0" width="430" height="130" rx="8" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>
    <text x="215" y="20" text-anchor="middle" font-size="11" font-weight="700" fill="#374151">Code Pattern</text>
    <line x1="15" y1="28" x2="415" y2="28" stroke="#E5E7EB" stroke-width="0.8"/>

    <text x="15" y="46" font-size="9.5" fill="#374151" font-family="'Courier New', monospace">for (k = 1; k &lt; warpCount; k &lt;&lt;= 1):</text>
    <text x="38" y="62" font-size="9.5" fill="#EF4444" font-family="'Courier New', monospace">if (warpId % (k*2) == k):     // RIGHT</text>
    <text x="61" y="76" font-size="9.5" fill="#EF4444" font-family="'Courier New', monospace">matC.Store(shMem)            // write tiles</text>
    <text x="38" y="92" font-size="9.5" fill="#374151" font-family="'Courier New', monospace">GroupSync()</text>
    <text x="38" y="106" font-size="9.5" fill="#3B82F6" font-family="'Courier New', monospace">if (warpId % (k*2) == 0):     // LEFT</text>
    <text x="61" y="120" font-size="9.5" fill="#3B82F6" font-family="'Courier New', monospace">matC += MatC.Load(shMem)     // load + add</text>
  </g>

  <!-- Final output note -->
  <g transform="translate(30, 465)">
    <rect x="0" y="0" width="900" height="40" rx="6" fill="#EDE9FE" stroke="#DDD6FE" stroke-width="1"/>
    <text x="450" y="16" text-anchor="middle" font-size="10" font-weight="600" fill="#5B21B6">After reduction: only Warp 0 holds the complete sum.  It stores matC tiles to shared memory, then atomically adds to global dW.</text>
    <text x="450" y="32" text-anchor="middle" font-size="9" fill="#7C3AED">Processes one row of tiles at a time (for i = 0..NCoopMatRow-1) to reuse shared memory. GroupSync between rows.</text>
  </g>
</svg>
