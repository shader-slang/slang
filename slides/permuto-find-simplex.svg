<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 596" font-family="'Segoe UI', system-ui, Arial, sans-serif">
  <defs>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#6B7280"/>
    </marker>
  </defs>

  <rect width="960" height="596" fill="white" rx="8"/>

  <!-- TITLE -->
  <text x="480" y="28" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Finding the Enclosing Simplex: floor + sort</text>
  <text x="480" y="48" text-anchor="middle" font-size="11" fill="#6B7280">Given point p in permutohedral coordinates (a, b, c), how to find which triangle it's in</text>

  <!-- ================================================================ -->
  <!-- TOP ROW: Sorting wheel + Algorithm steps                         -->
  <!-- ================================================================ -->
  <g transform="translate(10, 62)">
    <rect x="0" y="0" width="940" height="280" rx="8" fill="#FFFBEB" stroke="#F59E0B" stroke-width="1.2"/>

    <!-- LEFT: Sorting wheel (hexagonal, R=80) -->
    <g transform="translate(155, 148)">
      <!-- 6 sector fills -->
      <polygon points="0,0 0,-80 69,-40" fill="#F59E0B" fill-opacity="0.2"/>
      <polygon points="0,0 69,-40 69,40" fill="#FEF3C7" fill-opacity="0.5"/>
      <polygon points="0,0 69,40 0,80" fill="#FFFBEB" fill-opacity="0.5"/>
      <polygon points="0,0 0,80 -69,40" fill="#FEF3C7" fill-opacity="0.5"/>
      <polygon points="0,0 -69,40 -69,-40" fill="#FFFBEB" fill-opacity="0.5"/>
      <polygon points="0,0 -69,-40 0,-80" fill="#FEF3C7" fill-opacity="0.5"/>

      <!-- Hexagon outline -->
      <polygon points="0,-80 69,-40 69,40 0,80 -69,40 -69,-40" fill="none" stroke="#D97706" stroke-width="1.5"/>

      <!-- 3 equality boundary lines -->
      <line x1="0" y1="-80" x2="0" y2="80" stroke="#92400E" stroke-width="0.8" stroke-dasharray="4,2"/>
      <line x1="69" y1="-40" x2="-69" y2="40" stroke="#92400E" stroke-width="0.8" stroke-dasharray="4,2"/>
      <line x1="69" y1="40" x2="-69" y2="-40" stroke="#92400E" stroke-width="0.8" stroke-dasharray="4,2"/>

      <!-- Neighbor lattice vertex dots -->
      <circle cx="0" cy="-80" r="3.5" fill="#FDE68A" stroke="#D97706" stroke-width="0.8"/>
      <circle cx="69" cy="-40" r="3.5" fill="#FDE68A" stroke="#D97706" stroke-width="0.8"/>
      <circle cx="69" cy="40" r="3.5" fill="#FDE68A" stroke="#D97706" stroke-width="0.8"/>
      <circle cx="0" cy="80" r="3.5" fill="#FDE68A" stroke="#D97706" stroke-width="0.8"/>
      <circle cx="-69" cy="40" r="3.5" fill="#FDE68A" stroke="#D97706" stroke-width="0.8"/>
      <circle cx="-69" cy="-40" r="3.5" fill="#FDE68A" stroke="#D97706" stroke-width="0.8"/>

      <!-- Base vertex (center) -->
      <circle cx="0" cy="0" r="5.5" fill="#D97706"/>
      <text x="12" y="14" font-size="7.5" fill="#92400E" font-weight="700">base = floor(a,b,c)</text>

      <!-- Sector labels (sorting orders) -->
      <text x="24" y="-34" text-anchor="middle" font-size="8.5" fill="#92400E" font-weight="700">a&gt;b&gt;c</text>
      <text x="50" y="3" text-anchor="middle" font-size="8" fill="#B45309">a&gt;c&gt;b</text>
      <text x="24" y="42" text-anchor="middle" font-size="8" fill="#B45309">c&gt;a&gt;b</text>
      <text x="-24" y="42" text-anchor="middle" font-size="8" fill="#B45309">c&gt;b&gt;a</text>
      <text x="-50" y="3" text-anchor="middle" font-size="8" fill="#B45309">b&gt;c&gt;a</text>
      <text x="-24" y="-34" text-anchor="middle" font-size="8" fill="#B45309">b&gt;a&gt;c</text>

      <!-- Boundary labels -->
      <text x="12" y="-86" font-size="7.5" fill="#92400E" font-weight="600">a = b</text>
      <text x="76" y="-36" font-size="7.5" fill="#92400E" font-weight="600">b = c</text>
      <text x="76" y="48" font-size="7.5" fill="#92400E" font-weight="600">a = c</text>

      <!-- Point p in highlighted sector -->
      <circle cx="20" cy="-52" r="5" fill="#EF4444" stroke="#DC2626" stroke-width="1.2"/>
      <text x="30" y="-58" font-size="9" fill="#DC2626" font-weight="600">p</text>

      <!-- Caption -->
      <text x="0" y="105" text-anchor="middle" font-size="9.5" fill="#92400E" font-weight="700">6 triangles around the base vertex</text>
      <text x="0" y="120" text-anchor="middle" font-size="8.5" fill="#B45309">Sorting the remainders picks the right one</text>
    </g>

    <!-- RIGHT: Step-by-step algorithm -->
    <g transform="translate(340, 18)">
      <text x="0" y="16" font-size="12" fill="#92400E" font-weight="700">Given point p with coordinates (a, b, c):</text>

      <!-- Step 1: floor -->
      <g transform="translate(0, 34)">
        <circle cx="14" cy="12" r="14" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1"/>
        <text x="14" y="16" text-anchor="middle" font-size="11" fill="#92400E" font-weight="700">1</text>
        <text x="38" y="10" font-size="11" fill="#374151" font-weight="600">floor(a), floor(b), floor(c)</text>
        <text x="38" y="28" font-size="9.5" fill="#6B7280">Finds the base lattice vertex (the center dot).</text>
        <text x="38" y="44" font-size="9.5" fill="#6B7280">This narrows down to 6 candidate triangles.</text>
      </g>

      <!-- Step 2: remainder -->
      <g transform="translate(0, 96)">
        <circle cx="14" cy="12" r="14" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1"/>
        <text x="14" y="16" text-anchor="middle" font-size="11" fill="#92400E" font-weight="700">2</text>
        <text x="38" y="10" font-size="11" fill="#374151" font-weight="600">Compute remainders</text>
        <text x="38" y="28" font-size="9.5" fill="#6B7280">remainder = elevated[dim] - rem0[dim]</text>
        <text x="38" y="44" font-size="9.5" fill="#6B7280">The fractional parts tell us where within the 6 triangles.</text>
      </g>

      <!-- Step 3: sort -->
      <g transform="translate(0, 158)">
        <circle cx="14" cy="12" r="14" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1"/>
        <text x="14" y="16" text-anchor="middle" font-size="11" fill="#92400E" font-weight="700">3</text>
        <text x="38" y="10" font-size="11" fill="#374151" font-weight="600">Sort (rank) the remainders</text>
        <text x="38" y="28" font-size="9.5" fill="#6B7280">e.g. a &gt; b &gt; c identifies exactly one of the 6 triangles.</text>
        <text x="38" y="44" font-size="9.5" fill="#6B7280">Implemented via pairwise comparison (bubble sort).</text>
      </g>

      <!-- Result -->
      <g transform="translate(0, 218)">
        <rect x="0" y="0" width="580" height="38" rx="5" fill="#D1FAE5" stroke="#10B981" stroke-width="1"/>
        <text x="290" y="16" text-anchor="middle" font-size="11" fill="#065F46" font-weight="700">Result: enclosing simplex found in O(D log D) from the sort!</text>
        <text x="290" y="32" text-anchor="middle" font-size="9.5" fill="#059669">Just like floor(x), floor(y) for rectangles, but with one extra sort step.</text>
      </g>
    </g>
  </g>

  <!-- ================================================================ -->
  <!-- BOTTOM: Pseudocode (from permuto-encoder.slang)                  -->
  <!-- ================================================================ -->
  <g transform="translate(10, 356)">
    <rect x="0" y="0" width="940" height="228" rx="8" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1.2"/>
    <text x="470" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#374151">Implementation: permutoFindRem0 (from permuto-encoder.slang)</text>
    <line x1="20" y1="32" x2="920" y2="32" stroke="#E5E7EB" stroke-width="0.8"/>

    <!-- Pseudocode -->
    <g transform="translate(30, 44)">
      <text x="0" y="14" font-size="9.5" fill="#F59E0B" font-family="'Courier New', monospace" font-weight="700">permutoFindRem0(elevated[D+1], out rem0[D+1], out rank[D+1]):</text>

      <text x="23" y="38" font-size="9.5" fill="#6B7280" font-family="'Courier New', monospace">// Step 1: Floor (find nearest lattice point)</text>
      <text x="23" y="54" font-size="9.5" fill="#374151" font-family="'Courier New', monospace">for dim = 0 to D:</text>
      <text x="46" y="70" font-size="9.5" fill="#3B82F6" font-family="'Courier New', monospace" font-weight="600">rem0[dim] = round(elevated[dim] / (D+1)) * (D+1)</text>

      <text x="23" y="94" font-size="9.5" fill="#6B7280" font-family="'Courier New', monospace">// Step 2: Sort (rank remainders by pairwise comparison)</text>
      <text x="23" y="110" font-size="9.5" fill="#374151" font-family="'Courier New', monospace">for dim = 0 to D-1:</text>
      <text x="46" y="126" font-size="9.5" fill="#374151" font-family="'Courier New', monospace">for other = dim+1 to D:</text>
      <text x="69" y="142" font-size="9.5" fill="#374151" font-family="'Courier New', monospace">di = elevated[dim] - rem0[dim]</text>
      <text x="69" y="158" font-size="9.5" fill="#3B82F6" font-family="'Courier New', monospace" font-weight="600">if di &lt; elevated[other] - rem0[other]:</text>
      <text x="92" y="174" font-size="9.5" fill="#3B82F6" font-family="'Courier New', monospace" font-weight="600">rank[dim]++  else  rank[other]++</text>
    </g>

    <!-- Annotations -->
    <g transform="translate(600, 42)">
      <rect x="0" y="0" width="320" height="58" rx="5" fill="#FEF3C7" stroke="#F59E0B" stroke-width="0.6"/>
      <text x="12" y="16" font-size="9" fill="#92400E" font-weight="700">Floor step (lines 3-4):</text>
      <text x="12" y="34" font-size="8.5" fill="#6B7280">Round each elevated coord to nearest</text>
      <text x="12" y="48" font-size="8.5" fill="#6B7280">multiple of (D+1). This is the base vertex.</text>
    </g>

    <g transform="translate(600, 112)">
      <rect x="0" y="0" width="320" height="72" rx="5" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="0.6"/>
      <text x="12" y="16" font-size="9" fill="#5B21B6" font-weight="700">Sort step (lines 6-9):</text>
      <text x="12" y="34" font-size="8.5" fill="#6B7280">Compare all pairs of remainders.</text>
      <text x="12" y="48" font-size="8.5" fill="#6B7280">rank[dim] counts how many others</text>
      <text x="12" y="62" font-size="8.5" fill="#6B7280">are larger. This IS the sorting order.</text>
    </g>
  </g>

</svg>
