<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 660" font-family="'Segoe UI', system-ui, Arial, sans-serif">
  <defs>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#6B7280"/>
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#8B5CF6"/>
    </marker>
  </defs>

  <rect width="960" height="660" fill="white" rx="8"/>

  <!-- TITLE -->
  <text x="480" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#111827">outerProductAccumulate (Backward: Weight Gradient)</text>
  <text x="480" y="58" text-anchor="middle" font-size="14" fill="#6B7280" font-family="'Courier New', monospace">dW[M&#xD7;K] += dOut[M] &#x2297; input[K]&#x1D40;     (outer product, accumulated across all threads)</text>

  <!-- CONCEPTUAL OUTER PRODUCT -->
  <text x="240" y="92" text-anchor="middle" font-size="15" font-weight="700" fill="#374151">Conceptual Outer Product</text>

  <!-- dOut column vector -->
  <g transform="translate(80, 108)">
    <rect x="0" y="0" width="32" height="120" rx="4" fill="#FFE4E6" stroke="#EF4444" stroke-width="1.5"/>
    <text x="16" y="25" text-anchor="middle" font-size="8" fill="#9F1239">dO0</text>
    <text x="16" y="45" text-anchor="middle" font-size="8" fill="#9F1239">dO1</text>
    <text x="16" y="63" text-anchor="middle" font-size="9" fill="#9CA3AF">:</text>
    <text x="16" y="80" text-anchor="middle" font-size="7.5" fill="#9F1239">dOm-2</text>
    <text x="16" y="100" text-anchor="middle" font-size="7.5" fill="#9F1239">dOm-1</text>
    <text x="-8" y="64" text-anchor="middle" font-size="10" fill="#EF4444" font-weight="600" transform="rotate(-90,-8,64)">M</text>
    <text x="16" y="136" text-anchor="middle" font-size="11" font-weight="600" fill="#9F1239">dOut</text>
  </g>

  <!-- outer product symbol -->
  <text x="138" y="175" text-anchor="middle" font-size="22" fill="#6B7280">&#x2297;</text>

  <!-- input row vector (transposed) -->
  <g transform="translate(160, 148)">
    <rect x="0" y="0" width="180" height="28" rx="4" fill="#D1FAE5" stroke="#10B981" stroke-width="1.5"/>
    <text x="22" y="18" text-anchor="middle" font-size="8" fill="#065F46">in0</text>
    <text x="52" y="18" text-anchor="middle" font-size="8" fill="#065F46">in1</text>
    <text x="82" y="18" text-anchor="middle" font-size="8" fill="#9CA3AF">...</text>
    <text x="120" y="18" text-anchor="middle" font-size="7.5" fill="#065F46">ink-2</text>
    <text x="158" y="18" text-anchor="middle" font-size="7.5" fill="#065F46">ink-1</text>
    <text x="90" y="-8" text-anchor="middle" font-size="10" fill="#10B981" font-weight="600">K</text>
    <text x="90" y="44" text-anchor="middle" font-size="11" font-weight="600" fill="#065F46">input&#x1D40;</text>
  </g>

  <!-- = symbol -->
  <text x="366" y="175" text-anchor="middle" font-size="22" fill="#6B7280">=</text>

  <!-- dW result matrix -->
  <g transform="translate(390, 108)">
    <rect x="0" y="0" width="120" height="120" rx="4" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5"/>
    <text x="20" y="23" text-anchor="middle" font-size="7" fill="#5B21B6">dO0*in0</text>
    <text x="62" y="23" text-anchor="middle" font-size="7" fill="#5B21B6">dO0*in1</text>
    <text x="100" y="23" text-anchor="middle" font-size="8" fill="#9CA3AF">...</text>
    <text x="20" y="48" text-anchor="middle" font-size="7" fill="#5B21B6">dO1*in0</text>
    <text x="62" y="48" text-anchor="middle" font-size="7" fill="#5B21B6">dO1*in1</text>
    <text x="100" y="48" text-anchor="middle" font-size="8" fill="#9CA3AF">...</text>
    <text x="60" y="73" text-anchor="middle" font-size="10" fill="#9CA3AF">:</text>
    <text x="20" y="98" text-anchor="middle" font-size="6" fill="#5B21B6">dOm-1*in0</text>
    <text x="62" y="98" text-anchor="middle" font-size="6" fill="#5B21B6">dOm-1*in1</text>
    <text x="100" y="98" text-anchor="middle" font-size="8" fill="#9CA3AF">...</text>
    <text x="-8" y="64" text-anchor="middle" font-size="10" fill="#8B5CF6" font-weight="600" transform="rotate(-90,-8,64)">M</text>
    <text x="60" y="-8" text-anchor="middle" font-size="10" fill="#8B5CF6" font-weight="600">K</text>
    <text x="60" y="136" text-anchor="middle" font-size="11" font-weight="600" fill="#5B21B6">dW [M &#xD7; K]</text>
  </g>

  <!-- Separator -->
  <line x1="40" y1="275" x2="920" y2="275" stroke="#E5E7EB" stroke-width="1"/>

  <!-- COOPERATIVE MATRIX IMPLEMENTATION -->
  <text x="480" y="300" text-anchor="middle" font-size="15" font-weight="700" fill="#374151">Cooperative Matrix Implementation (Tiled)</text>
  <text x="480" y="318" text-anchor="middle" font-size="11" fill="#6B7280">Iterate over N (warp size) in steps of 16. At each step, use cooperative matrix MMA.</text>

  <!-- Tiled diagram -->
  <g transform="translate(55, 335)">
    <!-- dOut as MatA tiles -->
    <g>
      <text x="28" y="-5" text-anchor="middle" font-size="10" font-weight="600" fill="#9F1239">MatA</text>
      <rect x="0" y="4" width="55" height="55" rx="3" fill="#FFE4E6" stroke="#EF4444" stroke-width="1.2"/>
      <text x="27" y="35" text-anchor="middle" font-size="9" fill="#9F1239">dOut</text>
      <text x="27" y="47" text-anchor="middle" font-size="7" fill="#EF4444">16&#xD7;16</text>
      <rect x="0" y="63" width="55" height="55" rx="3" fill="#FFE4E6" stroke="#EF4444" stroke-width="1.2"/>
      <text x="27" y="94" text-anchor="middle" font-size="9" fill="#9F1239">dOut</text>
      <text x="27" y="106" text-anchor="middle" font-size="7" fill="#EF4444">16&#xD7;16</text>
      <text x="-12" y="62" text-anchor="middle" font-size="9" fill="#EF4444" font-weight="600" transform="rotate(-90,-12,62)">M=32</text>
      <text x="27" y="132" text-anchor="middle" font-size="8" fill="#9CA3AF">rows of dOut</text>
    </g>

    <!-- x symbol -->
    <text x="77" y="65" text-anchor="middle" font-size="18" fill="#6B7280">&#xD7;</text>

    <!-- input as MatB tiles -->
    <g transform="translate(95, 0)">
      <text x="57" y="-5" text-anchor="middle" font-size="10" font-weight="600" fill="#065F46">MatB</text>
      <rect x="0" y="4" width="55" height="55" rx="3" fill="#D1FAE5" stroke="#10B981" stroke-width="1.2"/>
      <text x="27" y="35" text-anchor="middle" font-size="9" fill="#065F46">input</text>
      <text x="27" y="47" text-anchor="middle" font-size="7" fill="#10B981">16&#xD7;16</text>
      <rect x="59" y="4" width="55" height="55" rx="3" fill="#D1FAE5" stroke="#10B981" stroke-width="1.2"/>
      <text x="86" y="35" text-anchor="middle" font-size="9" fill="#065F46">input</text>
      <text x="86" y="47" text-anchor="middle" font-size="7" fill="#10B981">16&#xD7;16</text>
      <text x="57" y="73" text-anchor="middle" font-size="8" fill="#9CA3AF">columns of input</text>
      <text x="57" y="85" text-anchor="middle" font-size="9" fill="#10B981" font-weight="600">K=32</text>
    </g>

    <!-- arrow -->
    <text x="240" y="65" text-anchor="middle" font-size="18" fill="#6B7280">&#x2192;</text>

    <!-- dW result as MatC tiles (M x K) -->
    <g transform="translate(260, 0)">
      <text x="57" y="-5" text-anchor="middle" font-size="10" font-weight="600" fill="#5B21B6">MatC (dW)</text>
      <rect x="0" y="4" width="55" height="55" rx="3" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.2"/>
      <text x="27" y="30" text-anchor="middle" font-size="7" fill="#5B21B6">C00</text>
      <text x="27" y="43" text-anchor="middle" font-size="7" fill="#8B5CF6">+= A0&#xD7;B0</text>
      <rect x="59" y="4" width="55" height="55" rx="3" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.2"/>
      <text x="86" y="30" text-anchor="middle" font-size="7" fill="#5B21B6">C01</text>
      <text x="86" y="43" text-anchor="middle" font-size="7" fill="#8B5CF6">+= A0&#xD7;B1</text>
      <rect x="0" y="63" width="55" height="55" rx="3" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.2"/>
      <text x="27" y="89" text-anchor="middle" font-size="7" fill="#5B21B6">C10</text>
      <text x="27" y="102" text-anchor="middle" font-size="7" fill="#8B5CF6">+= A1&#xD7;B0</text>
      <rect x="59" y="63" width="55" height="55" rx="3" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.2"/>
      <text x="86" y="89" text-anchor="middle" font-size="7" fill="#5B21B6">C11</text>
      <text x="86" y="102" text-anchor="middle" font-size="7" fill="#8B5CF6">+= A1&#xD7;B1</text>
      <text x="57" y="132" text-anchor="middle" font-size="9" fill="#8B5CF6" font-weight="600">M &#xD7; K</text>
    </g>
  </g>

  <!-- N-loop annotation -->
  <g transform="translate(510, 335)">
    <rect x="0" y="0" width="400" height="135" rx="8" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>

    <text x="200" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">Algorithm</text>

    <text x="15" y="44" font-size="10.5" fill="#4B5563" font-family="'Courier New', monospace">for n = 0 to N step 16:</text>
    <text x="30" y="60" font-size="10.5" fill="#EF4444" font-family="'Courier New', monospace">  load dOut &#x2192; MatA tiles (col-major)</text>
    <text x="30" y="76" font-size="10.5" fill="#10B981" font-family="'Courier New', monospace">  load input &#x2192; MatB tiles (row-major)</text>
    <text x="30" y="92" font-size="10.5" fill="#8B5CF6" font-family="'Courier New', monospace">  MatC[i,j] += MatA[i] &#xD7; MatB[j]</text>
    <text x="15" y="112" font-size="10.5" fill="#4B5563" font-family="'Courier New', monospace">sumReduceTiles(matC) // cross-warp</text>
    <text x="15" y="128" font-size="10.5" fill="#4B5563" font-family="'Courier New', monospace">warp0: atomicAdd(dW, matC) // global</text>
  </g>

  <!-- CROSS-WARP REDUCTION -->
  <line x1="40" y1="490" x2="920" y2="490" stroke="#E5E7EB" stroke-width="1"/>
  <text x="480" y="516" text-anchor="middle" font-size="15" font-weight="700" fill="#374151">Cross-Warp Reduction (sumReduceTiles)</text>

  <!-- Warp boxes -->
  <g transform="translate(80, 530)">
    <rect x="0" y="0" width="140" height="55" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.2"/>
    <text x="70" y="18" text-anchor="middle" font-size="10" font-weight="600" fill="#92400E">Warp 0</text>
    <text x="70" y="34" text-anchor="middle" font-size="9" fill="#B45309">matC (partial dW)</text>
    <text x="70" y="46" text-anchor="middle" font-size="8" fill="#D97706">from own threads</text>

    <rect x="160" y="0" width="140" height="55" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.2"/>
    <text x="230" y="18" text-anchor="middle" font-size="10" font-weight="600" fill="#92400E">Warp 1</text>
    <text x="230" y="34" text-anchor="middle" font-size="9" fill="#B45309">matC (partial dW)</text>
    <text x="230" y="46" text-anchor="middle" font-size="8" fill="#D97706">from own threads</text>

    <text x="340" y="30" text-anchor="middle" font-size="16" fill="#9CA3AF">...</text>

    <rect x="380" y="0" width="140" height="55" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.2"/>
    <text x="450" y="18" text-anchor="middle" font-size="10" font-weight="600" fill="#92400E">Warp W-1</text>
    <text x="450" y="34" text-anchor="middle" font-size="9" fill="#B45309">matC (partial dW)</text>
    <text x="450" y="46" text-anchor="middle" font-size="8" fill="#D97706">from own threads</text>

    <!-- Arrows down to reduction -->
    <line x1="70" y1="58" x2="70" y2="75" stroke="#6B7280" stroke-width="1" marker-end="url(#arrowGray)"/>
    <line x1="230" y1="58" x2="230" y2="75" stroke="#6B7280" stroke-width="1" marker-end="url(#arrowGray)"/>
    <line x1="450" y1="58" x2="450" y2="75" stroke="#6B7280" stroke-width="1" marker-end="url(#arrowGray)"/>

    <rect x="30" y="78" width="460" height="32" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.2"/>
    <text x="260" y="99" text-anchor="middle" font-size="10" font-weight="600" fill="#1E40AF">Shared Memory: Iterative reduction across warps (log2 steps)</text>

    <line x1="260" y1="113" x2="260" y2="128" stroke="#8B5CF6" stroke-width="1.2" marker-end="url(#arrowPurple)"/>

    <rect x="540" y="20" width="195" height="50" rx="6" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.2"/>
    <text x="637" y="40" text-anchor="middle" font-size="10" font-weight="600" fill="#5B21B6">Warp 0: accumulated dW</text>
    <text x="637" y="54" text-anchor="middle" font-size="9" fill="#7C3AED">atomicAdd to global memory</text>

    <line x1="493" y1="97" x2="537" y2="55" stroke="#8B5CF6" stroke-width="1" marker-end="url(#arrowPurple)"/>
  </g>
</svg>
