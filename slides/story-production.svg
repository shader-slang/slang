<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 370" font-family="'Segoe UI', system-ui, Arial, sans-serif">
  <rect width="960" height="370" fill="white" rx="8"/>

  <!-- TITLE -->
  <text x="480" y="28" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Proven in Production</text>
  <text x="480" y="48" text-anchor="middle" font-size="11" fill="#6B7280">neural.slang powers real shipping products and developer ecosystems</text>

  <!-- ================================================================ -->
  <!-- CENTER: neural.slang hub                                         -->
  <!-- ================================================================ -->
  <g transform="translate(365, 90)">
    <rect x="0" y="0" width="230" height="80" rx="12" fill="#1E40AF" stroke="#1E3A8A" stroke-width="2"/>
    <text x="115" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="white">neural.slang</text>
    <text x="115" y="55" text-anchor="middle" font-size="10" fill="#93C5FD">Slang Neural Module</text>
    <text x="115" y="70" text-anchor="middle" font-size="9" fill="#BFDBFE">Open source, cross-platform</text>
  </g>

  <!-- ================================================================ -->
  <!-- Connected products/users                                         -->
  <!-- ================================================================ -->

  <!-- NuRec (top-left) -->
  <g transform="translate(40, 80)">
    <rect x="0" y="0" width="260" height="100" rx="8" fill="#D1FAE5" stroke="#10B981" stroke-width="1.5"/>
    <text x="130" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#065F46">NuRec</text>
    <text x="130" y="38" text-anchor="middle" font-size="9" fill="#059669">NVIDIA Neural Reconstruction</text>
    <text x="130" y="56" text-anchor="middle" font-size="8.5" fill="#6B7280">Real-world sensor data &#x2192; 3D scenes</text>
    <text x="130" y="70" text-anchor="middle" font-size="8.5" fill="#6B7280">NeRF, 3DGS rendering in Omniverse</text>
    <text x="130" y="86" text-anchor="middle" font-size="8" fill="#065F46" font-weight="600">First production user</text>
  </g>
  <!-- Line to center -->
  <line x1="300" y1="130" x2="365" y2="130" stroke="#10B981" stroke-width="1.5"/>

  <!-- RTXNS SDK (top-right) -->
  <g transform="translate(660, 80)">
    <rect x="0" y="0" width="260" height="100" rx="8" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5"/>
    <text x="130" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#5B21B6">RTXNS SDK</text>
    <text x="130" y="38" text-anchor="middle" font-size="9" fill="#7C3AED">RTX Neural Shading SDK</text>
    <text x="130" y="56" text-anchor="middle" font-size="8.5" fill="#6B7280">Official SDK for game developers</text>
    <text x="130" y="70" text-anchor="middle" font-size="8.5" fill="#6B7280">Neural materials, textures, caching</text>
    <text x="130" y="86" text-anchor="middle" font-size="8" fill="#5B21B6" font-weight="600">Blackwell / RTX 50 Series</text>
  </g>
  <line x1="595" y1="130" x2="660" y2="130" stroke="#8B5CF6" stroke-width="1.5"/>

  <!-- SlangPy (bottom-left) -->
  <g transform="translate(80, 220)">
    <rect x="0" y="0" width="240" height="85" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
    <text x="120" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#92400E">SlangPy</text>
    <text x="120" y="38" text-anchor="middle" font-size="9" fill="#B45309">Python + PyTorch integration</text>
    <text x="120" y="56" text-anchor="middle" font-size="8.5" fill="#6B7280">Train neural shading models</text>
    <text x="120" y="70" text-anchor="middle" font-size="8.5" fill="#6B7280">Auto-diff, GPU-accelerated training</text>
  </g>
  <line x1="320" y1="262" x2="400" y2="170" stroke="#F59E0B" stroke-width="1.5"/>

  <!-- RTX Neural Shaders / Games (bottom-center) -->
  <g transform="translate(360, 220)">
    <rect x="0" y="0" width="240" height="85" rx="8" fill="#FFE4E6" stroke="#EF4444" stroke-width="1.5"/>
    <text x="120" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#9F1239">RTX Neural Shaders</text>
    <text x="120" y="38" text-anchor="middle" font-size="9" fill="#EF4444">Programmable shader integration</text>
    <text x="120" y="56" text-anchor="middle" font-size="8.5" fill="#6B7280">Unreal Engine 5, game engines</text>
    <text x="120" y="70" text-anchor="middle" font-size="8.5" fill="#6B7280">100+ DLSS 4 games shipping</text>
  </g>
  <line x1="480" y1="220" x2="480" y2="170" stroke="#EF4444" stroke-width="1.5"/>

  <!-- ML Research (bottom-right) -->
  <g transform="translate(640, 220)">
    <rect x="0" y="0" width="240" height="85" rx="8" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
    <text x="120" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#1E40AF">Research</text>
    <text x="120" y="38" text-anchor="middle" font-size="9" fill="#3B82F6">Neural graphics innovation</text>
    <text x="120" y="56" text-anchor="middle" font-size="8.5" fill="#6B7280">SIGGRAPH, GTC publications</text>
    <text x="120" y="70" text-anchor="middle" font-size="8.5" fill="#6B7280">PermutoSDF, NRC, NTC</text>
  </g>
  <line x1="760" y1="240" x2="560" y2="170" stroke="#3B82F6" stroke-width="1.5"/>

  <!-- Bottom tagline -->
  <g transform="translate(150, 330)">
    <rect x="0" y="0" width="660" height="28" rx="6" fill="#F0F9FF" stroke="#BAE6FD" stroke-width="1"/>
    <text x="330" y="19" text-anchor="middle" font-size="10" font-weight="600" fill="#0369A1">From research prototypes to shipping products -- one shading language, one neural module, all platforms.</text>
  </g>
</svg>
