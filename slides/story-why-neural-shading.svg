<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" font-family="'Segoe UI', system-ui, Arial, sans-serif">
  <defs>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#6B7280"/>
    </marker>
  </defs>

  <rect width="960" height="420" fill="white" rx="8"/>

  <!-- TITLE -->
  <text x="480" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Neural Shading: The Next Era of Real-Time Graphics</text>

  <!-- ================================================================ -->
  <!-- LEFT: Traditional Shading                                        -->
  <!-- ================================================================ -->
  <g transform="translate(30, 55)">
    <rect x="0" y="0" width="420" height="195" rx="8" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1.5"/>
    <text x="210" y="24" text-anchor="middle" font-size="14" font-weight="700" fill="#374151">Traditional Shading</text>

    <g transform="translate(15, 40)">
      <rect x="0" y="0" width="115" height="50" rx="5" fill="#E5E7EB" stroke="#9CA3AF" stroke-width="1"/>
      <text x="57" y="22" text-anchor="middle" font-size="9" font-weight="600" fill="#374151">Texture Lookup</text>
      <text x="57" y="36" text-anchor="middle" font-size="8" fill="#6B7280">Fixed resolution</text>

      <rect x="125" y="0" width="115" height="50" rx="5" fill="#E5E7EB" stroke="#9CA3AF" stroke-width="1"/>
      <text x="182" y="22" text-anchor="middle" font-size="9" font-weight="600" fill="#374151">BRDF Models</text>
      <text x="182" y="36" text-anchor="middle" font-size="8" fill="#6B7280">Hand-crafted</text>

      <rect x="250" y="0" width="115" height="50" rx="5" fill="#E5E7EB" stroke="#9CA3AF" stroke-width="1"/>
      <text x="307" y="22" text-anchor="middle" font-size="9" font-weight="600" fill="#374151">Light Probes</text>
      <text x="307" y="36" text-anchor="middle" font-size="8" fill="#6B7280">Pre-baked</text>
    </g>

    <!-- Limitations -->
    <g transform="translate(15, 105)">
      <rect x="0" y="0" width="390" height="70" rx="5" fill="#FEF2F2" stroke="#FECACA" stroke-width="0.8"/>
      <text x="195" y="18" text-anchor="middle" font-size="10" font-weight="600" fill="#DC2626">Limitations</text>
      <text x="20" y="36" text-anchor="start" font-size="9" fill="#6B7280">&#x2022; Fixed quality ceiling - manually tuned approximations</text>
      <text x="20" y="50" text-anchor="start" font-size="9" fill="#6B7280">&#x2022; Scaling complexity - more effects = more engineer time</text>
      <text x="20" y="64" text-anchor="start" font-size="9" fill="#6B7280">&#x2022; Cannot learn from data - each algorithm is bespoke</text>
    </g>
  </g>

  <!-- Arrow between -->
  <line x1="460" y1="152" x2="498" y2="152" stroke="#8B5CF6" stroke-width="2.5" marker-end="url(#arrowGray)"/>
  <text x="479" y="142" text-anchor="middle" font-size="9" fill="#8B5CF6" font-weight="700">Replace</text>

  <!-- ================================================================ -->
  <!-- RIGHT: Neural Shading                                            -->
  <!-- ================================================================ -->
  <g transform="translate(510, 55)">
    <rect x="0" y="0" width="420" height="195" rx="8" fill="#F0F9FF" stroke="#3B82F6" stroke-width="1.5"/>
    <text x="210" y="24" text-anchor="middle" font-size="14" font-weight="700" fill="#1E40AF">Neural Shading</text>

    <g transform="translate(15, 40)">
      <rect x="0" y="0" width="115" height="50" rx="5" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1"/>
      <text x="57" y="22" text-anchor="middle" font-size="9" font-weight="600" fill="#1E40AF">Small MLPs</text>
      <text x="57" y="36" text-anchor="middle" font-size="8" fill="#3B82F6">Learned quality</text>

      <rect x="125" y="0" width="115" height="50" rx="5" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1"/>
      <text x="182" y="22" text-anchor="middle" font-size="9" font-weight="600" fill="#1E40AF">Data-Driven</text>
      <text x="182" y="36" text-anchor="middle" font-size="8" fill="#3B82F6">Train from data</text>

      <rect x="250" y="0" width="115" height="50" rx="5" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1"/>
      <text x="307" y="22" text-anchor="middle" font-size="9" font-weight="600" fill="#1E40AF">Tensor Cores</text>
      <text x="307" y="36" text-anchor="middle" font-size="8" fill="#3B82F6">HW accelerated</text>
    </g>

    <!-- Benefits -->
    <g transform="translate(15, 105)">
      <rect x="0" y="0" width="390" height="70" rx="5" fill="#ECFDF5" stroke="#BBF7D0" stroke-width="0.8"/>
      <text x="195" y="18" text-anchor="middle" font-size="10" font-weight="600" fill="#059669">Benefits</text>
      <text x="20" y="36" text-anchor="start" font-size="9" fill="#6B7280">&#x2022; Quality scales with data and training, not engineer effort</text>
      <text x="20" y="50" text-anchor="start" font-size="9" fill="#6B7280">&#x2022; Compact: tiny networks replace complex shader code</text>
      <text x="20" y="64" text-anchor="start" font-size="9" fill="#6B7280">&#x2022; Adaptive: same architecture works for many problems</text>
    </g>
  </g>

  <!-- ================================================================ -->
  <!-- BOTTOM: Concrete applications                                    -->
  <!-- ================================================================ -->
  <g transform="translate(30, 270)">
    <text x="465" y="14" text-anchor="middle" font-size="13" font-weight="700" fill="#374151">Shipping Today in Production</text>

    <g transform="translate(0, 28)">
      <rect x="0" y="0" width="220" height="58" rx="6" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.2"/>
      <text x="110" y="14" text-anchor="middle" font-size="10" font-weight="700" fill="#5B21B6">Neural Texture Compression</text>
      <text x="110" y="30" text-anchor="middle" font-size="8.5" fill="#7C3AED">AC Mirage (Ubisoft)</text>
      <text x="110" y="42" text-anchor="middle" font-size="8" fill="#6B7280">Shipped in AAA title, 20x</text>
      <text x="110" y="52" text-anchor="middle" font-size="8" fill="#6B7280">compression, saves VRAM</text>

      <rect x="235" y="0" width="220" height="58" rx="6" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.2"/>
      <text x="345" y="14" text-anchor="middle" font-size="10" font-weight="700" fill="#5B21B6">Neural Radiance Caching</text>
      <text x="345" y="30" text-anchor="middle" font-size="8.5" fill="#7C3AED">Half-Life 2 RTX</text>
      <text x="345" y="42" text-anchor="middle" font-size="8" fill="#6B7280">Full neural rendering stack:</text>
      <text x="345" y="52" text-anchor="middle" font-size="8" fill="#6B7280">NRC + NTC + Neural Skin</text>

      <rect x="470" y="0" width="210" height="58" rx="6" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.2"/>
      <text x="575" y="14" text-anchor="middle" font-size="10" font-weight="700" fill="#5B21B6">Neural Materials</text>
      <text x="575" y="30" text-anchor="middle" font-size="8.5" fill="#7C3AED">RTX Neural Shaders SDK</text>
      <text x="575" y="42" text-anchor="middle" font-size="8" fill="#6B7280">Film-quality appearance</text>
      <text x="575" y="52" text-anchor="middle" font-size="8" fill="#6B7280">10x faster than layered</text>

      <rect x="695" y="0" width="205" height="58" rx="6" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.2"/>
      <text x="797" y="14" text-anchor="middle" font-size="10" font-weight="700" fill="#5B21B6">Neural Volumes</text>
      <text x="797" y="30" text-anchor="middle" font-size="8.5" fill="#7C3AED">NeuralVDB (NVIDIA)</text>
      <text x="797" y="42" text-anchor="middle" font-size="8" fill="#6B7280">100x compression for</text>
      <text x="797" y="52" text-anchor="middle" font-size="8" fill="#6B7280">smoke, fire, clouds</text>
    </g>

    <!-- Platform badges -->
    <g transform="translate(0, 100)">
      <rect x="250" y="0" width="120" height="22" rx="4" fill="#374151"/>
      <text x="310" y="15" text-anchor="middle" font-size="9" fill="white" font-weight="600">RTX 50 Series</text>
      <rect x="380" y="0" width="90" height="22" rx="4" fill="#1E40AF"/>
      <text x="425" y="15" text-anchor="middle" font-size="9" fill="white" font-weight="600">DirectX</text>
      <rect x="480" y="0" width="90" height="22" rx="4" fill="#DC2626"/>
      <text x="525" y="15" text-anchor="middle" font-size="9" fill="white" font-weight="600">Vulkan</text>
      <rect x="580" y="0" width="90" height="22" rx="4" fill="#059669"/>
      <text x="625" y="15" text-anchor="middle" font-size="9" fill="white" font-weight="600">CUDA</text>
    </g>
  </g>
</svg>
