<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" font-family="'Segoe UI', system-ui, Arial, sans-serif">
  <defs>
    <marker id="arrowG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#6B7280"/>
    </marker>
  </defs>

  <rect width="960" height="540" fill="white" rx="8"/>

  <!-- Title -->
  <text x="480" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#111827">What is an MLP?</text>
  <text x="480" y="60" text-anchor="middle" font-size="13" fill="#6B7280">Multi-Layer Perceptron &#x2014; a universal function approximator</text>

  <!-- ================================================================ -->
  <!-- Network Diagram                                                   -->
  <!-- ================================================================ -->
  <g transform="translate(80, 90)">
    <rect x="0" y="0" width="800" height="260" rx="10" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>

    <!-- Layer labels -->
    <text x="60" y="24" text-anchor="middle" font-size="11" font-weight="700" fill="#065F46">Input</text>
    <text x="260" y="24" text-anchor="middle" font-size="11" font-weight="700" fill="#1E40AF">Hidden Layer 1</text>
    <text x="500" y="24" text-anchor="middle" font-size="11" font-weight="700" fill="#1E40AF">Hidden Layer 2</text>
    <text x="720" y="24" text-anchor="middle" font-size="11" font-weight="700" fill="#9F1239">Output</text>

    <!-- ============ Input neurons ============ -->
    <circle cx="60" cy="70" r="16" fill="#D1FAE5" stroke="#10B981" stroke-width="2"/>
    <text x="60" y="75" text-anchor="middle" font-size="10" font-weight="600" fill="#065F46">x&#x2081;</text>

    <circle cx="60" cy="130" r="16" fill="#D1FAE5" stroke="#10B981" stroke-width="2"/>
    <text x="60" y="135" text-anchor="middle" font-size="10" font-weight="600" fill="#065F46">x&#x2082;</text>

    <circle cx="60" cy="190" r="16" fill="#D1FAE5" stroke="#10B981" stroke-width="2"/>
    <text x="60" y="195" text-anchor="middle" font-size="10" font-weight="600" fill="#065F46">x&#x2083;</text>

    <!-- ============ Hidden Layer 1 neurons ============ -->
    <circle cx="260" cy="60" r="16" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
    <circle cx="260" cy="110" r="16" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
    <circle cx="260" cy="160" r="16" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
    <circle cx="260" cy="210" r="16" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>

    <!-- ============ Hidden Layer 2 neurons ============ -->
    <circle cx="500" cy="60" r="16" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="2"/>
    <circle cx="500" cy="110" r="16" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="2"/>
    <circle cx="500" cy="160" r="16" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="2"/>
    <circle cx="500" cy="210" r="16" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="2"/>

    <!-- ============ Output neurons ============ -->
    <circle cx="720" cy="100" r="16" fill="#FFE4E6" stroke="#EF4444" stroke-width="2"/>
    <text x="720" y="105" text-anchor="middle" font-size="10" font-weight="600" fill="#9F1239">y&#x2081;</text>

    <circle cx="720" cy="160" r="16" fill="#FFE4E6" stroke="#EF4444" stroke-width="2"/>
    <text x="720" y="165" text-anchor="middle" font-size="10" font-weight="600" fill="#9F1239">y&#x2082;</text>

    <!-- ============ Connections: Input -> Hidden1 ============ -->
    <!-- x1 to all hidden1 -->
    <line x1="76" y1="70" x2="244" y2="60" stroke="#A7F3D0" stroke-width="1" opacity="0.7"/>
    <line x1="76" y1="70" x2="244" y2="110" stroke="#A7F3D0" stroke-width="1" opacity="0.7"/>
    <line x1="76" y1="70" x2="244" y2="160" stroke="#A7F3D0" stroke-width="1" opacity="0.7"/>
    <line x1="76" y1="70" x2="244" y2="210" stroke="#A7F3D0" stroke-width="1" opacity="0.7"/>
    <!-- x2 to all hidden1 -->
    <line x1="76" y1="130" x2="244" y2="60" stroke="#A7F3D0" stroke-width="1" opacity="0.7"/>
    <line x1="76" y1="130" x2="244" y2="110" stroke="#A7F3D0" stroke-width="1" opacity="0.7"/>
    <line x1="76" y1="130" x2="244" y2="160" stroke="#A7F3D0" stroke-width="1" opacity="0.7"/>
    <line x1="76" y1="130" x2="244" y2="210" stroke="#A7F3D0" stroke-width="1" opacity="0.7"/>
    <!-- x3 to all hidden1 -->
    <line x1="76" y1="190" x2="244" y2="60" stroke="#A7F3D0" stroke-width="1" opacity="0.7"/>
    <line x1="76" y1="190" x2="244" y2="110" stroke="#A7F3D0" stroke-width="1" opacity="0.7"/>
    <line x1="76" y1="190" x2="244" y2="160" stroke="#A7F3D0" stroke-width="1" opacity="0.7"/>
    <line x1="76" y1="190" x2="244" y2="210" stroke="#A7F3D0" stroke-width="1" opacity="0.7"/>

    <!-- ============ Connections: Hidden1 -> Hidden2 ============ -->
    <line x1="276" y1="60" x2="484" y2="60" stroke="#BFDBFE" stroke-width="1" opacity="0.7"/>
    <line x1="276" y1="60" x2="484" y2="110" stroke="#BFDBFE" stroke-width="1" opacity="0.7"/>
    <line x1="276" y1="60" x2="484" y2="160" stroke="#BFDBFE" stroke-width="1" opacity="0.7"/>
    <line x1="276" y1="60" x2="484" y2="210" stroke="#BFDBFE" stroke-width="1" opacity="0.7"/>
    <line x1="276" y1="110" x2="484" y2="60" stroke="#BFDBFE" stroke-width="1" opacity="0.7"/>
    <line x1="276" y1="110" x2="484" y2="110" stroke="#BFDBFE" stroke-width="1" opacity="0.7"/>
    <line x1="276" y1="110" x2="484" y2="160" stroke="#BFDBFE" stroke-width="1" opacity="0.7"/>
    <line x1="276" y1="110" x2="484" y2="210" stroke="#BFDBFE" stroke-width="1" opacity="0.7"/>
    <line x1="276" y1="160" x2="484" y2="60" stroke="#BFDBFE" stroke-width="1" opacity="0.7"/>
    <line x1="276" y1="160" x2="484" y2="110" stroke="#BFDBFE" stroke-width="1" opacity="0.7"/>
    <line x1="276" y1="160" x2="484" y2="160" stroke="#BFDBFE" stroke-width="1" opacity="0.7"/>
    <line x1="276" y1="160" x2="484" y2="210" stroke="#BFDBFE" stroke-width="1" opacity="0.7"/>
    <line x1="276" y1="210" x2="484" y2="60" stroke="#BFDBFE" stroke-width="1" opacity="0.7"/>
    <line x1="276" y1="210" x2="484" y2="110" stroke="#BFDBFE" stroke-width="1" opacity="0.7"/>
    <line x1="276" y1="210" x2="484" y2="160" stroke="#BFDBFE" stroke-width="1" opacity="0.7"/>
    <line x1="276" y1="210" x2="484" y2="210" stroke="#BFDBFE" stroke-width="1" opacity="0.7"/>

    <!-- ============ Connections: Hidden2 -> Output ============ -->
    <line x1="516" y1="60" x2="704" y2="100" stroke="#DDD6FE" stroke-width="1" opacity="0.7"/>
    <line x1="516" y1="60" x2="704" y2="160" stroke="#DDD6FE" stroke-width="1" opacity="0.7"/>
    <line x1="516" y1="110" x2="704" y2="100" stroke="#DDD6FE" stroke-width="1" opacity="0.7"/>
    <line x1="516" y1="110" x2="704" y2="160" stroke="#DDD6FE" stroke-width="1" opacity="0.7"/>
    <line x1="516" y1="160" x2="704" y2="100" stroke="#DDD6FE" stroke-width="1" opacity="0.7"/>
    <line x1="516" y1="160" x2="704" y2="160" stroke="#DDD6FE" stroke-width="1" opacity="0.7"/>
    <line x1="516" y1="210" x2="704" y2="100" stroke="#DDD6FE" stroke-width="1" opacity="0.7"/>
    <line x1="516" y1="210" x2="704" y2="160" stroke="#DDD6FE" stroke-width="1" opacity="0.7"/>

    <!-- Weight labels between layers -->
    <text x="160" y="245" text-anchor="middle" font-size="10" fill="#6B7280" font-style="italic">weights W&#x2081;</text>
    <text x="385" y="245" text-anchor="middle" font-size="10" fill="#6B7280" font-style="italic">weights W&#x2082;</text>
    <text x="610" y="245" text-anchor="middle" font-size="10" fill="#6B7280" font-style="italic">weights W&#x2083;</text>
  </g>

  <!-- ================================================================ -->
  <!-- Formula breakdown                                                 -->
  <!-- ================================================================ -->
  <g transform="translate(80, 375)">
    <rect x="0" y="0" width="800" height="70" rx="8" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
    <text x="400" y="20" text-anchor="middle" font-size="13" font-weight="700" fill="#1E40AF">Each Layer = Linear Transform + Nonlinearity</text>

    <text x="400" y="50" text-anchor="middle" font-size="16" font-family="'Courier New', monospace" fill="#374151">
      h = &#x3C3;( W &#x00B7; x + b )
    </text>
  </g>

  <!-- ================================================================ -->
  <!-- Bottom: three property cards                                      -->
  <!-- ================================================================ -->
  <g transform="translate(80, 462)">
    <!-- Card 1 -->
    <rect x="0" y="0" width="245" height="52" rx="6" fill="#D1FAE5" stroke="#10B981" stroke-width="1"/>
    <text x="122" y="18" text-anchor="middle" font-size="11" font-weight="700" fill="#065F46">Universal Approximator</text>
    <text x="122" y="34" text-anchor="middle" font-size="9" fill="#6B7280">Can learn any continuous function</text>
    <text x="122" y="46" text-anchor="middle" font-size="9" fill="#6B7280">given enough neurons</text>

    <!-- Card 2 -->
    <rect x="265" y="0" width="245" height="52" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1"/>
    <text x="387" y="18" text-anchor="middle" font-size="11" font-weight="700" fill="#1E40AF">Differentiable</text>
    <text x="387" y="34" text-anchor="middle" font-size="9" fill="#6B7280">End-to-end trainable with</text>
    <text x="387" y="46" text-anchor="middle" font-size="9" fill="#6B7280">gradient descent (backprop)</text>

    <!-- Card 3 -->
    <rect x="530" y="0" width="270" height="52" rx="6" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1"/>
    <text x="665" y="18" text-anchor="middle" font-size="11" font-weight="700" fill="#5B21B6">GPU-Friendly</text>
    <text x="665" y="34" text-anchor="middle" font-size="9" fill="#6B7280">Matrix multiplications map directly</text>
    <text x="665" y="46" text-anchor="middle" font-size="9" fill="#6B7280">to Tensor Core hardware</text>
  </g>

  <text x="930" y="525" text-anchor="end" font-size="10" fill="#D1D5DB">4</text>
</svg>
