<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" font-family="'Segoe UI', system-ui, Arial, sans-serif">
  <rect width="960" height="540" fill="white" rx="8"/>

  <!-- Subtle gradient accent bar at top -->
  <rect x="0" y="0" width="960" height="6" rx="3" fill="url(#topGrad)"/>
  <defs>
    <linearGradient id="topGrad" x1="0" y1="0" x2="960" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="480" y="180" text-anchor="middle" font-size="36" font-weight="700" fill="#111827">Neural Shading</text>
  <text x="480" y="230" text-anchor="middle" font-size="20" fill="#6B7280">Replacing Hand-Designed Functions</text>
  <text x="480" y="260" text-anchor="middle" font-size="20" fill="#6B7280">with Learned Functions</text>

  <!-- Decorative divider -->
  <line x1="380" y1="290" x2="580" y2="290" stroke="#D1D5DB" stroke-width="2" stroke-linecap="round"/>

  <!-- Visual: simple input -> MLP -> output icon -->
  <g transform="translate(340, 330)">
    <!-- Input dots -->
    <circle cx="0" cy="15" r="6" fill="#10B981"/>
    <circle cx="0" cy="35" r="6" fill="#10B981"/>
    <circle cx="0" cy="55" r="6" fill="#10B981"/>
    <text x="0" y="82" text-anchor="middle" font-size="11" fill="#6B7280">input</text>

    <!-- Lines to MLP box -->
    <line x1="8" y1="15" x2="90" y2="20" stroke="#D1D5DB" stroke-width="1"/>
    <line x1="8" y1="15" x2="90" y2="35" stroke="#D1D5DB" stroke-width="1"/>
    <line x1="8" y1="15" x2="90" y2="50" stroke="#D1D5DB" stroke-width="1"/>
    <line x1="8" y1="35" x2="90" y2="20" stroke="#D1D5DB" stroke-width="1"/>
    <line x1="8" y1="35" x2="90" y2="35" stroke="#D1D5DB" stroke-width="1"/>
    <line x1="8" y1="35" x2="90" y2="50" stroke="#D1D5DB" stroke-width="1"/>
    <line x1="8" y1="55" x2="90" y2="20" stroke="#D1D5DB" stroke-width="1"/>
    <line x1="8" y1="55" x2="90" y2="35" stroke="#D1D5DB" stroke-width="1"/>
    <line x1="8" y1="55" x2="90" y2="50" stroke="#D1D5DB" stroke-width="1"/>

    <!-- Hidden layer -->
    <circle cx="95" cy="20" r="6" fill="#3B82F6"/>
    <circle cx="95" cy="35" r="6" fill="#3B82F6"/>
    <circle cx="95" cy="50" r="6" fill="#3B82F6"/>

    <line x1="103" y1="20" x2="180" y2="20" stroke="#D1D5DB" stroke-width="1"/>
    <line x1="103" y1="20" x2="180" y2="35" stroke="#D1D5DB" stroke-width="1"/>
    <line x1="103" y1="20" x2="180" y2="50" stroke="#D1D5DB" stroke-width="1"/>
    <line x1="103" y1="35" x2="180" y2="20" stroke="#D1D5DB" stroke-width="1"/>
    <line x1="103" y1="35" x2="180" y2="35" stroke="#D1D5DB" stroke-width="1"/>
    <line x1="103" y1="35" x2="180" y2="50" stroke="#D1D5DB" stroke-width="1"/>
    <line x1="103" y1="50" x2="180" y2="20" stroke="#D1D5DB" stroke-width="1"/>
    <line x1="103" y1="50" x2="180" y2="35" stroke="#D1D5DB" stroke-width="1"/>
    <line x1="103" y1="50" x2="180" y2="50" stroke="#D1D5DB" stroke-width="1"/>

    <!-- Hidden layer 2 -->
    <circle cx="185" cy="20" r="6" fill="#8B5CF6"/>
    <circle cx="185" cy="35" r="6" fill="#8B5CF6"/>
    <circle cx="185" cy="50" r="6" fill="#8B5CF6"/>

    <!-- Lines to output -->
    <line x1="193" y1="20" x2="270" y2="25" stroke="#D1D5DB" stroke-width="1"/>
    <line x1="193" y1="20" x2="270" y2="45" stroke="#D1D5DB" stroke-width="1"/>
    <line x1="193" y1="35" x2="270" y2="25" stroke="#D1D5DB" stroke-width="1"/>
    <line x1="193" y1="35" x2="270" y2="45" stroke="#D1D5DB" stroke-width="1"/>
    <line x1="193" y1="50" x2="270" y2="25" stroke="#D1D5DB" stroke-width="1"/>
    <line x1="193" y1="50" x2="270" y2="45" stroke="#D1D5DB" stroke-width="1"/>

    <!-- Output dots -->
    <circle cx="275" cy="25" r="6" fill="#EF4444"/>
    <circle cx="275" cy="45" r="6" fill="#EF4444"/>
    <text x="275" y="72" text-anchor="middle" font-size="11" fill="#6B7280">output</text>

    <!-- Label -->
    <text x="140" y="82" text-anchor="middle" font-size="11" font-weight="600" fill="#3B82F6">MLP</text>
  </g>

  <!-- Subtitle at bottom -->
  <text x="480" y="480" text-anchor="middle" font-size="13" fill="#9CA3AF">How small neural networks are transforming the graphics pipeline</text>
</svg>
