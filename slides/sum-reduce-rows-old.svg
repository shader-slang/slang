<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 585" font-family="'Segoe UI', system-ui, Arial, sans-serif">
  <defs>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#6B7280"/>
    </marker>
    <marker id="arrowRose" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#EF4444"/>
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#8B5CF6"/>
    </marker>
  </defs>

  <rect width="960" height="585" fill="white" rx="8"/>

  <!-- TITLE -->
  <text x="480" y="28" text-anchor="middle" font-size="18" font-weight="700" fill="#111827">sumReduceRows: Old Algorithm (Before Optimization)</text>
  <text x="480" y="48" text-anchor="middle" font-size="11" fill="#6B7280">Phase 1: WaveActiveSum &#x2192; Phase 2: shMem (tiled, multi-sync) &#x2192; Phase 3: Warp 0 WaveMaskSum &#x2192; Phase 4: Warp 0 atomicAdd</text>

  <!-- ================================================================ -->
  <!-- PHASE 1: Same as new - WaveActiveSum                             -->
  <!-- ================================================================ -->
  <g transform="translate(30, 65)">
    <rect x="0" y="0" width="900" height="70" rx="8" fill="#FFF1F2" stroke="#FECDD3" stroke-width="1"/>
    <text x="60" y="18" text-anchor="start" font-size="12" font-weight="700" fill="#9F1239">Phase 1: WaveActiveSum (same as new)</text>
    <text x="60" y="38" text-anchor="start" font-size="10" fill="#6B7280">Each warp: 32 threads &#x2192; WaveActiveSum(dOut[i]) &#x2192; localResult[M] (one sum per warp)</text>
    <text x="60" y="54" text-anchor="start" font-size="10" fill="#9CA3AF" font-style="italic">Result: W warps, each with localResult[M] in lane 0</text>
  </g>

  <!-- ================================================================ -->
  <!-- PHASE 2: Lane 0 stores to shMem BY TILES (multiple syncs!)      -->
  <!-- ================================================================ -->
  <g transform="translate(30, 150)">
    <rect x="0" y="0" width="900" height="115" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1"/>
    <text x="450" y="20" text-anchor="middle" font-size="12" font-weight="700" fill="#92400E">Phase 2: Lane 0 Stores to Shared Memory, Warp 0 Loads</text>

    <g transform="translate(15, 35)">
      <!-- Step A: Lane 0 stores -->
      <rect x="0" y="0" width="250" height="48" rx="4" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1"/>
      <text x="125" y="18" text-anchor="middle" font-size="9.5" font-weight="600" fill="#92400E">Lane 0 of each warp stores</text>
      <text x="125" y="36" text-anchor="middle" font-size="9" fill="#B45309">localResult[M] &#x2192; shMem</text>

      <!-- Sync -->
      <rect x="270" y="6" width="130" height="34" rx="4" fill="#EF4444" stroke="#DC2626" stroke-width="1.2"/>
      <text x="335" y="28" text-anchor="middle" font-size="9" font-weight="700" fill="white">GroupSync</text>

      <!-- Step B: Warp 0 loads -->
      <rect x="420" y="0" width="290" height="48" rx="4" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1"/>
      <text x="565" y="18" text-anchor="middle" font-size="9.5" font-weight="600" fill="#1E40AF">Warp 0: each lane loads one warp's data</text>
      <text x="565" y="36" text-anchor="middle" font-size="9" fill="#3B82F6">lane j reads shMem[warp j] &#x2192; localResult</text>

      <text x="435" y="66" text-anchor="middle" font-size="9" fill="#92400E">1 GroupSync needed (all other warps idle after this point)</text>
    </g>
  </g>

  <!-- ================================================================ -->
  <!-- PHASE 3: Warp 0 does WaveMaskSum                                -->
  <!-- ================================================================ -->
  <g transform="translate(30, 280)">
    <rect x="0" y="0" width="900" height="130" rx="8" fill="#EDE9FE" stroke="#DDD6FE" stroke-width="1"/>
    <text x="450" y="20" text-anchor="middle" font-size="12" font-weight="700" fill="#5B21B6">Phase 3: Warp 0 Only - WaveMaskSum (conditional mask)</text>

    <g transform="translate(15, 35)">
      <!-- Warp 0 with conditional lanes -->
      <rect x="0" y="0" width="540" height="80" rx="6" fill="white" stroke="#DDD6FE" stroke-width="0.8"/>
      <text x="270" y="16" text-anchor="middle" font-size="10" font-weight="600" fill="#5B21B6">Warp 0 (only warp active, all others idle)</text>

      <!-- Active lanes -->
      <rect x="10" y="26" width="40" height="30" rx="3" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1"/>
      <text x="30" y="38" text-anchor="middle" font-size="7" fill="#1E40AF" font-weight="600">Lane 0</text>
      <text x="30" y="50" text-anchor="middle" font-size="6.5" fill="#3B82F6">W0 data</text>

      <rect x="55" y="26" width="40" height="30" rx="3" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1"/>
      <text x="75" y="38" text-anchor="middle" font-size="7" fill="#1E40AF" font-weight="600">Lane 1</text>
      <text x="75" y="50" text-anchor="middle" font-size="6.5" fill="#3B82F6">W1 data</text>

      <text x="108" y="44" text-anchor="middle" font-size="9" fill="#9CA3AF">...</text>

      <rect x="122" y="26" width="45" height="30" rx="3" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1"/>
      <text x="144" y="38" text-anchor="middle" font-size="7" fill="#1E40AF" font-weight="600">Lane w-1</text>
      <text x="144" y="50" text-anchor="middle" font-size="6.5" fill="#3B82F6">Ww data</text>

      <!-- Inactive lanes (grayed out) -->
      <rect x="175" y="26" width="40" height="30" rx="3" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="0.8"/>
      <text x="195" y="44" text-anchor="middle" font-size="7" fill="#9CA3AF">idle</text>

      <rect x="220" y="26" width="40" height="30" rx="3" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="0.8"/>
      <text x="240" y="44" text-anchor="middle" font-size="7" fill="#9CA3AF">idle</text>

      <text x="275" y="44" text-anchor="middle" font-size="9" fill="#9CA3AF">...</text>

      <rect x="290" y="26" width="40" height="30" rx="3" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="0.8"/>
      <text x="310" y="44" text-anchor="middle" font-size="7" fill="#9CA3AF">idle</text>

      <!-- Arrow to result -->
      <line x1="340" y1="41" x2="365" y2="41" stroke="#8B5CF6" stroke-width="1.2" marker-end="url(#arrowPurple)"/>

      <!-- WaveMaskSum result -->
      <rect x="370" y="26" width="155" height="30" rx="4" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="1.5"/>
      <text x="447" y="38" text-anchor="middle" font-size="8" font-weight="600" fill="#5B21B6">WaveMaskSum(mask, val)</text>
      <text x="447" y="50" text-anchor="middle" font-size="7.5" fill="#7C3AED">&#x2192; final sum in lane 0</text>

      <text x="270" y="72" text-anchor="middle" font-size="8.5" fill="#DC2626" font-weight="600">&#x26A0; mask = WaveMaskBallot(laneId &lt; warpCount).  If warpCount &lt; 32, partial-width wave op!</text>
    </g>

    <!-- Problem annotation -->
    <g transform="translate(575, 35)">
      <rect x="0" y="0" width="310" height="80" rx="6" fill="#FFF1F2" stroke="#FECDD3" stroke-width="1"/>
      <text x="155" y="18" text-anchor="middle" font-size="9" font-weight="700" fill="#DC2626">Performance Problems</text>
      <text x="155" y="34" text-anchor="middle" font-size="8.5" fill="#6B7280">1. Only W lanes active out of 32</text>
      <text x="155" y="48" text-anchor="middle" font-size="8.5" fill="#6B7280">2. WaveMaskSum less efficient than full wave</text>
      <text x="155" y="62" text-anchor="middle" font-size="8.5" fill="#6B7280">3. ALL other warps completely idle</text>
      <text x="155" y="76" text-anchor="middle" font-size="8.5" fill="#6B7280">4. Must loop M/SubgroupSize times</text>
    </g>
  </g>

  <!-- ================================================================ -->
  <!-- PHASE 4: Lane 0 of Warp 0 does atomicAdd                        -->
  <!-- ================================================================ -->
  <g transform="translate(30, 425)">
    <rect x="0" y="0" width="900" height="65" rx="8" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1"/>
    <text x="60" y="18" text-anchor="start" font-size="12" font-weight="700" fill="#065F46">Phase 4: Warp 0 spreads atomicAdd across its 32 threads</text>
    <text x="60" y="38" text-anchor="start" font-size="10" fill="#6B7280">Each thread in Warp 0 handles M/32 elements: atomicAdd(dBias[idx], localResult[idx])</text>
    <text x="60" y="54" text-anchor="start" font-size="10" fill="#9CA3AF" font-style="italic">Fewer atomic ops total, but only 1 warp's worth of parallelism for the writes</text>
  </g>

  <!-- ================================================================ -->
  <!-- COMPARISON SUMMARY                                               -->
  <!-- ================================================================ -->
  <g transform="translate(30, 505)">
    <rect x="0" y="0" width="900" height="65" rx="8" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1.2"/>
    <text x="450" y="18" text-anchor="middle" font-size="11" font-weight="700" fill="#374151">New algorithm is ~3x faster (with v2 atomicAdd / red.relaxed.gpu)</text>
    <text x="30" y="38" text-anchor="start" font-size="9.5" fill="#DC2626" font-weight="600">Old: 1 GroupSync, but then only Warp 0 active</text>
    <text x="350" y="38" text-anchor="start" font-size="9.5" fill="#DC2626" font-weight="600">WaveMaskSum (partial width, W&lt;32 lanes)</text>
    <text x="660" y="38" text-anchor="start" font-size="9.5" fill="#DC2626" font-weight="600">Poor utilization (W-1 warps idle)</text>
    <text x="30" y="56" text-anchor="start" font-size="9.5" fill="#10B981" font-weight="600">New: 1 GroupSync, ALL threads active after</text>
    <text x="350" y="56" text-anchor="start" font-size="9.5" fill="#10B981" font-weight="600">No wave mask, simple linear sum</text>
    <text x="660" y="56" text-anchor="start" font-size="9.5" fill="#10B981" font-weight="600">Full utilization + relaxed atomics</text>
  </g>
</svg>
