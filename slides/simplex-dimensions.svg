<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 352" font-family="'Segoe UI', system-ui, Arial, sans-serif">

  <rect width="960" height="352" fill="white" rx="8"/>

  <!-- TITLE -->
  <text x="480" y="28" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Simplex in Different Dimensions</text>
  <text x="480" y="48" text-anchor="middle" font-size="11" fill="#6B7280">A D-simplex has D+1 vertices: the minimal shape that encloses a region in D dimensions</text>

  <!-- ================================================================ -->
  <!-- 1-D SIMPLEX: Line segment (2 vertices)                          -->
  <!-- ================================================================ -->
  <g transform="translate(80, 80)">
    <rect x="-60" y="-10" width="220" height="252" rx="8" fill="#F0FDF4" stroke="#10B981" stroke-width="1.2"/>
    <text x="50" y="12" text-anchor="middle" font-size="14" font-weight="700" fill="#065F46">1-D Simplex</text>
    <text x="50" y="28" text-anchor="middle" font-size="10" fill="#10B981">Line segment</text>

    <!-- The line segment -->
    <line x1="-20" y1="100" x2="120" y2="100" stroke="#10B981" stroke-width="3"/>
    <circle cx="-20" cy="100" r="7" fill="#D1FAE5" stroke="#10B981" stroke-width="2"/>
    <circle cx="120" cy="100" r="7" fill="#D1FAE5" stroke="#10B981" stroke-width="2"/>

    <!-- Vertex labels -->
    <text x="-20" y="125" text-anchor="middle" font-size="10" fill="#065F46" font-weight="600">v&#x2080;</text>
    <text x="120" y="125" text-anchor="middle" font-size="10" fill="#065F46" font-weight="600">v&#x2081;</text>

    <!-- Info -->
    <text x="50" y="160" text-anchor="middle" font-size="10" fill="#374151" font-weight="600">D+1 = 2 vertices</text>
    <text x="50" y="178" text-anchor="middle" font-size="9" fill="#6B7280">1 edge</text>

    <!-- Comparison -->
    <rect x="-40" y="192" width="180" height="28" rx="4" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="0.6"/>
    <text x="50" y="206" text-anchor="middle" font-size="8.5" fill="#065F46">Rect grid: 2&#xB9; = 2 vertices</text>
    <text x="50" y="218" text-anchor="middle" font-size="8.5" fill="#059669" font-weight="600">Same! (no savings in 1D)</text>
  </g>

  <!-- ================================================================ -->
  <!-- 2-D SIMPLEX: Triangle (3 vertices)                              -->
  <!-- ================================================================ -->
  <g transform="translate(390, 80)">
    <rect x="-60" y="-10" width="220" height="252" rx="8" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.2"/>
    <text x="50" y="12" text-anchor="middle" font-size="14" font-weight="700" fill="#1E40AF">2-D Simplex</text>
    <text x="50" y="28" text-anchor="middle" font-size="10" fill="#3B82F6">Triangle</text>

    <!-- The triangle -->
    <polygon points="50,50 -20,140 120,140" fill="#DBEAFE" fill-opacity="0.4" stroke="#3B82F6" stroke-width="3"/>
    <circle cx="50" cy="50" r="7" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
    <circle cx="-20" cy="140" r="7" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
    <circle cx="120" cy="140" r="7" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>

    <!-- Vertex labels -->
    <text x="50" y="40" text-anchor="middle" font-size="10" fill="#1E40AF" font-weight="600">v&#x2080;</text>
    <text x="-28" y="157" text-anchor="middle" font-size="10" fill="#1E40AF" font-weight="600">v&#x2081;</text>
    <text x="128" y="157" text-anchor="middle" font-size="10" fill="#1E40AF" font-weight="600">v&#x2082;</text>

    <!-- Info -->
    <text x="50" y="175" text-anchor="middle" font-size="10" fill="#374151" font-weight="600">D+1 = 3 vertices</text>
    <text x="50" y="193" text-anchor="middle" font-size="9" fill="#6B7280">3 edges, 1 face</text>

    <!-- Comparison -->
    <rect x="-40" y="202" width="180" height="28" rx="4" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="0.6"/>
    <text x="50" y="216" text-anchor="middle" font-size="8.5" fill="#1E40AF">Rect grid: 2&#xB2; = 4 vertices</text>
    <text x="50" y="228" text-anchor="middle" font-size="8.5" fill="#3B82F6" font-weight="600">Saves 1 vertex (25%)</text>
  </g>

  <!-- ================================================================ -->
  <!-- 3-D SIMPLEX: Tetrahedron (4 vertices)                           -->
  <!-- ================================================================ -->
  <g transform="translate(700, 80)">
    <rect x="-60" y="-10" width="220" height="252" rx="8" fill="#FDF4FF" stroke="#A855F7" stroke-width="1.2"/>
    <text x="50" y="12" text-anchor="middle" font-size="14" font-weight="700" fill="#5B21B6">3-D Simplex</text>
    <text x="50" y="28" text-anchor="middle" font-size="10" fill="#A855F7">Tetrahedron</text>

    <!-- Tetrahedron (pseudo-3D projection) -->
    <!-- Back face (lighter) -->
    <polygon points="50,45 -15,135 90,145" fill="#F3E8FF" fill-opacity="0.3" stroke="#C4B5FD" stroke-width="1"/>
    <!-- Left face -->
    <polygon points="50,45 -15,135 35,105" fill="#E9D5FF" fill-opacity="0.3" stroke="#C4B5FD" stroke-width="1.5"/>
    <!-- Right face -->
    <polygon points="50,45 90,145 35,105" fill="#DDD6FE" fill-opacity="0.3" stroke="#C4B5FD" stroke-width="1.5"/>
    <!-- Bottom face -->
    <polygon points="-15,135 90,145 35,105" fill="#F3E8FF" fill-opacity="0.2" stroke="#C4B5FD" stroke-width="1"/>

    <!-- Front edges (bold) -->
    <line x1="50" y1="45" x2="-15" y2="135" stroke="#A855F7" stroke-width="2.5"/>
    <line x1="50" y1="45" x2="90" y2="145" stroke="#A855F7" stroke-width="2.5"/>
    <line x1="50" y1="45" x2="35" y2="105" stroke="#A855F7" stroke-width="2.5"/>
    <line x1="-15" y1="135" x2="90" y2="145" stroke="#A855F7" stroke-width="2"/>
    <line x1="-15" y1="135" x2="35" y2="105" stroke="#A855F7" stroke-width="2"/>
    <!-- Back edge (dashed) -->
    <line x1="90" y1="145" x2="35" y2="105" stroke="#A855F7" stroke-width="1.5" stroke-dasharray="4,3"/>

    <!-- Vertices -->
    <circle cx="50" cy="45" r="7" fill="#F3E8FF" stroke="#A855F7" stroke-width="2"/>
    <circle cx="-15" cy="135" r="7" fill="#F3E8FF" stroke="#A855F7" stroke-width="2"/>
    <circle cx="90" cy="145" r="7" fill="#F3E8FF" stroke="#A855F7" stroke-width="2"/>
    <circle cx="35" cy="105" r="6" fill="#E9D5FF" stroke="#A855F7" stroke-width="2"/>

    <!-- Vertex labels -->
    <text x="50" y="35" text-anchor="middle" font-size="10" fill="#5B21B6" font-weight="600">v&#x2080;</text>
    <text x="-25" y="150" text-anchor="middle" font-size="10" fill="#5B21B6" font-weight="600">v&#x2081;</text>
    <text x="100" y="157" text-anchor="middle" font-size="10" fill="#5B21B6" font-weight="600">v&#x2082;</text>
    <text x="22" y="102" text-anchor="end" font-size="10" fill="#5B21B6" font-weight="600">v&#x2083;</text>

    <!-- Info -->
    <text x="50" y="178" text-anchor="middle" font-size="10" fill="#374151" font-weight="600">D+1 = 4 vertices</text>
    <text x="50" y="196" text-anchor="middle" font-size="9" fill="#6B7280">6 edges, 4 faces</text>

    <!-- Comparison -->
    <rect x="-40" y="204" width="180" height="28" rx="4" fill="#FDF4FF" stroke="#E9D5FF" stroke-width="0.6"/>
    <text x="50" y="218" text-anchor="middle" font-size="8.5" fill="#5B21B6">Rect grid: 2&#xB3; = 8 vertices</text>
    <text x="50" y="230" text-anchor="middle" font-size="8.5" fill="#A855F7" font-weight="600">Saves 4 vertices (50%)</text>
  </g>

</svg>
