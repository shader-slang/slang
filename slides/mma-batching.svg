<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family="'Segoe UI', system-ui, Arial, sans-serif">
  <defs>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#6B7280"/>
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#8B5CF6"/>
    </marker>
  </defs>

  <rect width="960" height="520" fill="white" rx="8"/>

  <!-- TITLE -->
  <text x="480" y="28" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">From Per-Thread Mat-Vec to Batched Mat-Mat Multiply</text>
  <text x="480" y="48" text-anchor="middle" font-size="11" fill="#6B7280">Each thread computes output = W * input + bias.  All threads in a warp share the same W.</text>

  <!-- ================================================================ -->
  <!-- TOP: Per-thread view                                             -->
  <!-- ================================================================ -->
  <g transform="translate(0, 65)">
    <rect x="15" y="0" width="28" height="190" rx="4" fill="#374151"/>
    <text x="29" y="100" text-anchor="middle" font-size="10" fill="white" font-weight="700" transform="rotate(-90,29,100)">Per-Thread View</text>

    <!-- Thread 0 -->
    <g transform="translate(60, 10)">
      <rect x="0" y="0" width="200" height="80" rx="6" fill="#FFF1F2" stroke="#FECDD3" stroke-width="1"/>
      <text x="100" y="16" text-anchor="middle" font-size="9" font-weight="700" fill="#9F1239">Thread 0</text>

      <!-- W -->
      <rect x="8" y="24" width="40" height="44" rx="3" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1"/>
      <text x="28" y="42" text-anchor="middle" font-size="8" font-weight="600" fill="#1E40AF">W</text>
      <text x="28" y="54" text-anchor="middle" font-size="6.5" fill="#3B82F6">M&#xD7;K</text>

      <text x="54" y="50" text-anchor="middle" font-size="12" fill="#6B7280">&#xD7;</text>

      <!-- input_0 -->
      <rect x="62" y="30" width="18" height="38" rx="2" fill="#D1FAE5" stroke="#10B981" stroke-width="1"/>
      <text x="71" y="52" text-anchor="middle" font-size="6.5" fill="#065F46">in0</text>
      <text x="71" y="26" text-anchor="middle" font-size="6" fill="#10B981">K</text>

      <text x="88" y="50" text-anchor="middle" font-size="10" fill="#6B7280">=</text>

      <!-- output_0 -->
      <rect x="96" y="30" width="18" height="38" rx="2" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1"/>
      <text x="105" y="52" text-anchor="middle" font-size="6" fill="#92400E">out0</text>
      <text x="105" y="26" text-anchor="middle" font-size="6" fill="#F59E0B">M</text>

      <text x="160" y="50" text-anchor="middle" font-size="7.5" fill="#6B7280" font-style="italic">out0 = W*in0</text>
    </g>

    <!-- Thread 1 -->
    <g transform="translate(275, 10)">
      <rect x="0" y="0" width="200" height="80" rx="6" fill="#FFF1F2" stroke="#FECDD3" stroke-width="1"/>
      <text x="100" y="16" text-anchor="middle" font-size="9" font-weight="700" fill="#9F1239">Thread 1</text>

      <rect x="8" y="24" width="40" height="44" rx="3" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1"/>
      <text x="28" y="42" text-anchor="middle" font-size="8" font-weight="600" fill="#1E40AF">W</text>
      <text x="28" y="54" text-anchor="middle" font-size="6.5" fill="#3B82F6">M&#xD7;K</text>

      <text x="54" y="50" text-anchor="middle" font-size="12" fill="#6B7280">&#xD7;</text>

      <rect x="62" y="30" width="18" height="38" rx="2" fill="#D1FAE5" stroke="#10B981" stroke-width="1"/>
      <text x="71" y="52" text-anchor="middle" font-size="6.5" fill="#065F46">in1</text>
      <text x="71" y="26" text-anchor="middle" font-size="6" fill="#10B981">K</text>

      <text x="88" y="50" text-anchor="middle" font-size="10" fill="#6B7280">=</text>

      <rect x="96" y="30" width="18" height="38" rx="2" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1"/>
      <text x="105" y="52" text-anchor="middle" font-size="6" fill="#92400E">out1</text>
      <text x="105" y="26" text-anchor="middle" font-size="6" fill="#F59E0B">M</text>

      <text x="160" y="50" text-anchor="middle" font-size="7.5" fill="#6B7280" font-style="italic">out1 = W*in1</text>
    </g>

    <!-- ... -->
    <text x="492" y="55" text-anchor="middle" font-size="16" fill="#9CA3AF">...</text>

    <!-- Thread N-1 -->
    <g transform="translate(520, 10)">
      <rect x="0" y="0" width="210" height="80" rx="6" fill="#FFF1F2" stroke="#FECDD3" stroke-width="1"/>
      <text x="105" y="16" text-anchor="middle" font-size="9" font-weight="700" fill="#9F1239">Thread N-1</text>

      <rect x="8" y="24" width="40" height="44" rx="3" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1"/>
      <text x="28" y="42" text-anchor="middle" font-size="8" font-weight="600" fill="#1E40AF">W</text>
      <text x="28" y="54" text-anchor="middle" font-size="6.5" fill="#3B82F6">M&#xD7;K</text>

      <text x="54" y="50" text-anchor="middle" font-size="12" fill="#6B7280">&#xD7;</text>

      <rect x="62" y="30" width="18" height="38" rx="2" fill="#D1FAE5" stroke="#10B981" stroke-width="1"/>
      <text x="71" y="52" text-anchor="middle" font-size="6" fill="#065F46">inN</text>
      <text x="71" y="26" text-anchor="middle" font-size="6" fill="#10B981">K</text>

      <text x="88" y="50" text-anchor="middle" font-size="10" fill="#6B7280">=</text>

      <rect x="96" y="30" width="18" height="38" rx="2" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1"/>
      <text x="105" y="52" text-anchor="middle" font-size="6" fill="#92400E">outN</text>
      <text x="105" y="26" text-anchor="middle" font-size="6" fill="#F59E0B">M</text>

      <text x="165" y="50" text-anchor="middle" font-size="7" fill="#6B7280" font-style="italic">outN = W*inN</text>
    </g>

    <!-- Annotation: same W -->
    <g transform="translate(755, 10)">
      <rect x="0" y="0" width="180" height="80" rx="6" fill="#F0F9FF" stroke="#BAE6FD" stroke-width="1"/>
      <text x="90" y="18" text-anchor="middle" font-size="9" font-weight="700" fill="#0369A1">Key Observation</text>
      <text x="90" y="36" text-anchor="middle" font-size="8.5" fill="#0369A1">All threads share the</text>
      <text x="90" y="50" text-anchor="middle" font-size="8.5" fill="#0369A1">same W, but each has</text>
      <text x="90" y="64" text-anchor="middle" font-size="8.5" fill="#0369A1">its own input and output</text>
    </g>

    <!-- N independent mat-vec label -->
    <text x="480" y="108" text-anchor="middle" font-size="10" fill="#6B7280">N independent matrix-vector multiplications (N = warp size = 32)</text>

    <!-- Brace / arrow down -->
    <text x="480" y="138" text-anchor="middle" font-size="14" font-weight="700" fill="#8B5CF6">Batch into one operation!</text>
    <line x1="480" y1="145" x2="480" y2="170" stroke="#8B5CF6" stroke-width="2" marker-end="url(#arrowPurple)"/>
  </g>

  <!-- ================================================================ -->
  <!-- BOTTOM: Batched matrix-matrix view                               -->
  <!-- ================================================================ -->
  <g transform="translate(0, 250)">
    <rect x="15" y="0" width="28" height="250" rx="4" fill="#8B5CF6"/>
    <text x="29" y="130" text-anchor="middle" font-size="10" fill="white" font-weight="700" transform="rotate(-90,29,130)">Batched Warp View</text>

    <!-- W matrix -->
    <g transform="translate(80, 20)">
      <rect x="0" y="0" width="120" height="120" rx="4" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
      <text x="60" y="55" text-anchor="middle" font-size="14" font-weight="700" fill="#1E40AF">W</text>
      <text x="60" y="75" text-anchor="middle" font-size="10" fill="#3B82F6">[M &#xD7; K]</text>
      <text x="-10" y="64" text-anchor="middle" font-size="10" fill="#1E40AF" font-weight="600" transform="rotate(-90,-10,64)">M</text>
      <text x="60" y="-6" text-anchor="middle" font-size="10" fill="#1E40AF" font-weight="600">K</text>
      <text x="60" y="140" text-anchor="middle" font-size="9" fill="#3B82F6" font-weight="600">Shared by all threads</text>
    </g>

    <!-- x symbol -->
    <text x="222" y="86" text-anchor="middle" font-size="22" fill="#6B7280" font-weight="300">&#xD7;</text>

    <!-- Input matrix: columns are per-thread vectors -->
    <g transform="translate(250, 20)">
      <rect x="0" y="0" width="160" height="120" rx="4" fill="#D1FAE5" stroke="#10B981" stroke-width="1.5"/>
      <!-- Column dividers -->
      <line x1="32" y1="0" x2="32" y2="120" stroke="#10B981" stroke-width="0.5" stroke-dasharray="3,2"/>
      <line x1="64" y1="0" x2="64" y2="120" stroke="#10B981" stroke-width="0.5" stroke-dasharray="3,2"/>
      <line x1="96" y1="0" x2="96" y2="120" stroke="#10B981" stroke-width="0.5" stroke-dasharray="3,2"/>
      <line x1="128" y1="0" x2="128" y2="120" stroke="#10B981" stroke-width="0.5" stroke-dasharray="3,2"/>
      <!-- Column labels -->
      <text x="16" y="-14" text-anchor="middle" font-size="7" fill="#065F46">T0</text>
      <text x="48" y="-14" text-anchor="middle" font-size="7" fill="#065F46">T1</text>
      <text x="80" y="-14" text-anchor="middle" font-size="7" fill="#9CA3AF">...</text>
      <text x="144" y="-14" text-anchor="middle" font-size="7" fill="#065F46">Tn</text>
      <!-- Content -->
      <text x="16" y="30" text-anchor="middle" font-size="8" fill="#065F46">in0</text>
      <text x="48" y="30" text-anchor="middle" font-size="8" fill="#065F46">in1</text>
      <text x="80" y="30" text-anchor="middle" font-size="7" fill="#9CA3AF">...</text>
      <text x="144" y="30" text-anchor="middle" font-size="8" fill="#065F46">inN</text>
      <!-- Dimension labels -->
      <text x="-10" y="64" text-anchor="middle" font-size="10" fill="#065F46" font-weight="600" transform="rotate(-90,-10,64)">K</text>
      <text x="80" y="-6" text-anchor="middle" font-size="10" fill="#065F46" font-weight="600">N (warp size)</text>
      <text x="80" y="140" text-anchor="middle" font-size="9" fill="#065F46" font-weight="600">Each col = one thread's input</text>
    </g>

    <!-- = symbol -->
    <text x="432" y="86" text-anchor="middle" font-size="22" fill="#6B7280" font-weight="300">=</text>

    <!-- Output matrix: columns are per-thread outputs -->
    <g transform="translate(460, 20)">
      <rect x="0" y="0" width="160" height="120" rx="4" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
      <!-- Column dividers -->
      <line x1="32" y1="0" x2="32" y2="120" stroke="#F59E0B" stroke-width="0.5" stroke-dasharray="3,2"/>
      <line x1="64" y1="0" x2="64" y2="120" stroke="#F59E0B" stroke-width="0.5" stroke-dasharray="3,2"/>
      <line x1="96" y1="0" x2="96" y2="120" stroke="#F59E0B" stroke-width="0.5" stroke-dasharray="3,2"/>
      <line x1="128" y1="0" x2="128" y2="120" stroke="#F59E0B" stroke-width="0.5" stroke-dasharray="3,2"/>
      <!-- Column labels -->
      <text x="16" y="-14" text-anchor="middle" font-size="7" fill="#92400E">T0</text>
      <text x="48" y="-14" text-anchor="middle" font-size="7" fill="#92400E">T1</text>
      <text x="80" y="-14" text-anchor="middle" font-size="7" fill="#9CA3AF">...</text>
      <text x="144" y="-14" text-anchor="middle" font-size="7" fill="#92400E">Tn</text>
      <!-- Content -->
      <text x="16" y="30" text-anchor="middle" font-size="7" fill="#92400E">out0</text>
      <text x="48" y="30" text-anchor="middle" font-size="7" fill="#92400E">out1</text>
      <text x="80" y="30" text-anchor="middle" font-size="7" fill="#9CA3AF">...</text>
      <text x="144" y="30" text-anchor="middle" font-size="7" fill="#92400E">outN</text>
      <!-- Dimension labels -->
      <text x="-10" y="64" text-anchor="middle" font-size="10" fill="#92400E" font-weight="600" transform="rotate(-90,-10,64)">M</text>
      <text x="80" y="-6" text-anchor="middle" font-size="10" fill="#92400E" font-weight="600">N (warp size)</text>
      <text x="80" y="140" text-anchor="middle" font-size="9" fill="#92400E" font-weight="600">Each col = one thread's output</text>
    </g>

    <!-- Annotation box -->
    <g transform="translate(660, 15)">
      <rect x="0" y="0" width="270" height="155" rx="8" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="1.5"/>
      <text x="135" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#5B21B6">Batched as Matrix Multiply</text>
      <line x1="15" y1="30" x2="255" y2="30" stroke="#DDD6FE" stroke-width="0.8"/>

      <text x="135" y="50" text-anchor="middle" font-size="10" fill="#5B21B6" font-family="'Courier New', monospace">Out[M&#xD7;N] = W[M&#xD7;K] &#xD7; In[K&#xD7;N]</text>

      <text x="15" y="74" text-anchor="start" font-size="9" fill="#6B7280">N mat-vec multiplies become</text>
      <text x="15" y="88" text-anchor="start" font-size="9" fill="#6B7280">1 mat-mat multiply, which maps</text>
      <text x="15" y="102" text-anchor="start" font-size="9" fill="#6B7280">perfectly to cooperative matrix</text>
      <text x="15" y="116" text-anchor="start" font-size="9" fill="#6B7280">hardware (16&#xD7;16 tile MMA).</text>

    </g>

    <!-- Equation at bottom -->
    <g transform="translate(80, 190)">
      <rect x="0" y="0" width="540" height="40" rx="6" fill="#FFF7ED" stroke="#FDBA74" stroke-width="1"/>
      <text x="270" y="16" text-anchor="middle" font-size="10" font-weight="600" fill="#9A3412">Column j of Output = W &#xD7; column j of Input = W &#xD7; input_j = output_j</text>
      <text x="270" y="32" text-anchor="middle" font-size="9" fill="#9A3412">Each column is independent &#x2192; naturally parallel across threads in a warp</text>
    </g>
  </g>
</svg>
