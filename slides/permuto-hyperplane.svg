<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 700" font-family="'Segoe UI', system-ui, Arial, sans-serif">
  <defs>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#6B7280"/>
    </marker>
  </defs>

  <rect width="960" height="700" fill="white" rx="8"/>

  <!-- TITLE -->
  <text x="480" y="28" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Part 2: How to Map Points to Permutohedral Coordinates</text>
  <text x="480" y="48" text-anchor="middle" font-size="11" fill="#6B7280">Embed the 2D input (x, y) onto the 3D hyperplane a + b + c = 0, then use (a, b, c) as coordinates</text>

  <!-- ================================================================ -->
  <!-- LEFT PANEL: The idea + why it works                              -->
  <!-- ================================================================ -->
  <g transform="translate(10, 65)">
    <rect x="0" y="0" width="460" height="425" rx="8" fill="#FDF4FF" stroke="#A855F7" stroke-width="1.2"/>
    <text x="230" y="24" text-anchor="middle" font-size="14" font-weight="700" fill="#5B21B6">Map (x, y) onto the Hyperplane a+b+c = 0</text>
    <line x1="20" y1="34" x2="440" y2="34" stroke="#E9D5FF" stroke-width="0.8"/>

    <!-- The core idea -->
    <g transform="translate(20, 46)">
      <rect x="0" y="0" width="420" height="70" rx="6" fill="#F3E8FF" stroke="#A855F7" stroke-width="0.8"/>
      <text x="210" y="18" text-anchor="middle" font-size="10.5" fill="#5B21B6" font-weight="700">The idea:</text>
      <text x="210" y="36" text-anchor="middle" font-size="10" fill="#374151">Take a 2D point (x, y) and express it as a 3D point</text>
      <text x="210" y="52" text-anchor="middle" font-size="10" fill="#374151">(a, b, c) that lies on the plane a + b + c = 0.</text>
    </g>

    <!-- Why this plane? -->
    <text x="20" y="140" font-size="11" fill="#5B21B6" font-weight="700">Why does this plane give us permutohedral coordinates?</text>

    <!-- Reason 1 -->
    <g transform="translate(20, 156)">
      <circle cx="12" cy="12" r="12" fill="#E9D5FF" stroke="#A855F7" stroke-width="0.8"/>
      <text x="12" y="16" text-anchor="middle" font-size="10" fill="#5B21B6" font-weight="700">1</text>
      <text x="32" y="10" font-size="10" fill="#374151" font-weight="600">It's still 2D (no information lost)</text>
      <text x="32" y="26" font-size="9" fill="#6B7280">3 coordinates minus 1 constraint (a+b+c=0) = 2 free dimensions.</text>
      <text x="32" y="40" font-size="9" fill="#6B7280">Same amount of information as the original (x, y).</text>
    </g>

    <!-- Reason 2 -->
    <g transform="translate(20, 210)">
      <circle cx="12" cy="12" r="12" fill="#E9D5FF" stroke="#A855F7" stroke-width="0.8"/>
      <text x="12" y="16" text-anchor="middle" font-size="10" fill="#5B21B6" font-weight="700">2</text>
      <text x="32" y="10" font-size="10" fill="#374151" font-weight="600">Integer points form a triangular lattice</text>
      <text x="32" y="26" font-size="9" fill="#6B7280">Points with integer (a, b, c) on this plane are exactly the</text>
      <text x="32" y="40" font-size="9" fill="#6B7280">triangular grid vertices from Part 1 Panel C.</text>
    </g>

    <!-- Reason 3 -->
    <g transform="translate(20, 264)">
      <circle cx="12" cy="12" r="12" fill="#E9D5FF" stroke="#A855F7" stroke-width="0.8"/>
      <text x="12" y="16" text-anchor="middle" font-size="10" fill="#5B21B6" font-weight="700">3</text>
      <text x="32" y="10" font-size="10" fill="#374151" font-weight="600">3 symmetric axes at 120&#xB0;</text>
      <text x="32" y="26" font-size="9" fill="#6B7280">No axis is special. Simplex vertices are permutations of</text>
      <text x="32" y="40" font-size="9" fill="#6B7280">each other (that's the "permuto" in permutohedral).</text>
    </g>

    <!-- Reason 4 -->
    <g transform="translate(20, 318)">
      <circle cx="12" cy="12" r="12" fill="#E9D5FF" stroke="#A855F7" stroke-width="0.8"/>
      <text x="12" y="16" text-anchor="middle" font-size="10" fill="#5B21B6" font-weight="700">4</text>
      <text x="32" y="10" font-size="10" fill="#374151" font-weight="600">floor + sort works on these coordinates</text>
      <text x="32" y="26" font-size="9" fill="#6B7280">Because vertices are at integers, floor finds the base vertex</text>
      <text x="32" y="40" font-size="9" fill="#6B7280">and sorting remainders identifies the enclosing simplex.</text>
    </g>

    <!-- Summary -->
    <g transform="translate(20, 374)">
      <rect x="0" y="0" width="420" height="38" rx="5" fill="#F3E8FF" stroke="#A855F7" stroke-width="0.8"/>
      <text x="210" y="15" text-anchor="middle" font-size="9.5" fill="#5B21B6" font-weight="700">The hyperplane a+b+c=0 is the natural home for permutohedral coords.</text>
      <text x="210" y="31" text-anchor="middle" font-size="9" fill="#7E22CE">We just need a way to map (x, y) onto it. That's the elevation matrix E.</text>
    </g>
  </g>


  <!-- ================================================================ -->
  <!-- RIGHT PANEL: The Elevation Matrix                                -->
  <!-- ================================================================ -->
  <g transform="translate(490, 65)">
    <rect x="0" y="0" width="460" height="425" rx="8" fill="#FFFBEB" stroke="#F59E0B" stroke-width="1.2"/>
    <text x="230" y="24" text-anchor="middle" font-size="14" font-weight="700" fill="#92400E">The Elevation Matrix E</text>
    <line x1="20" y1="34" x2="440" y2="34" stroke="#FDE68A" stroke-width="0.8"/>

    <!-- Flow: (x,y) -> E -> (a,b,c) -->
    <g transform="translate(20, 48)">
      <rect x="0" y="0" width="110" height="40" rx="6" fill="#D1FAE5" stroke="#10B981" stroke-width="1"/>
      <text x="55" y="18" text-anchor="middle" font-size="11" fill="#065F46" font-weight="700">Input (x, y)</text>
      <text x="55" y="32" text-anchor="middle" font-size="8.5" fill="#059669">2D point</text>

      <line x1="116" y1="20" x2="155" y2="20" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arrowGray)"/>
      <text x="135" y="14" text-anchor="middle" font-size="8" fill="#92400E" font-weight="700">&#xD7; E</text>

      <rect x="160" y="0" width="250" height="40" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1"/>
      <text x="285" y="18" text-anchor="middle" font-size="11" fill="#1E40AF" font-weight="700">Elevated (a, b, c)</text>
      <text x="285" y="32" text-anchor="middle" font-size="8.5" fill="#3B82F6">on hyperplane, a + b + c = 0</text>
    </g>

    <!-- What is E? -->
    <g transform="translate(20, 105)">
      <text x="0" y="14" font-size="11" fill="#92400E" font-weight="700">What is E?</text>
      <text x="0" y="32" font-size="9.5" fill="#374151">E is a 3&#xD7;2 matrix. Its two columns e&#x2081; and e&#x2082; are</text>
      <text x="0" y="48" font-size="9.5" fill="#374151">basis vectors that lie ON the hyperplane.</text>
    </g>

    <!-- The matrix -->
    <g transform="translate(40, 165)">
      <path d="M0,0 L-7,0 L-7,60 L0,60" fill="none" stroke="#374151" stroke-width="1.5"/>
      <path d="M170,0 L177,0 L177,60 L170,60" fill="none" stroke="#374151" stroke-width="1.5"/>

      <text x="50" y="-6" text-anchor="middle" font-size="9" fill="#1E40AF" font-weight="700">e&#x2081;</text>
      <text x="128" y="-6" text-anchor="middle" font-size="9" fill="#065F46" font-weight="700">e&#x2082;</text>
      <text x="185" y="16" font-size="8.5" fill="#6B7280">a</text>
      <text x="185" y="36" font-size="8.5" fill="#6B7280">b</text>
      <text x="185" y="56" font-size="8.5" fill="#6B7280">c</text>

      <text x="50" y="16" text-anchor="middle" font-size="12" fill="#1E40AF" font-family="'Courier New', monospace"> 1/&#x221A;2</text>
      <text x="128" y="16" text-anchor="middle" font-size="12" fill="#065F46" font-family="'Courier New', monospace"> 1/&#x221A;6</text>
      <text x="50" y="36" text-anchor="middle" font-size="12" fill="#1E40AF" font-family="'Courier New', monospace">-1/&#x221A;2</text>
      <text x="128" y="36" text-anchor="middle" font-size="12" fill="#065F46" font-family="'Courier New', monospace"> 1/&#x221A;6</text>
      <text x="50" y="56" text-anchor="middle" font-size="12" fill="#1E40AF" font-family="'Courier New', monospace">   0  </text>
      <text x="128" y="56" text-anchor="middle" font-size="12" fill="#065F46" font-family="'Courier New', monospace">-2/&#x221A;6</text>

      <text x="220" y="28" font-size="10" fill="#374151">(a, b, c) = x &#xB7; e&#x2081; + y &#xB7; e&#x2082;</text>
    </g>

    <!-- Key property: columns sum to 0 -->
    <g transform="translate(20, 246)">
      <rect x="0" y="0" width="420" height="62" rx="5" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="0.8"/>
      <text x="12" y="18" font-size="10" fill="#1E40AF" font-weight="700">Key property: each column sums to zero</text>
      <text x="22" y="36" font-size="9.5" fill="#3B82F6" font-family="'Courier New', monospace">e&#x2081;:  1/&#x221A;2 + (-1/&#x221A;2) + 0    = 0  &#x2713;</text>
      <text x="22" y="52" font-size="9.5" fill="#10B981" font-family="'Courier New', monospace">e&#x2082;:  1/&#x221A;6 +   1/&#x221A;6  - 2/&#x221A;6 = 0  &#x2713;</text>
    </g>

    <!-- Implication -->
    <g transform="translate(20, 320)">
      <text x="0" y="14" font-size="9.5" fill="#374151">Since each column sums to 0, any combination x&#xB7;e&#x2081; + y&#xB7;e&#x2082;</text>
      <text x="0" y="30" font-size="9.5" fill="#374151">also sums to 0. So the output (a, b, c) is</text>
      <text x="0" y="46" font-size="9.5" fill="#92400E" font-weight="700">guaranteed to be on the hyperplane a + b + c = 0.</text>
    </g>

    <!-- Summary -->
    <g transform="translate(20, 378)">
      <rect x="0" y="0" width="420" height="32" rx="5" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1"/>
      <text x="210" y="21" text-anchor="middle" font-size="10" fill="#92400E" font-weight="700">Elevation = re-expressing (x, y) in the hyperplane's coordinate system</text>
    </g>
  </g>

  <!-- ================================================================ -->
  <!-- PSEUDOCODE: permutoElevate only (from permuto-encoder.slang)     -->
  <!-- ================================================================ -->
  <g transform="translate(10, 505)">
    <rect x="0" y="0" width="940" height="185" rx="8" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1.2"/>
    <text x="470" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#374151">Implementation: permutoElevate (from permuto-encoder.slang)</text>
    <line x1="20" y1="32" x2="920" y2="32" stroke="#E5E7EB" stroke-width="0.8"/>

    <!-- Pseudocode -->
    <g transform="translate(30, 44)">
      <text x="0" y="14" font-size="9.5" fill="#A855F7" font-family="'Courier New', monospace" font-weight="700">permutoElevate(pos[D], scale, out elevated[D+1]):</text>
      <text x="23" y="34" font-size="9.5" fill="#374151" font-family="'Courier New', monospace">sum = 0</text>
      <text x="23" y="50" font-size="9.5" fill="#374151" font-family="'Courier New', monospace">for dim = D-1 down to 0:</text>
      <text x="46" y="66" font-size="9.5" fill="#374151" font-family="'Courier New', monospace">cf = pos[dim] * scale[dim]</text>
      <text x="46" y="82" font-size="9.5" fill="#3B82F6" font-family="'Courier New', monospace" font-weight="600">elevated[dim+1] = sum - (dim+1) * cf</text>
      <text x="46" y="98" font-size="9.5" fill="#374151" font-family="'Courier New', monospace">sum += cf</text>
      <text x="23" y="114" font-size="9.5" fill="#3B82F6" font-family="'Courier New', monospace" font-weight="600">elevated[0] = sum</text>
    </g>

    <!-- Annotations -->
    <g transform="translate(540, 44)">
      <rect x="0" y="0" width="370" height="55" rx="5" fill="#F3E8FF" stroke="#A855F7" stroke-width="0.6"/>
      <text x="12" y="16" font-size="9" fill="#5B21B6" font-weight="700">This implements the matrix E as a running sum:</text>
      <text x="12" y="34" font-size="9" fill="#6B7280">Each elevated[dim] is a linear combination of the inputs,</text>
      <text x="12" y="50" font-size="9" fill="#6B7280">computed incrementally. The result always sums to 0.</text>
    </g>
    <g transform="translate(540, 108)">
      <rect x="0" y="0" width="370" height="40" rx="5" fill="#FEF3C7" stroke="#F59E0B" stroke-width="0.6"/>
      <text x="12" y="16" font-size="9" fill="#92400E" font-weight="700">After this step, the point is in permutohedral coords.</text>
      <text x="12" y="32" font-size="9" fill="#B45309">Then floor + sort (Part 1 Panel D) finds the simplex.</text>
    </g>
  </g>

</svg>
