<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 340" font-family="'Segoe UI', system-ui, Arial, sans-serif">
  <defs>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#6B7280"/>
    </marker>
  </defs>

  <rect width="960" height="340" fill="white" rx="8"/>

  <!-- TITLE -->
  <text x="480" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#111827">outerProductAccumulate: Cooperative Matrix Tiled Implementation</text>
  <text x="480" y="50" text-anchor="middle" font-size="11" fill="#6B7280">dW[M&#xD7;K] = dOut_matrix[M&#xD7;N] &#xD7; input_matrix[N&#xD7;K].  Iterate over N (warp size) in steps of 16.</text>

  <!-- Tiled diagram -->
  <g transform="translate(55, 95)">
    <!-- dOut as MatA tiles -->
    <g>
      <text x="28" y="-5" text-anchor="middle" font-size="10" font-weight="600" fill="#9F1239">MatA (dOut)</text>
      <rect x="0" y="4" width="55" height="55" rx="3" fill="#FFE4E6" stroke="#EF4444" stroke-width="1.2"/>
      <text x="27" y="30" text-anchor="middle" font-size="9" fill="#9F1239" font-weight="600">A[0]</text>
      <text x="27" y="47" text-anchor="middle" font-size="7" fill="#EF4444">16&#xD7;16</text>
      <rect x="0" y="63" width="55" height="55" rx="3" fill="#FFE4E6" stroke="#EF4444" stroke-width="1.2"/>
      <text x="27" y="89" text-anchor="middle" font-size="9" fill="#9F1239" font-weight="600">A[1]</text>
      <text x="27" y="106" text-anchor="middle" font-size="7" fill="#EF4444">16&#xD7;16</text>
      <text x="-12" y="62" text-anchor="middle" font-size="9" fill="#EF4444" font-weight="600" transform="rotate(-90,-12,62)">M=32</text>
      <text x="27" y="132" text-anchor="middle" font-size="8" fill="#9CA3AF">col-major in shA</text>
    </g>

    <!-- x symbol -->
    <text x="77" y="65" text-anchor="middle" font-size="18" fill="#6B7280">&#xD7;</text>

    <!-- input as MatB tiles -->
    <g transform="translate(95, 0)">
      <text x="57" y="-5" text-anchor="middle" font-size="10" font-weight="600" fill="#065F46">MatB (input)</text>
      <rect x="0" y="4" width="55" height="55" rx="3" fill="#D1FAE5" stroke="#10B981" stroke-width="1.2"/>
      <text x="27" y="30" text-anchor="middle" font-size="9" fill="#065F46" font-weight="600">B[0]</text>
      <text x="27" y="47" text-anchor="middle" font-size="7" fill="#10B981">16&#xD7;16</text>
      <rect x="59" y="4" width="55" height="55" rx="3" fill="#D1FAE5" stroke="#10B981" stroke-width="1.2"/>
      <text x="86" y="30" text-anchor="middle" font-size="9" fill="#065F46" font-weight="600">B[1]</text>
      <text x="86" y="47" text-anchor="middle" font-size="7" fill="#10B981">16&#xD7;16</text>
      <text x="57" y="73" text-anchor="middle" font-size="8" fill="#9CA3AF">row-major in shB</text>
      <text x="57" y="85" text-anchor="middle" font-size="9" fill="#10B981" font-weight="600">K=32</text>
    </g>

    <!-- arrow -->
    <text x="240" y="65" text-anchor="middle" font-size="18" fill="#6B7280">&#x2192;</text>

    <!-- dW result as MatC tiles (M x K) -->
    <g transform="translate(260, 0)">
      <text x="57" y="-5" text-anchor="middle" font-size="10" font-weight="600" fill="#5B21B6">MatC (dW)</text>
      <rect x="0" y="4" width="55" height="55" rx="3" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.2"/>
      <text x="27" y="26" text-anchor="middle" font-size="7.5" fill="#5B21B6" font-weight="600">C[0,0]</text>
      <text x="27" y="43" text-anchor="middle" font-size="7" fill="#8B5CF6">+= A0&#xD7;B0</text>
      <rect x="59" y="4" width="55" height="55" rx="3" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.2"/>
      <text x="86" y="26" text-anchor="middle" font-size="7.5" fill="#5B21B6" font-weight="600">C[0,1]</text>
      <text x="86" y="43" text-anchor="middle" font-size="7" fill="#8B5CF6">+= A0&#xD7;B1</text>
      <rect x="0" y="63" width="55" height="55" rx="3" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.2"/>
      <text x="27" y="85" text-anchor="middle" font-size="7.5" fill="#5B21B6" font-weight="600">C[1,0]</text>
      <text x="27" y="102" text-anchor="middle" font-size="7" fill="#8B5CF6">+= A1&#xD7;B0</text>
      <rect x="59" y="63" width="55" height="55" rx="3" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.2"/>
      <text x="86" y="85" text-anchor="middle" font-size="7.5" fill="#5B21B6" font-weight="600">C[1,1]</text>
      <text x="86" y="102" text-anchor="middle" font-size="7" fill="#8B5CF6">+= A1&#xD7;B1</text>
      <text x="57" y="132" text-anchor="middle" font-size="9" fill="#8B5CF6" font-weight="600">M &#xD7; K</text>
    </g>
  </g>

  <!-- Algorithm pseudocode -->
  <g transform="translate(510, 70)">
    <rect x="0" y="0" width="410" height="155" rx="8" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>
    <text x="205" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">Algorithm (per warp)</text>
    <line x1="15" y1="30" x2="395" y2="30" stroke="#E5E7EB" stroke-width="0.8"/>

    <text x="15" y="48" font-size="10.5" fill="#374151" font-family="'Courier New', monospace">matC[...].fill(0)</text>
    <text x="15" y="66" font-size="10.5" fill="#374151" font-family="'Courier New', monospace">for n = 0 to N step 16:</text>
    <text x="30" y="82" font-size="10.5" fill="#EF4444" font-family="'Courier New', monospace">  load dOut &#x2192; MatA tiles (col-major)</text>
    <text x="30" y="98" font-size="10.5" fill="#10B981" font-family="'Courier New', monospace">  load input &#x2192; MatB tiles (row-major)</text>
    <text x="30" y="114" font-size="10.5" fill="#8B5CF6" font-family="'Courier New', monospace">  MatC[i,j] += MatA[i] &#xD7; MatB[j]</text>
    <text x="15" y="134" font-size="10.5" fill="#4B5563" font-family="'Courier New', monospace">sumReduceTiles(matC)  // cross-warp</text>
    <text x="15" y="150" font-size="10.5" fill="#4B5563" font-family="'Courier New', monospace">warp0: atomicAdd(dW_global, matC)</text>
  </g>

  <!-- Note about shared dimension -->
  <g transform="translate(55, 260)">
    <rect x="0" y="0" width="860" height="55" rx="6" fill="#F0F9FF" stroke="#BAE6FD" stroke-width="1"/>
    <text x="430" y="18" text-anchor="middle" font-size="10" font-weight="600" fill="#0369A1">Key difference from MMA forward: shared dimension = N (warp size), not K</text>
    <text x="430" y="34" text-anchor="middle" font-size="9" fill="#0369A1">dOut loaded col-major into MatA (each column = 16 threads' values for one output element)</text>
    <text x="430" y="48" text-anchor="middle" font-size="9" fill="#0369A1">input loaded row-major into MatB (each row = 16 threads' values for one input element)</text>
  </g>
</svg>
