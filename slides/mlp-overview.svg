<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720" font-family="'Segoe UI', system-ui, Arial, sans-serif">
  <defs>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#6B7280"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#3B82F6"/>
    </marker>
  </defs>

  <rect width="960" height="720" fill="white" rx="8"/>

  <!-- TITLE -->
  <text x="480" y="28" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">MLP with Slang Neural Building Blocks</text>
  <text x="480" y="48" text-anchor="middle" font-size="11" fill="#6B7280">FFLayer&lt;T, InputVector, OutputVector, Layout, Activation&gt;  composable with different vector and address types</text>

  <!-- ================================================================ -->
  <!-- MLP ARCHITECTURE (top)                                           -->
  <!-- ================================================================ -->
  <g transform="translate(30, 70)">
    <rect x="0" y="0" width="900" height="120" rx="8" fill="#F0F9FF" stroke="#BAE6FD" stroke-width="1"/>
    <text x="450" y="20" text-anchor="middle" font-size="13" font-weight="700" fill="#0369A1">MLP Forward:  input &#x2192; Layer 1 &#x2192; Layer 2 &#x2192; ... &#x2192; output</text>

    <!-- Input -->
    <g transform="translate(30, 38)">
      <rect x="0" y="0" width="80" height="60" rx="6" fill="#D1FAE5" stroke="#10B981" stroke-width="1.5"/>
      <text x="40" y="24" text-anchor="middle" font-size="10" font-weight="700" fill="#065F46">input</text>
      <text x="40" y="40" text-anchor="middle" font-size="9" fill="#059669">Vector&lt;N0&gt;</text>
      <text x="40" y="52" text-anchor="middle" font-size="8" fill="#6B7280">per thread</text>
    </g>

    <line x1="115" y1="68" x2="145" y2="68" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arrowGray)"/>

    <!-- Layer 1 -->
    <g transform="translate(150, 32)">
      <rect x="0" y="0" width="200" height="72" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
      <text x="100" y="18" text-anchor="middle" font-size="10" font-weight="700" fill="#1E40AF">FFLayer 1</text>
      <text x="100" y="34" text-anchor="middle" font-size="9" fill="#3B82F6">h = Activation( W1 * x + b1 )</text>
      <rect x="8" y="42" width="84" height="18" rx="3" fill="#EFF6FF" stroke="#93C5FD" stroke-width="0.6"/>
      <text x="50" y="55" text-anchor="middle" font-size="7.5" fill="#1E40AF">W1: N1&#xD7;N0</text>
      <rect x="100" y="42" width="48" height="18" rx="3" fill="#EFF6FF" stroke="#93C5FD" stroke-width="0.6"/>
      <text x="124" y="55" text-anchor="middle" font-size="7.5" fill="#1E40AF">b1: N1</text>
      <rect x="156" y="42" width="36" height="18" rx="3" fill="#FEF3C7" stroke="#F59E0B" stroke-width="0.6"/>
      <text x="174" y="55" text-anchor="middle" font-size="7.5" fill="#92400E">Act</text>
    </g>

    <line x1="355" y1="68" x2="385" y2="68" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arrowGray)"/>

    <!-- Hidden -->
    <g transform="translate(390, 38)">
      <rect x="0" y="0" width="60" height="60" rx="6" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1"/>
      <text x="30" y="24" text-anchor="middle" font-size="10" font-weight="700" fill="#5B21B6">h</text>
      <text x="30" y="40" text-anchor="middle" font-size="9" fill="#7C3AED">Vector&lt;N1&gt;</text>
    </g>

    <line x1="455" y1="68" x2="485" y2="68" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arrowGray)"/>

    <!-- Layer 2 -->
    <g transform="translate(490, 32)">
      <rect x="0" y="0" width="200" height="72" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
      <text x="100" y="18" text-anchor="middle" font-size="10" font-weight="700" fill="#1E40AF">FFLayer 2</text>
      <text x="100" y="34" text-anchor="middle" font-size="9" fill="#3B82F6">y = Activation( W2 * h + b2 )</text>
      <rect x="8" y="42" width="84" height="18" rx="3" fill="#EFF6FF" stroke="#93C5FD" stroke-width="0.6"/>
      <text x="50" y="55" text-anchor="middle" font-size="7.5" fill="#1E40AF">W2: N2&#xD7;N1</text>
      <rect x="100" y="42" width="48" height="18" rx="3" fill="#EFF6FF" stroke="#93C5FD" stroke-width="0.6"/>
      <text x="124" y="55" text-anchor="middle" font-size="7.5" fill="#1E40AF">b2: N2</text>
      <rect x="156" y="42" width="36" height="18" rx="3" fill="#FEF3C7" stroke="#F59E0B" stroke-width="0.6"/>
      <text x="174" y="55" text-anchor="middle" font-size="7.5" fill="#92400E">Act</text>
    </g>

    <line x1="695" y1="68" x2="725" y2="68" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arrowGray)"/>

    <!-- Output -->
    <g transform="translate(730, 38)">
      <rect x="0" y="0" width="80" height="60" rx="6" fill="#FFE4E6" stroke="#EF4444" stroke-width="1.5"/>
      <text x="40" y="24" text-anchor="middle" font-size="10" font-weight="700" fill="#9F1239">output</text>
      <text x="40" y="40" text-anchor="middle" font-size="9" fill="#EF4444">Vector&lt;N2&gt;</text>
      <text x="40" y="52" text-anchor="middle" font-size="8" fill="#6B7280">per thread</text>
    </g>

    <!-- Parameters in global memory -->
    <text x="450" y="114" text-anchor="middle" font-size="9" fill="#6B7280">Parameters [W1, b1, W2, b2, ...] stored contiguously in global memory, accessed via IPointerLikeAddress</text>
  </g>

  <!-- ================================================================ -->
  <!-- BUILDING BLOCKS (middle)                                         -->
  <!-- ================================================================ -->
  <line x1="40" y1="205" x2="920" y2="205" stroke="#E5E7EB" stroke-width="1"/>
  <text x="480" y="228" text-anchor="middle" font-size="14" font-weight="700" fill="#374151">Building Blocks: Interfaces and Implementations</text>

  <!-- IVector -->
  <g transform="translate(30, 245)">
    <rect x="0" y="0" width="280" height="185" rx="8" fill="#D1FAE5" stroke="#10B981" stroke-width="1.5"/>
    <text x="140" y="20" text-anchor="middle" font-size="12" font-weight="700" fill="#065F46">IVector&lt;T&gt;</text>
    <text x="140" y="36" text-anchor="middle" font-size="9" fill="#059669">Owns data, provides linearTransform()</text>

    <!-- InlineVector -->
    <g transform="translate(12, 48)">
      <rect x="0" y="0" width="120" height="60" rx="5" fill="#ECFDF5" stroke="#6EE7B7" stroke-width="1"/>
      <text x="60" y="16" text-anchor="middle" font-size="9" font-weight="700" fill="#065F46">InlineVector</text>
      <text x="60" y="30" text-anchor="middle" font-size="8" fill="#059669">T[N] in registers</text>
      <text x="60" y="42" text-anchor="middle" font-size="8" fill="#6B7280">Loop-based matmul</text>
      <text x="60" y="54" text-anchor="middle" font-size="8" fill="#6B7280">Small N, any target</text>
    </g>

    <!-- WaveTangledVector -->
    <g transform="translate(144, 48)">
      <rect x="0" y="0" width="124" height="60" rx="5" fill="#ECFDF5" stroke="#047857" stroke-width="1.2"/>
      <text x="62" y="16" text-anchor="middle" font-size="8.5" font-weight="700" fill="#065F46">WaveTangledVector</text>
      <text x="62" y="30" text-anchor="middle" font-size="8" fill="#059669">Cooperative matrix</text>
      <text x="62" y="42" text-anchor="middle" font-size="8" fill="#6B7280">Shared memory MMA</text>
      <text x="62" y="54" text-anchor="middle" font-size="8" fill="#6B7280">CUDA / SPIR-V</text>
    </g>

    <!-- Key difference -->
    <g transform="translate(12, 118)">
      <rect x="0" y="0" width="256" height="55" rx="4" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="0.6"/>
      <text x="128" y="15" text-anchor="middle" font-size="8.5" fill="#374151" font-weight="600">Same IVector interface, different perf:</text>
      <text x="128" y="30" text-anchor="middle" font-size="8" fill="#6B7280">InlineVector: simple, portable, good for small N</text>
      <text x="128" y="44" text-anchor="middle" font-size="8" fill="#6B7280">WaveTangledVector: fast, uses HW MMA, large N</text>
    </g>
  </g>

  <!-- IPointerLikeAddress -->
  <g transform="translate(340, 245)">
    <rect x="0" y="0" width="280" height="185" rx="8" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5"/>
    <text x="140" y="20" text-anchor="middle" font-size="12" font-weight="700" fill="#5B21B6">IPointerLikeAddress&lt;T&gt;</text>
    <text x="140" y="36" text-anchor="middle" font-size="9" fill="#7C3AED">Points to parameters, supports atomicAdd</text>

    <!-- BindlessAddress -->
    <g transform="translate(12, 48)">
      <rect x="0" y="0" width="120" height="60" rx="5" fill="#F5F3FF" stroke="#DDD6FE" stroke-width="1"/>
      <text x="60" y="16" text-anchor="middle" font-size="9" font-weight="700" fill="#5B21B6">BindlessAddress</text>
      <text x="60" y="30" text-anchor="middle" font-size="8" fill="#7C3AED">Buffer handle + offset</text>
      <text x="60" y="42" text-anchor="middle" font-size="8" fill="#6B7280">RWStructuredBuffer</text>
      <text x="60" y="54" text-anchor="middle" font-size="8" fill="#6B7280">Vulkan / D3D12</text>
    </g>

    <!-- PointerAddress -->
    <g transform="translate(144, 48)">
      <rect x="0" y="0" width="124" height="60" rx="5" fill="#F5F3FF" stroke="#DDD6FE" stroke-width="1"/>
      <text x="62" y="16" text-anchor="middle" font-size="9" font-weight="700" fill="#5B21B6">PointerAddress</text>
      <text x="62" y="30" text-anchor="middle" font-size="8" fill="#7C3AED">Raw T* pointer</text>
      <text x="62" y="42" text-anchor="middle" font-size="8" fill="#6B7280">Direct memory</text>
      <text x="62" y="54" text-anchor="middle" font-size="8" fill="#6B7280">CUDA</text>
    </g>

    <!-- Key difference -->
    <g transform="translate(12, 118)">
      <rect x="0" y="0" width="256" height="55" rx="4" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="0.6"/>
      <text x="128" y="15" text-anchor="middle" font-size="8.5" fill="#374151" font-weight="600">Same interface, different backends:</text>
      <text x="128" y="30" text-anchor="middle" font-size="8" fill="#6B7280">BindlessAddress: graphics API compatible</text>
      <text x="128" y="44" text-anchor="middle" font-size="8" fill="#6B7280">PointerAddress: CUDA raw pointers, lowest overhead</text>
    </g>
  </g>

  <!-- IActivation + Layout -->
  <g transform="translate(650, 245)">
    <rect x="0" y="0" width="280" height="185" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
    <text x="140" y="20" text-anchor="middle" font-size="12" font-weight="700" fill="#92400E">Other Interfaces</text>

    <!-- IActivation -->
    <g transform="translate(12, 38)">
      <rect x="0" y="0" width="256" height="62" rx="5" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1"/>
      <text x="128" y="16" text-anchor="middle" font-size="10" font-weight="700" fill="#92400E">IActivation&lt;T&gt;</text>
      <text x="40" y="34" text-anchor="middle" font-size="8.5" fill="#B45309">ReLU</text>
      <text x="95" y="34" text-anchor="middle" font-size="8.5" fill="#B45309">LeakyReLU</text>
      <text x="160" y="34" text-anchor="middle" font-size="8.5" fill="#B45309">Sigmoid</text>
      <text x="220" y="34" text-anchor="middle" font-size="8.5" fill="#B45309">Identity</text>
      <text x="128" y="52" text-anchor="middle" font-size="8" fill="#6B7280">All differentiable, applied element-wise</text>
    </g>

    <!-- IStorageLayout -->
    <g transform="translate(12, 110)">
      <rect x="0" y="0" width="256" height="62" rx="5" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1"/>
      <text x="128" y="16" text-anchor="middle" font-size="10" font-weight="700" fill="#92400E">IStorageLayout</text>
      <text x="128" y="34" text-anchor="middle" font-size="8.5" fill="#B45309">LinearLayout (row-major contiguous)</text>
      <text x="128" y="52" text-anchor="middle" font-size="8" fill="#6B7280">Defines how W and b are packed in memory</text>
    </g>
  </g>

  <!-- ================================================================ -->
  <!-- CONCRETE MLP EXAMPLE (bottom)                                    -->
  <!-- ================================================================ -->
  <line x1="40" y1="450" x2="920" y2="450" stroke="#E5E7EB" stroke-width="1"/>
  <text x="480" y="473" text-anchor="middle" font-size="14" font-weight="700" fill="#374151">Example: 2-Layer MLP (4 &#x2192; 2 &#x2192; 1) with WaveTangledVector on CUDA</text>

  <g transform="translate(30, 488)">
    <!-- Type aliases -->
    <rect x="0" y="0" width="440" height="140" rx="8" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>
    <text x="220" y="20" text-anchor="middle" font-size="11" font-weight="700" fill="#374151">Type Aliases (compile-time configuration)</text>
    <line x1="10" y1="26" x2="430" y2="26" stroke="#E5E7EB" stroke-width="0.8"/>

    <text x="12" y="44" font-size="9.5" fill="#065F46" font-family="'Courier New', monospace" font-weight="600">typealias InVec  = WaveTangledVector&lt;half, ShMem, 4, 32&gt;;</text>
    <text x="12" y="60" font-size="9.5" fill="#065F46" font-family="'Courier New', monospace" font-weight="600">typealias HidVec = WaveTangledVector&lt;half, ShMem, 2, 32&gt;;</text>
    <text x="12" y="76" font-size="9.5" fill="#065F46" font-family="'Courier New', monospace" font-weight="600">typealias OutVec = WaveTangledVector&lt;half, ShMem, 1, 32&gt;;</text>
    <text x="12" y="96" font-size="9.5" fill="#8B5CF6" font-family="'Courier New', monospace" font-weight="600">typealias Addr = PointerAddress&lt;half&gt;;</text>
    <text x="12" y="116" font-size="9.5" fill="#1E40AF" font-family="'Courier New', monospace" font-weight="600">typealias L1 = FFLayer&lt;half, InVec, HidVec, LinearLayout, ReLU&gt;;</text>
    <text x="12" y="132" font-size="9.5" fill="#1E40AF" font-family="'Courier New', monospace" font-weight="600">typealias L2 = FFLayer&lt;half, HidVec, OutVec, LinearLayout, Identity&gt;;</text>
  </g>

  <g transform="translate(490, 488)">
    <!-- Forward code -->
    <rect x="0" y="0" width="440" height="140" rx="8" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>
    <text x="220" y="20" text-anchor="middle" font-size="11" font-weight="700" fill="#374151">Forward Pass (runs per thread, batched by warp)</text>
    <line x1="10" y1="26" x2="430" y2="26" stroke="#E5E7EB" stroke-width="0.8"/>

    <text x="12" y="44" font-size="9.5" fill="#374151" font-family="'Courier New', monospace">let baseAddr = Addr(paramBuffer);</text>
    <text x="12" y="62" font-size="9.5" fill="#374151" font-family="'Courier New', monospace">let w1 = baseAddr.getOffset(0);</text>
    <text x="12" y="78" font-size="9.5" fill="#374151" font-family="'Courier New', monospace">let b1 = baseAddr.getOffset(4*2);  // N1*N0</text>
    <text x="12" y="96" font-size="9.5" fill="#3B82F6" font-family="'Courier New', monospace" font-weight="600">let h = L1().eval(input, w1, b1);  // 4&#x2192;2</text>
    <text x="12" y="114" font-size="9.5" fill="#374151" font-family="'Courier New', monospace">let w2 = baseAddr.getOffset(10);</text>
    <text x="12" y="132" font-size="9.5" fill="#3B82F6" font-family="'Courier New', monospace" font-weight="600">let y = L2().eval(h, w2, b2);      // 2&#x2192;1</text>
  </g>

  <!-- Memory layout at bottom -->
  <g transform="translate(30, 645)">
    <rect x="0" y="0" width="900" height="58" rx="6" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
    <text x="450" y="16" text-anchor="middle" font-size="10" font-weight="600" fill="#1E40AF">Parameter Memory Layout (contiguous, accessed via getOffset)</text>

    <rect x="10" y="24" width="180" height="26" rx="3" fill="#DBEAFE" stroke="#3B82F6" stroke-width="0.8"/>
    <text x="100" y="42" text-anchor="middle" font-size="8.5" fill="#1E40AF" font-weight="600">W1 [2&#xD7;4 = 8 elements]</text>

    <rect x="196" y="24" width="80" height="26" rx="3" fill="#93C5FD" stroke="#3B82F6" stroke-width="0.8"/>
    <text x="236" y="42" text-anchor="middle" font-size="8.5" fill="#1E3A8A" font-weight="600">b1 [2]</text>

    <rect x="282" y="24" width="100" height="26" rx="3" fill="#DBEAFE" stroke="#3B82F6" stroke-width="0.8"/>
    <text x="332" y="42" text-anchor="middle" font-size="8.5" fill="#1E40AF" font-weight="600">W2 [1&#xD7;2 = 2]</text>

    <rect x="388" y="24" width="60" height="26" rx="3" fill="#93C5FD" stroke="#3B82F6" stroke-width="0.8"/>
    <text x="418" y="42" text-anchor="middle" font-size="8.5" fill="#1E3A8A" font-weight="600">b2 [1]</text>

    <text x="480" y="42" text-anchor="start" font-size="9" fill="#6B7280">offset: 0</text>
    <text x="540" y="42" text-anchor="start" font-size="9" fill="#6B7280">8</text>
    <text x="580" y="42" text-anchor="start" font-size="9" fill="#6B7280">10</text>
    <text x="620" y="42" text-anchor="start" font-size="9" fill="#6B7280">12</text>
    <text x="660" y="42" text-anchor="start" font-size="9" fill="#6B7280">13  (total = 13 params)</text>
  </g>
</svg>
