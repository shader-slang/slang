# Manifest mapping each generated document to its prompt, watched source
# paths, dependencies, and size cap. Consumed by _meta/regenerate.py.
#
# Schema: _meta/schema/manifest.schema.json
#
# Conventions:
#   - watched_paths globs are workspace-relative.
#   - Globs use shell-style wildcards (*, **, ?). They are expanded at the
#     current commit when computing the freshness digest.
#   - depends_on lists other generated docs whose output is used as input
#     context for the agent generating this doc (Phase 3 cross-linking).
#   - size_cap_bytes is a soft cap; the lint pass warns above it.

version: 1
default_size_cap_bytes: 32768

documents:

  # --- architecture/ -----------------------------------------------------

  architecture/overview.md:
    prompt: prompts/architecture-overview.md
    watched_paths:
      - source/slang/CMakeLists.txt
      - source/slang/slang-compile-request.h
      - source/slang/slang-compile-request.cpp
      - source/slang/slang-module.h
      - source/slang/slang-module.cpp
      - source/core/CMakeLists.txt
      - source/compiler-core/CMakeLists.txt
      - include/slang.h
      - CLAUDE.md
    depends_on: []
    size_cap_bytes: 16384

  architecture/module-map.md:
    prompt: prompts/architecture-module-map.md
    watched_paths:
      - source/*/CMakeLists.txt
      - source/slang/CMakeLists.txt
      - prelude/*.h
      - source/slang/slang-*.h
      - source/compiler-core/slang-*.h
      - source/core/slang-*.h
    depends_on:
      - architecture/overview.md
    size_cap_bytes: 32768

  architecture/dependency-graph.md:
    prompt: prompts/architecture-dependency-graph.md
    watched_paths:
      - source/*/CMakeLists.txt
    depends_on:
      - architecture/module-map.md
    size_cap_bytes: 16384

  # --- pipeline/ ---------------------------------------------------------

  pipeline/overview.md:
    prompt: prompts/pipeline-overview.md
    watched_paths:
