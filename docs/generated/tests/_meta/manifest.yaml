# Manifest mapping each agentic test bundle to its prompt, source doc,
# watched source paths, dependencies, and coverage targets. Consumed
# by _meta/regenerate.py.
#
# Schema: _meta/schema/manifest.schema.json
#
# Conventions:
#   - One bundle per file in docs/generated/design/. Bundle key matches the
#     doc path (without the docs/generated/design/ prefix).
#   - The bundle directory is docs/generated/tests/<key without .md>/.
#   - watched_paths globs are workspace-relative and use the same set as
#     the corresponding doc in docs/generated/design/_meta/manifest.yaml.
#     This is intentional: when the watched source changes, the doc
#     becomes stale AND the test bundle becomes stale.
#   - source_doc is the docs/generated/design/ file this bundle's tests
#     derive their claims from. Its sha256 is tracked separately so doc
#     edits invalidate the bundle.
#   - depends_on lists other bundles whose README.md is provided as
#     context to the agent (Phase C cross-link pass). Mirrors the
#     analogous depends_on in the docs manifest.
#   - coverage_targets names the slangc source files this bundle is
#     responsible for exercising. Used by `expansion-candidates` to
#     rank bundles by under-coverage. NEVER fed to a test-writing prompt
#     as line-level detail; expansion stays doc-anchored.
#   - size_cap_files is a soft cap on the number of .slang files in the
#     bundle; the lint pass warns above it.

version: 1
default_size_cap_files: 30
bundles:
  # Architectural / descriptive docs (architecture/, glossary/, navigation
  # bundles) are intentionally exempt from the 1-to-1 mirror rule — they
  # describe the system rather than specify behavior, so their "claims"
  # are already exercised by behaviorally-anchored bundles below.

  pipeline/overview:
    prompt: prompts/pipeline-overview.md
    source_doc: docs/generated/design/pipeline/overview.md
    watched_paths:
      - source/slang/slang-compile-request.cpp
      - source/slang/slang-emit.cpp
      - source/slang/slang-lower-to-ir.cpp
      - source/slang/slang-check.cpp
      - source/slang/slang-parser.cpp
      - source/slang/slang-preprocessor.cpp
      - source/compiler-core/slang-lexer.cpp
    coverage_targets:
      - source/slang/slang-compile-request.cpp
      - source/slang/slang-emit.cpp
    size_cap_files: 20

  pipeline/01-lex-preprocess:
