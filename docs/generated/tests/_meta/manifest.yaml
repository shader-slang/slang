# Manifest mapping each agentic test bundle to its source doc, watched
# source paths, dependencies, and coverage targets. Consumed by
# _meta/regenerate.py.
#
# Schema: _meta/schema/manifest.schema.json
#
# Conventions:
#   - Bundle keys are role-rooted:
#       conformance/<doc>     — anchored to the authoritative human-written
#                               spec at docs/language-reference/.
#       design/<area>/<doc>   — anchored to the reverse-engineered design
#                               docs at docs/generated/design/.
#     See _meta/prompts/_common.md § Source-of-truth hierarchy.
#   - The bundle directory is docs/generated/tests/<key>/.
#   - The per-bundle prompt is co-located with the bundle as
#     <key>/_prompt.md. It is derived from the key, not stored here.
#   - watched_paths globs are workspace-relative. When the watched source
#     changes, the bundle becomes stale (mirrors the docs manifest).
#   - source_doc is the file this bundle's tests derive their claims from
#     (docs/language-reference/ for conformance/, docs/generated/design/
#     for design/). Its sha256 is tracked separately so doc edits
#     invalidate the bundle.
#   - depends_on lists other bundle keys whose README.md is provided as
#     context to the agent (Phase C cross-link pass).
#   - coverage_targets names the slangc source files this bundle is
#     responsible for exercising. Used by `expansion-candidates` to
#     rank bundles by under-coverage. NEVER fed to a test-writing prompt
#     as line-level detail; expansion stays doc-anchored.
#   - size_cap_files is a soft cap on the number of .slang files in the
#     bundle; the lint pass warns above it.

version: 1
default_size_cap_files: 30
bundles:
  # Architectural / descriptive docs (architecture/, glossary/, navigation
  # bundles) are intentionally exempt from the 1-to-1 mirror rule — they
  # describe the system rather than specify behavior, so their "claims"
  # are already exercised by behaviorally-anchored bundles below.

  design/pipeline/overview:
    source_doc: docs/generated/design/pipeline/overview.md
    watched_paths:
      - source/slang/slang-compile-request.cpp
      - source/slang/slang-emit.cpp
      - source/slang/slang-lower-to-ir.cpp
