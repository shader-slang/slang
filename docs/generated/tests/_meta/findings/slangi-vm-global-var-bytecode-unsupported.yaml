schema_version: 1
id: slangi-vm-global-var-bytecode-unsupported
bundle: spec/types-extension
suspected_kind: regression
title: "[slangi] module-scope global variables not supported in VM bytecode"
observed_at: 2026-06-01T17:30:00+00:00
scope: cpp
evidence:
  command: ./build/Release/bin/slangi <repro.slang>
  source_slang: docs/generated/tests/language-reference/types-extension/enum-extension-static-members.slang
  observed_summary: |
    Any module-scope global variable (including a `static int x = 42;`
    introduced via an enum extension, or a top-level `uniform int x;`)
    causes slangi to abort with:
      error[E99997]: Slang compilation aborted due to an exception
      of N5Slang13InternalErrorE unexpected: unsupported global inst
      for vm bytecode emit.
    The construct is documented as supported (the doc's enum-extension
    Example 1 shows `static int staticValue = 42;` inside an
    `extension TestEnum`), but the slangi VM bytecode emitter has no
    case for the resulting global inst.

    This same underlying issue was also encountered during the
    `types-fundamental-integer` bundle work — a top-level
    `uniform int maxValue;` failed identically and the test was
    rewritten to use a function-parameter pattern to defeat the
    constant folder. The static-extension form has no such workaround
    since the doc Example pins it as the surface.
  exit_code: 1
  stderr_tail: "unsupported global inst for vm bytecode emit."
expected:
  claim: |
    The language reference's enum-extension example (Example 1)
    declares `static int staticValue = 42;` and reads it back via
    `TestEnum.staticValue`. The construct must work under any
    backend, including slangi.
  citation_kind: doc
  citation: docs/language-reference/types-extension.md
provenance:
  agent_model: claude-opus-4-7
  source_commit: d25453d7f0b4867db4cb5eabf34fb6cd088cf596
  doc_anchor: docs/language-reference/types-extension.md#enum
agent_self_assessment:
  confidence: high
  alternatives_considered:
    - "Test bug: ruled out — the test is a direct port of the doc's Example 1."
    - "Frontend bug: ruled out — the error names the VM bytecode emitter."
    - "Related to the broader pattern of slangi-VM unimplemented IR cases surfacing in this campaign (#11402, #11403, plus pending: vector swizzle-assign, matrix _mij swizzle, ::-static-access). The VM emitter appears to be missing case handlers for several common IR opcodes."
