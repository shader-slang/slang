schema_version: 1
id: slangi-vm-get-string-hash-bytecode-unimplemented
bundle: design/ir-reference/misc
suspected_kind: regression
title: "[slangi] getStringHash aborts: VM bytecode gen unimplemented"
observed_at: "2026-07-08T00:00:00+00:00"
scope: cpp
evidence:
  command: ./build/Release/bin/slangi <repro.slang>
  source_slang: docs/generated/tests/design/ir-reference/misc/string-hash-stable-value-interpret.slang
  observed_summary: |
    Any call to `getStringHash("...")` in a program run under `slangi`
    aborts with:
      error[E99997]: Slang compilation aborted due to an exception
      of N5Slang13InternalErrorE unimplemented: VM bytecode gen
      for inst.
    Minimal repro:
      void main()
      {
          uint a = getStringHash("stable-key-123");
          printf("h=%u\n", a);
      }
    The same construct compiles fine to C++ text (`-target cpp`), where
    both call sites of an identical literal fold to the same constant
    (uint32_t(3275690514)), i.e. the documented compile-time-stable
    fold works on other backends; only the VM bytecode emitter lacks a
    case for the getStringHash / hashed-string-literal instructions.
  exit_code: 5
  stderr_tail: "unimplemented: VM bytecode gen for inst."
expected:
  claim: |
    misc.md#getstringhash states `getStringHash` takes a single string
    literal operand and produces a compile-time-stable hash of the
    literal's bytes, folded to its constant hash value by the emitters.
    Two call sites hashing the same literal must therefore agree at run
    time under the byte-code VM just as under other backends.
  citation_kind: doc
  citation: docs/generated/design/ir-reference/misc.md
