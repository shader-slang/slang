  command: ./build/Release/bin/slang-test docs/generated/tests/design/ir-reference/misc/string-hash-stable-value-cpu.slang
  source_slang: docs/generated/tests/design/ir-reference/misc/string-hash-stable-value-cpu.slang
  observed_summary: |
    Running a `//TEST:COMPARE_COMPUTE(filecheck-buffer=CHECK):-cpu
    -output-using-type` kernel that calls `getStringHash` crashes the
    slang-test process itself with SIGSEGV (exit code 139) after the
    backend-support checks print; no test result is reported. Minimal
    repro kernel:
      RWStructuredBuffer<int> outputBuffer;
      [numthreads(1, 1, 1)]
      void computeMain()
      {
          outputBuffer[0] = (getStringHash("stable-key-123") != 0) ? 1 : 0;
      }
    The compile side is healthy: `slangc -target cpp -entry computeMain
    -stage compute` emits correct C++ in which both call sites of the
    same literal fold to the identical constant uint32_t(3275690514).
    The crash is therefore in slang-test's CPU host-callable execution
    path (suspected handling of the module's hashed-string-literal
    global when preparing/running the compiled kernel), not in codegen.
  exit_code: 139
  stderr_tail: "(process killed by SIGSEGV; no diagnostic output)"
expected:
  claim: |
    misc.md#getstringhash states `getStringHash` produces a
    compile-time-stable hash of the literal's bytes that emitters fold
