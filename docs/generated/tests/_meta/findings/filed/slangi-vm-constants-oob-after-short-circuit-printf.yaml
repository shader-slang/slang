schema_version: 1
id: slangi-vm-constants-oob-after-short-circuit-printf
bundle: ast-reference/expressions
suspected_kind: sigsegv
title: "[slangi] VM constants-OOB on printf after short-circuit logic-and/or"
observed_at: 2026-05-29T13:30:00+00:00
scope: cpp
evidence:
  command: ./build/Release/bin/slangi docs/generated/tests/ast-reference/expressions/logic-and-short-circuit.slang
  source_slang: docs/generated/tests/ast-reference/expressions/logic-and-short-circuit.slang
  observed_summary: |
    The bytecode VM aborts with "VM operand access out of bounds in constants
    section: offset=76 size=4 sectionSize=76." right before the second printf
    runs. The first printf executes and prints `counter-after-false-and=0`,
    then the VM bails and the second printf never runs. Process exits 5.
    Affects both Release and RelWithDebInfo builds at master HEAD
    (5377f3e022077dc7941d5b35acea251b38a4a26f). A bisect across the 17 commits
    in PR #11221's window (39cebbf01..9e16a6b7c) found the bug present on
    *every* commit tested including the suspected-good anchor 39cebbf01, so
    the regression predates the agentic-tests-bootstrap branch — exact bad
    commit not yet identified.
  exit_code: 5
  stderr_tail: "VM operand access out of bounds in constants section: offset=76 size=4 sectionSize=76."
expected:
  claim: |
    A `//TEST:INTERPRET` program that runs two `printf(...)` calls in `main()`
    with a short-circuit `&&` between them must print both lines and exit 0.
    The doc claim under test is that `LogicOperatorShortCircuitExpr` preserves
    short-circuit semantics — observable as the bump-counter not advancing
    when the left operand is false. The test is doc-anchored, not implementation-
    anchored; the runtime is required to execute both printfs.
  citation_kind: doc
  citation: docs/generated/design/ast-reference/expressions.md
