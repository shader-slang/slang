bundle: conformance/expressions-member-access
suspected_kind: regression
title: "[slangi] `EnumType::Name` static access aborts: VM bytecode unimplemented"
observed_at: 2026-06-01T17:00:00+00:00
scope: cpp
evidence:
  command: ./build/Release/bin/slangi <repro.slang>
  source_slang: docs/generated/tests/language-reference/expressions-member-access/static-dot-vs-colon-colon.slang
  observed_summary: |
    The language reference's #static-member-expressions section
    states `Color.Red` and `Color::Red` are equivalent. Under
    slangi, the `.` form works (per the sibling tests in
    `language-reference/types-enum/`); the `::` form aborts:
      error[E99997]: Slang compilation aborted due to an exception
      of N5Slang13InternalErrorE unimplemented: VM bytecode gen
      for inst.
    The frontend parses `::` correctly (the message is from the
    VM bytecode emitter, not the parser), so the equivalence
    holds at the AST/IR level but breaks at the VM emit stage.
  exit_code: 1
  stderr_tail: "unimplemented: VM bytecode gen for inst."
expected:
  claim: |
    Per the language reference: "These are equivalent: `Color.Red`
    and `Color::Red`." Both expressions must produce the same
    enumerator value under any backend, including slangi.
