<script type="module">
  // Kramdown renders ```mermaid ... ``` as <pre><code class="language-mermaid">...</code></pre>.
  // Mermaid expects <pre class="mermaid"> whose textContent is the diagram source.
  // Do this transformation up front so the catch block below can find the
  // diagrams even if the dynamic import itself fails (e.g. CDN unreachable).
  document.querySelectorAll('pre > code.language-mermaid').forEach((code) => {
    const pre = code.parentNode;
    const target = document.createElement('pre');
    target.className = 'mermaid';
    target.textContent = code.textContent;
    pre.replaceWith(target);
  });
  try {
    const mermaid = await import('https://cdn.jsdelivr.net/npm/mermaid@11.15/dist/mermaid.esm.min.mjs');
    mermaid.default.initialize({ startOnLoad: false });
    await mermaid.default.run({ querySelector: 'pre.mermaid' });
  } catch (error) {
    console.error('Failed to load or render Mermaid diagrams:', error);
    document.querySelectorAll('pre.mermaid').forEach((pre) => {
      const notice = document.createElement('div');
      notice.style.cssText = 'color: #d00; padding: 10px; border: 1px solid #d00; margin: 10px 0;';
      notice.textContent = 'Diagram rendering unavailable. Please enable JavaScript or check your connection.';
      pre.replaceWith(notice);
    });
  }
</script>
